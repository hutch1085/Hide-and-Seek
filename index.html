        // ============ OUTRIGGER CANOE ============
        function createOutrigger() {
            const group = new THREE.Group();
            const woodMat = new THREE.MeshPhongMaterial({ color: 0x8B4513, map: woodTex, shininess: 20 });
            const ropeMat = new THREE.MeshPhongMaterial({ color: 0xC8A860, shininess: 8 });
            // Main hull with bow/stern taper
            const hullGeo = new THREE.CylinderGeometry(0.3, 0.15, 4, 14, 8);
            const hp = hullGeo.attributes.position;
            for (let v = 0; v < hp.count; v++) {
                const y = hp.getY(v);
                const taper = 1 - Math.pow(Math.abs(y) / 2, 2.5) * 0.8;
                hp.setX(v, hp.getX(v) * Math.max(0.1, taper));
                hp.setZ(v, hp.getZ(v) * Math.max(0.15, taper));
            }
            hullGeo.computeVertexNormals();
            const hull = new THREE.Mesh(hullGeo, woodMat);
            hull.rotation.z = Math.PI / 2;
            hull.castShadow = true;
            group.add(hull);
            // Gunwale (top rim)
            const gunwale = new THREE.Mesh(
                new THREE.TorusGeometry(0.28, 0.02, 4, 14, Math.PI),
                woodMat
            );
            gunwale.position.y = 0.15;
            gunwale.rotation.y = Math.PI / 2;
            gunwale.scale.x = 5.5;
            group.add(gunwale);
            // Outrigger float with tapered ends
            const floatGeo = new THREE.CylinderGeometry(0.1, 0.06, 2.5, 8, 6);
            const fp = floatGeo.attributes.position;
            for (let v = 0; v < fp.count; v++) {
                const y = fp.getY(v);
                const taper = 1 - Math.pow(Math.abs(y) / 1.25, 3) * 0.7;
                fp.setX(v, fp.getX(v) * Math.max(0.2, taper));
                fp.setZ(v, fp.getZ(v) * Math.max(0.2, taper));
            }
            floatGeo.computeVertexNormals();
            const float = new THREE.Mesh(floatGeo, woodMat);
            float.rotation.z = Math.PI / 2;
            float.position.set(0, 0, 1.2);
            float.castShadow = true;
            group.add(float);
            // Connecting beams with lashing ropes
            for (let i = -1; i <= 1; i++) {
                const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.3, 6), woodMat);
                beam.rotation.x = Math.PI / 2;
                beam.position.set(i * 0.8, 0.15, 0.6);
                beam.castShadow = true;
                group.add(beam);
                // Lashing wraps at each end
                for (let le of [0, 1.1]) {
                    const lash = new THREE.Mesh(
                        new THREE.TorusGeometry(0.05, 0.008, 4, 8),
                        ropeMat
                    );
                    lash.position.set(i * 0.8, 0.15, le);
                    group.add(lash);
                }
            }
            // Small seat plank
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.03, 0.25), woodMat);
            seat.position.set(0, 0.2, 0);
            group.add(seat);
            return group;
        }
        const outrigger = createOutrigger();
        outrigger.position.set(-40, 0.3, -145);
        outrigger.rotation.y = 0.3;
        scene.add(outrigger);

        // ============ ROCK FORMATIONS ============
        function createRockFormations() {
            const group = new THREE.Group();
            const rockMat = new THREE.MeshPhongMaterial({ map: stoneTex, color: 0x5A5A5A, shininess: 12 });
            // Volcanic rock cluster — east side (higher subdiv + multi-frequency noise)
            for (let i = 0; i < 30; i++) {
                const rSize = 0.5 + Math.random() * 1.5;
                const geo = new THREE.IcosahedronGeometry(rSize, 3);
                const pos = geo.attributes.position;
                for (let j = 0; j < pos.count; j++) {
                    const x = pos.getX(j), y = pos.getY(j), z = pos.getZ(j);
                    const n1 = (Math.random() - 0.5) * 0.25;
                    const n2 = Math.sin(x * 4 + z * 3) * 0.06;
                    const d = 1 + n1 + n2;
                    pos.setXYZ(j, x * d, y * d * 0.7, z * d);
                }
                geo.computeVertexNormals();
                const rock = new THREE.Mesh(geo, rockMat);
                rock.position.set(130 + Math.random() * 50, Math.random() * 0.5, -20 + Math.random() * 100);
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.castShadow = true;
                rock.receiveShadow = true;
                group.add(rock);
            }
            // Scattered beach rocks (also higher subdiv)
            for (let i = 0; i < 15; i++) {
                const rSize = 0.3 + Math.random() * 0.8;
                const geo = new THREE.IcosahedronGeometry(rSize, 3);
                const pos = geo.attributes.position;
                for (let j = 0; j < pos.count; j++) {
                    const x = pos.getX(j), y = pos.getY(j), z = pos.getZ(j);
                    const d = 1 + (Math.random() - 0.5) * 0.2 + Math.sin(x * 6) * 0.04;
                    pos.setXYZ(j, x * d, y * d * 0.6, z * d);
                }
                geo.computeVertexNormals();
                const rock = new THREE.Mesh(geo, rockMat);
                rock.position.set((Math.random() - 0.5) * 300, 0.15, -145 + Math.random() * 15);
                rock.castShadow = true;
                group.add(rock);
            }
            return group;
        }
        scene.add(createRockFormations());

        // ============ JUNGLE FERNS & BUSHES ============
        function createJungleFoliage() {
            const group = new THREE.Group();
            const fernMat = new THREE.MeshPhongMaterial({ color: 0x1B6B1B, map: leafTex, side: THREE.DoubleSide, shininess: 12 });
            const bushMat = new THREE.MeshPhongMaterial({ color: 0x2D7A2D, shininess: 8 });
            // Dense ferns — leaflet serrations via vertex displacement
            const darkFernMat = new THREE.MeshPhongMaterial({ color: 0x156015, map: leafTex, side: THREE.DoubleSide, shininess: 10 });
            for (let i = 0; i < 80; i++) {
                const fern = new THREE.Group();
                const frondCount = 4 + Math.floor(Math.random() * 3);
                for (let f = 0; f < frondCount; f++) {
                    const fLen = 1.0 + Math.random() * 0.5;
                    const frondGeo = new THREE.PlaneGeometry(0.4, fLen, 3, 8);
                    const fp = frondGeo.attributes.position;
                    for (let v = 0; v < fp.count; v++) {
                        const vy = fp.getY(v), vx = fp.getX(v);
                        const t = (vy + fLen / 2) / fLen;
                        // Drooping curve
                        fp.setZ(v, -t * t * fLen * 0.12);
                        // Taper toward tip
                        fp.setX(v, vx * (1 - t * 0.7));
                        // Leaflet serration (zigzag at edges)
                        if (Math.abs(vx) > 0.08) {
                            const zigzag = Math.sin(vy * 10) * 0.02 * (Math.abs(vx) / 0.2);
                            fp.setZ(v, fp.getZ(v) + zigzag);
                        }
                    }
                    frondGeo.computeVertexNormals();
                    const mat = f % 2 === 0 ? fernMat : darkFernMat;
                    const frond = new THREE.Mesh(frondGeo, mat);
                    const angle = (Math.PI * 2 / frondCount) * f + Math.random() * 0.3;
                    frond.position.set(Math.cos(angle) * 0.15, 0.4, Math.sin(angle) * 0.15);
                    frond.rotation.y = -angle;
                    frond.rotation.x = 0.4 + Math.random() * 0.4;
                    frond.castShadow = true;
                    fern.add(frond);
                }
                // Curled fiddlehead at center
                const fiddle = new THREE.Mesh(
                    new THREE.TorusGeometry(0.05, 0.015, 4, 8, Math.PI * 1.5),
                    new THREE.MeshPhongMaterial({ color: 0x2D6B1A, shininess: 10 })
                );
                fiddle.position.y = 0.5;
                fiddle.rotation.x = -Math.PI / 4;
                fern.add(fiddle);
                fern.position.set((Math.random() - 0.5) * 350, 0, 80 + Math.random() * 80);
                group.add(fern);
            }
            // Layered bushes — multiple overlapping spheres for volume
            const bushColors = [0x2D7A2D, 0x3A8A3A, 0x1F6B1F];
            for (let i = 0; i < 40; i++) {
                const bushGroup = new THREE.Group();
                const baseSize = 0.5 + Math.random() * 1.0;
                const layers = 2 + Math.floor(Math.random() * 2);
                for (let l = 0; l < layers; l++) {
                    const lSize = baseSize * (1 - l * 0.2);
                    const bush = new THREE.Mesh(
                        new THREE.SphereGeometry(lSize, 10, 8),
                        new THREE.MeshPhongMaterial({ color: bushColors[l % bushColors.length], shininess: 8 })
                    );
                    bush.scale.y = 0.6 + Math.random() * 0.3;
                    bush.position.set((Math.random() - 0.5) * lSize * 0.3, l * lSize * 0.2, (Math.random() - 0.5) * lSize * 0.3);
                    bush.castShadow = true;
                    bushGroup.add(bush);
                }
                bushGroup.position.set(
                    (Math.random() - 0.5) * 340,
                    baseSize * 0.3,
                    -60 + Math.random() * 220
                );
                group.add(bushGroup);
            }
            return group;
        }
        scene.add(createJungleFoliage());

        // ============ BANANA TREES ============

            const trunkMat = new THREE.MeshPhongMaterial({ color: 0x6B8E23, map: barkTex, shininess: 10 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 3.5, 10), trunkMat);
            trunk.position.y = 1.75;
            trunk.castShadow = true;
            group.add(trunk);
            const leafMat = new THREE.MeshPhongMaterial({ color: 0x228B22, map: leafTex, side: THREE.DoubleSide, shininess: 15 });
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i;
                const leafGeo = new THREE.PlaneGeometry(0.8, 2.5, 1, 6);
                const lp = leafGeo.attributes.position;
                for (let v = 0; v < lp.count; v++) {
                    const vy = lp.getY(v);
                    lp.setZ(v, -vy * vy * 0.05);
                }
                leafGeo.computeVertexNormals();
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.set(Math.cos(angle) * 0.3, 3.3, Math.sin(angle) * 0.3);
                leaf.rotation.y = -angle;
                leaf.rotation.x = 0.4 + Math.random() * 0.3;
                leaf.castShadow = true;
                group.add(leaf);
            }
            // Banana bunch
            const bunchMat = new THREE.MeshPhongMaterial({ color: 0xFFD700, shininess: 25 });
            const bunch = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), bunchMat);
            bunch.scale.y = 1.5;
            bunch.position.set(0.2, 3.0, 0.2);

        for (let i = 0; i < 20; i++) {

                (Math.random() - 0.5) * 300,

            );

            scene.add(tree);
        }

        // ============ WATERFALL ============
        function createWaterfall() {
            const group = new THREE.Group();
            // Cliff face — layered rock with ledges
            const cliffMat = new THREE.MeshPhongMaterial({ map: stoneTex, color: 0x6A6A5A, shininess: 8 });
            const darkCliffMat = new THREE.MeshPhongMaterial({ map: stoneTex, color: 0x4A4A3A, shininess: 6 });

            // Main cliff body — with vertex displacement for natural rock face
            const cliffGeo = new THREE.BoxGeometry(8, 12, 6, 8, 12, 6);
            const cp = cliffGeo.attributes.position;
            for (let i = 0; i < cp.count; i++) {
                if (cp.getZ(i) > 2.5) {
                    cp.setZ(i, cp.getZ(i) + (Math.random() - 0.5) * 0.6);
                    cp.setX(i, cp.getX(i) + (Math.random() - 0.5) * 0.3);
                }
            }
            cliffGeo.computeVertexNormals();
            const cliff = new THREE.Mesh(cliffGeo, cliffMat);
            cliff.position.y = 6;
            cliff.castShadow = true;
            cliff.receiveShadow = true;
            group.add(cliff);

            // Overhang — sloped rock jutting out at the top
            const overhangGeo = new THREE.BoxGeometry(6, 1.2, 2.5, 4, 2, 3);
            const op = overhangGeo.attributes.position;
            for (let i = 0; i < op.count; i++) {
                if (op.getZ(i) > 0.8) {
                    op.setY(i, op.getY(i) - op.getZ(i) * 0.4);
                }
            }
            overhangGeo.computeVertexNormals();
            const overhang = new THREE.Mesh(overhangGeo, darkCliffMat);
            overhang.position.set(0, 11.8, 3.8);
            overhang.castShadow = true;
            group.add(overhang);

            // Stepped ledges on cliff face — varied sizes with slight tilt
            for (let i = 0; i < 5; i++) {
                const lw = 2.5 + Math.random() * 3;
                const ledge = new THREE.Mesh(
                    new THREE.BoxGeometry(lw, 0.35 + Math.random() * 0.2, 1.0 + Math.random() * 0.5),
                    darkCliffMat
                );
                ledge.position.set((Math.random() - 0.5) * 2.5, 1.5 + i * 2.2, 3.3);
                ledge.rotation.z = (Math.random() - 0.5) * 0.08;
                ledge.castShadow = true;
                group.add(ledge);
            }

            // Wet streak stains running down cliff face
            const wetMat = new THREE.MeshPhongMaterial({
                color: 0x3A4A3A, transparent: true, opacity: 0.35, shininess: 40
            });
            for (let i = 0; i < 3; i++) {
                const streak = new THREE.Mesh(
                    new THREE.PlaneGeometry(0.3 + Math.random() * 0.4, 6 + Math.random() * 4),
                    wetMat
                );
                streak.position.set(-1.5 + i * 1.5, 5 + Math.random() * 3, 3.08);
                group.add(streak);
            }

            // Moss patches on cliff face
            const mossMat = new THREE.MeshPhongMaterial({ color: 0x3A6A2A, transparent: true, opacity: 0.6, shininess: 5 });
            for (let i = 0; i < 8; i++) {
                const moss = new THREE.Mesh(
                    new THREE.CircleGeometry(0.3 + Math.random() * 0.5, 8),
                    mossMat
                );
                moss.position.set(
                    -3 + Math.random() * 6,
                    1 + Math.random() * 9,
                    3.07
                );
                moss.rotation.z = Math.random() * Math.PI;
                group.add(moss);
            }

            // Cliff vegetation — ferns growing from cracks
            const fernMat = new THREE.MeshPhongMaterial({ color: 0x2D7A2D, side: THREE.DoubleSide, shininess: 10 });
            for (let i = 0; i < 12; i++) {
                const fern = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.8, 1, 3), fernMat);
                const fp = fern.geometry.attributes.position;
                for (let v = 0; v < fp.count; v++) {
                    fp.setZ(v, -fp.getY(v) * fp.getY(v) * 0.15);
                }
                fern.geometry.computeVertexNormals();
                fern.position.set(
                    -3 + Math.random() * 6,
                    1 + Math.random() * 10,
                    3.1 + Math.random() * 0.3
                );
                fern.rotation.y = Math.random() * 0.6 - 0.3;
                fern.castShadow = true;
                group.add(fern);
            }

            // Water stream — animated vertex displacement
            const streamMat = new THREE.MeshPhongMaterial({
                color: 0x44AADD, transparent: true, opacity: 0.6,
                shininess: 100, specular: 0xFFFFFF, emissive: 0x113344, emissiveIntensity: 0.2
            });
            const streamGeo = new THREE.PlaneGeometry(2, 12, 6, 30);
            const stream = new THREE.Mesh(streamGeo, streamMat);
            stream.position.set(0, 6, 3.05);
            group.add(stream);
            group.userData.stream = stream;
            // Store original positions for animation
            const streamOrig = new Float32Array(streamGeo.attributes.position.array);
            group.userData.streamOrig = streamOrig;

            // Secondary cascade stream (wider, thinner)
            const cascade = new THREE.Mesh(
                new THREE.PlaneGeometry(3, 12, 4, 20),
                new THREE.MeshPhongMaterial({ color: 0x66CCEE, transparent: true, opacity: 0.3, shininess: 80 })
            );
            cascade.position.set(0, 6, 3.02);
            group.add(cascade);

            // Pool at base — rippled surface with depth color
            const poolGeo = new THREE.CylinderGeometry(4.5, 4, 0.5, 32, 1);
            const pool = new THREE.Mesh(poolGeo, new THREE.MeshPhongMaterial({
                color: 0x1A7799, transparent: true, opacity: 0.75,
                shininess: 120, specular: 0x99CCFF, envMap: envMap, reflectivity: 0.35
            }));
            pool.position.y = 0.25;
            pool.receiveShadow = true;
            group.add(pool);
            group.userData.pool = pool;

            // Pool rim rocks — arranged around the base
            const rimRockMat = new THREE.MeshPhongMaterial({ map: stoneTex, color: 0x7A7A6A, shininess: 8 });
            for (let i = 0; i < 14; i++) {
                const angle = (i / 14) * Math.PI * 2;
                const rr = 4.2 + Math.random() * 0.5;
                const rimRock = new THREE.Mesh(
                    new THREE.SphereGeometry(0.4 + Math.random() * 0.5, 6, 5),
                    rimRockMat
                );
                rimRock.scale.set(1 + Math.random() * 0.5, 0.5 + Math.random() * 0.3, 1 + Math.random() * 0.4);
                rimRock.position.set(Math.cos(angle) * rr, 0.2, Math.sin(angle) * rr + 3);
                rimRock.rotation.y = Math.random() * Math.PI;
                rimRock.castShadow = true;
                group.add(rimRock);
            }

            // Splash mist particles at base
            const mistCount = 50;
            const mistPos = new Float32Array(mistCount * 3);
            for (let i = 0; i < mistCount; i++) {
                mistPos[i*3] = (Math.random() - 0.5) * 4;
                mistPos[i*3+1] = Math.random() * 3;
                mistPos[i*3+2] = 3 + Math.random() * 2;
            }
            const mistGeo = new THREE.BufferGeometry();
            mistGeo.setAttribute('position', new THREE.BufferAttribute(mistPos, 3));
            const mistParticles = new THREE.Points(mistGeo, new THREE.PointsMaterial({
                color: 0xCCEEFF, size: 0.3, transparent: true, opacity: 0.25, sizeAttenuation: true
            }));
            group.add(mistParticles);
            group.userData.mist = mistParticles;

            // Mist light — brighter
            const mistLight = new THREE.PointLight(0x88CCFF, 0.8, 18);
            mistLight.position.set(0, 3, 4);
            group.add(mistLight);

            // Rainbow effect near the mist (subtle arc)
            const rainbowMat = new THREE.MeshPhongMaterial({
                color: 0xFFFFFF, transparent: true, opacity: 0.08,
                emissive: 0xFF8844, emissiveIntensity: 0.3, side: THREE.DoubleSide
            });
            const rainbowGeo = new THREE.TorusGeometry(5, 0.15, 4, 32, Math.PI * 0.6);
            const rainbow = new THREE.Mesh(rainbowGeo, rainbowMat);
            rainbow.position.set(0, 5, 5);
            rainbow.rotation.z = -0.2;
            group.add(rainbow);

            return group;
        }
        const waterfall = createWaterfall();
        waterfall.position.set(100, 0, 130);
        scene.add(waterfall);

        function createSeagulls() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xFAFAFA, shininess: 20 });
            const wingMat = new THREE.MeshPhongMaterial({ color: 0xEEEEEE, side: THREE.DoubleSide, shininess: 15 });
            const wingTipMat = new THREE.MeshPhongMaterial({ color: 0x444444, side: THREE.DoubleSide, shininess: 10 });
            const beakMat = new THREE.MeshPhongMaterial({ color: 0xFFAA00, shininess: 30 });
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 40 });

            for (let i = 0; i < 12; i++) {
                const seagull = new THREE.Group();
                const angle = (Math.PI * 2 / 6) * i;
                const distance = 80 + Math.random() * 30;

                // Streamlined body (elongated sphere)
                const body = new THREE.Mesh(new THREE.SphereGeometry(0.18, 10, 8), bodyMat);
                body.scale.set(0.8, 0.7, 1.4);
                body.castShadow = true;
                seagull.add(body);

                // Head
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), bodyMat);
                head.position.set(0, 0.06, 0.28);
                seagull.add(head);

                // Beak (cone)
                const beak = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.12, 6), beakMat);
                beak.position.set(0, 0.04, 0.38);
                beak.rotation.x = -Math.PI / 2;
                seagull.add(beak);

                // Eyes
                for (let e of [-1, 1]) {
                    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.015, 4, 4), eyeMat);
                    eye.position.set(e * 0.06, 0.08, 0.32);
                    seagull.add(eye);
                }

                // Tail feathers (tapered flat shape)
                const tailGeo = new THREE.PlaneGeometry(0.12, 0.2, 2, 2);
                const tp = tailGeo.attributes.position;
                for (let v = 0; v < tp.count; v++) {
                    const ty = tp.getY(v);
                    if (ty < 0) tp.setX(v, tp.getX(v) * 0.4); // narrow at tip
                }
                tailGeo.computeVertexNormals();
                const tail = new THREE.Mesh(tailGeo, wingMat);
                tail.position.set(0, 0.02, -0.28);
                tail.rotation.x = 0.15;
                seagull.add(tail);

                // Wings with tapered shape and dark tips
                for (let j of [-1, 1]) {
                    const wingGeo = new THREE.PlaneGeometry(0.7, 0.22, 4, 2);
                    const wp = wingGeo.attributes.position;
                    for (let v = 0; v < wp.count; v++) {
                        const wx = wp.getX(v);
                        // Taper wing toward tip
                        if (Math.abs(wx) > 0.2) {
                            const taper = 1 - (Math.abs(wx) - 0.2) / 0.15 * 0.5;
                            wp.setY(v, wp.getY(v) * Math.max(0.3, taper));
                        }
                    }
                    wingGeo.computeVertexNormals();
                    // Add vertex colors for wing tips
                    const wColors = new Float32Array(wp.count * 3);
                    for (let v = 0; v < wp.count; v++) {
                        const wx = Math.abs(wp.getX(v));
                        const tipFade = wx > 0.25 ? Math.max(0.3, 1 - (wx - 0.25) / 0.1) : 1;
                        wColors[v * 3] = tipFade;
                        wColors[v * 3 + 1] = tipFade;
                        wColors[v * 3 + 2] = tipFade;
                    }
                    wingGeo.setAttribute('color', new THREE.BufferAttribute(wColors, 3));
                    const wMat = wingMat.clone();
                    wMat.vertexColors = true;
                    const wing = new THREE.Mesh(wingGeo, wMat);
                    wing.position.set(j * 0.4, 0.03, 0);
                    wing.rotation.z = j * 0.3;
                    wing.castShadow = true;
                    seagull.add(wing);
                }

                seagull.position.set(
                    Math.cos(angle) * distance,
                    35 + Math.random() * 20,
                    Math.sin(angle) * distance + 20
                );
                seagull.userData.flightAngle = angle;
                seagull.userData.flightDistance = distance;
                group.add(seagull);
            }
            return group;
        }
        const seagulls = createSeagulls();
        scene.add(seagulls);

        // ============ PLAYER CLASS ============
        class Player {
            constructor(id, role, isLocal = false) {
                this.id = id;
                this.role = role;
                this.isLocal = isLocal;
                this.animTime = 0;
                this.isMoving = false;
                this.moveBlend = 0; // 0=idle, 1=full walk (smooth transition)
                this.currentFacing = 0; // smoothed facing angle
                this.prevSpeed = 0;
                this.idleTimer = 0; // time spent idle for varied idle anims
                this.stridePhase = 0; // continuous stride phase for natural gait
                this.isThrowing = false;
                this.throwAnimTime = 0;
                // Limb references for animation
                this.leftArm = null;
                this.rightArm = null;
                this.leftLeg = null;
                this.rightLeg = null;
                this.torso = null;
                this.head = null;
                this.mesh = this.createMesh();
                this.position = new THREE.Vector3(0, 0, 0);
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.isTransformed = false;
                this.isEliminated = false;
                this.hiddenPropIndex = null;
                this.lastThrowTime = 0;
                // Contact shadow (blob shadow under player)
                const shadowGeo = new THREE.PlaneGeometry(1.2, 1.2);
                const shadowMat = new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, opacity: 0.3, depthWrite: false });
                this.shadow = new THREE.Mesh(shadowGeo, shadowMat);
                this.shadow.position.y = 0.02;
                this.shadow.rotation.x = -Math.PI / 2;
                this.mesh.add(this.shadow);
                scene.add(this.mesh);
            }

            createMesh() {
                const group = new THREE.Group();
                if (this.role === 'menehune') {
                    // --- MENEHUNE: small forest spirit with detailed body ---
                    const skinMat = new THREE.MeshPhongMaterial({ color: 0x6B4E37, shininess: 25, specular: 0x332211 });
                    const darkSkinMat = new THREE.MeshPhongMaterial({ color: 0x5A3D28, shininess: 20 });

                    // Torso — tapered cylinder for organic shape
                    const torsoGeo = new THREE.CylinderGeometry(0.22, 0.28, 0.55, 16);
                    const torso = new THREE.Mesh(torsoGeo, skinMat);
                    torso.castShadow = true;
                    torso.position.y = 0.55;
                    group.add(torso);
                    this.torso = torso;

                    // Belly bulge
                    const belly = new THREE.Mesh(new THREE.SphereGeometry(0.2, 12, 12), skinMat);
                    belly.scale.set(1, 0.8, 1.2);
                    belly.position.set(0, 0.45, 0.08);
                    belly.castShadow = true;
                    group.add(belly);

                    // Head — slightly squashed sphere
                    const headGeo = new THREE.SphereGeometry(0.3, 16, 16);
                    const head = new THREE.Mesh(headGeo, skinMat);
                    head.scale.set(1, 0.9, 1);
                    head.castShadow = true;
                    head.position.y = 1.1;
                    group.add(head);

                            new THREE.BoxGeometry(0.05, 0.04, 0.008),
                            new THREE.MeshPhongMaterial({ color: 0x4A3520, shininess: 12 })
                        );
                        tongue.position.set(0, -0.415, 0.078);
                        legPivot.add(tongue);
                        // Boot heel tab
                        const heelTab = new THREE.Mesh(
                            new THREE.BoxGeometry(0.04, 0.03, 0.008),
                            new THREE.MeshPhongMaterial({ color: 0x2A1A0A, shininess: 15 })
                        );
                        heelTab.position.set(0, -0.42, -0.06);
                        legPivot.add(heelTab);

                        group.add(legPivot);
                        if (side === -1) this.leftLeg = legPivot;
                        else this.rightLeg = legPivot;
                    }
                }
                return group;
            }

            update(deltaTime) {
                this.velocity.multiplyScalar(0.9);
                this.position.add(this.velocity.clone().multiplyScalar(deltaTime));
                this.position.x = Math.max(-GAME_CONFIG.MAP_BOUNDARY_X, Math.min(GAME_CONFIG.MAP_BOUNDARY_X, this.position.x));
                this.position.z = Math.max(-GAME_CONFIG.MAP_BOUNDARY_Z, Math.min(GAME_CONFIG.MAP_BOUNDARY_Z, this.position.z));
                this.position.y = 0;
                this.mesh.position.copy(this.position);

                // ---- SPEED & BLEND ----
                const speed = this.velocity.length();
                this.isMoving = speed > 0.5;
                // Smooth blend between idle(0) and walk(1) — prevents hard snap
                const targetBlend = this.isMoving ? Math.min(1, speed / 6) : 0;
                this.moveBlend += (targetBlend - this.moveBlend) * Math.min(1, deltaTime * 8);

                // ---- SMOOTH FACING ----
                if (speed > 0.5) {
                    const targetAngle = Math.atan2(this.velocity.x, this.velocity.z);
                    // Shortest-path angular lerp
                    let angleDiff = targetAngle - this.currentFacing;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    this.currentFacing += angleDiff * Math.min(1, deltaTime * 10);
                }
                this.mesh.rotation.y = this.currentFacing;

                // ---- STRIDE PHASE ----
                // Continuous phase accumulation for smooth gait cycle
                const strideRate = this.isMoving ? speed * 0.6 : 0;
                this.stridePhase += strideRate * deltaTime;
                this.animTime += deltaTime;

                const mb = this.moveBlend; // shorthand
                const phase = this.stridePhase;

                // ---- GAIT PARAMETERS (scale by speed for walk vs run) ----
                const speedNorm = Math.min(1, speed / 10); // 0=slow walk, 1=full run
                const legSwingAmp = 0.35 + speedNorm * 0.35; // 0.35 walk → 0.7 run
                const armSwingAmp = 0.25 + speedNorm * 0.3;
                const hipSwayAmp = 0.015 + speedNorm * 0.01;
                const shoulderTiltAmp = 0.03 + speedNorm * 0.04;
                const headBobAmp = 0.01 + speedNorm * 0.015;
                const torsoLeanAmp = 0.02 + speedNorm * 0.04; // forward lean when running

                // ---- WALKING ANIMATION ----
                // Natural gait: legs use sin, with slight knee-bend emphasis via pow
                const legSin = Math.sin(phase * 4);
                const legSwing = Math.sign(legSin) * Math.pow(Math.abs(legSin), 0.85) * legSwingAmp;
                // Arms counter-swing (opposite legs, slightly delayed phase)
                const armSin = Math.sin(phase * 4 + 0.15);
                const armSwing = armSin * armSwingAmp;

                // ---- IDLE ANIMATION ----
                this.idleTimer = this.isMoving ? 0 : this.idleTimer + deltaTime;
                const breathRate = 1.8 + Math.sin(this.animTime * 0.3) * 0.3; // variable breathing
                const breathAmp = 0.018;
                const breath = Math.sin(this.animTime * breathRate) * breathAmp;
                // Weight shift — subtle side-to-side after standing still a moment
                const weightShift = this.idleTimer > 1.5 ? Math.sin(this.animTime * 0.7) * 0.02 : 0;
                // Idle look-around — tiny head rotation
                const idleLookX = this.idleTimer > 2.0 ? Math.sin(this.animTime * 0.5) * 0.06 : 0;
                const idleLookY = this.idleTimer > 2.0 ? Math.sin(this.animTime * 0.35 + 1) * 0.08 : 0;

                // ---- BLEND & APPLY ----
                // Legs
                if (this.leftLeg) {
                    this.leftLeg.rotation.x = mb * legSwing + (1 - mb) * weightShift;
                    this.leftLeg.rotation.z = (1 - mb) * weightShift * 0.3;
                }
                if (this.rightLeg) {
                    this.rightLeg.rotation.x = mb * -legSwing + (1 - mb) * -weightShift;
                    this.rightLeg.rotation.z = (1 - mb) * -weightShift * 0.3;
                }
                // Arms (counter-swing walking, breathing idle)
                if (this.leftArm) {
                    this.leftArm.rotation.x = mb * -armSwing + (1 - mb) * breath;
                    this.leftArm.rotation.z = mb * hipSwayAmp * Math.sin(phase * 4) + (1 - mb) * (0.05 + breath * 0.5);
                }
                if (this.rightArm) {
                    this.rightArm.rotation.x = mb * armSwing + (1 - mb) * -breath;
                    this.rightArm.rotation.z = mb * -hipSwayAmp * Math.sin(phase * 4) + (1 - mb) * (-0.05 - breath * 0.5);
                }
                // Torso — bob + hip sway + forward lean
                if (this.torso) {
                    const baseY = this.role === 'menehune' ? 0.55 : 0.7;
                    // Double-frequency bob (torso bobs twice per stride cycle)
                    const bob = Math.sin(phase * 8) * headBobAmp * mb;
                    this.torso.position.y = baseY + bob;
                    // Hip sway (lateral shift at stride frequency)
                    this.torso.rotation.z = mb * Math.sin(phase * 4) * hipSwayAmp;
                    // Shoulder counter-rotation (twist opposite to hips)
                    this.torso.rotation.y = mb * Math.sin(phase * 4) * shoulderTiltAmp;
                    // Forward lean when running
                    this.torso.rotation.x = mb * torsoLeanAmp * speedNorm;
                }
                // Head — bob with slight delay, idle look-around
                if (this.head) {
                    const baseHeadY = this.role === 'menehune' ? 1.1 : 1.3;
                    const headBob = Math.sin(phase * 8 + 0.3) * headBobAmp * 0.7 * mb;
                    this.head.position.y = baseHeadY + headBob;
                    // Head tilts slightly into turns
                    this.head.rotation.z = mb * Math.sin(phase * 4) * 0.02;
                    // Idle head movement
                    this.head.rotation.x = (1 - mb) * idleLookX;
                    this.head.rotation.y = (1 - mb) * idleLookY;
                }
                // Shadow scales with movement (stretches when running)
                if (this.shadow) {
                    this.shadow.scale.x = 1 + mb * speedNorm * 0.15;
                    this.shadow.scale.y = 1 - mb * speedNorm * 0.08;
                }

                // ---- THROW ANIMATION ----
                if (this.isThrowing) {
                    this.throwAnimTime = (this.throwAnimTime || 0) + deltaTime;
                    const t = this.throwAnimTime;
                    if (t < 0.15) {
                        // Wind-up: right arm swings back, torso leans back
                        const windUp = t / 0.15;
                        if (this.rightArm) this.rightArm.rotation.x = -1.2 * windUp;
                        if (this.torso) this.torso.rotation.x = -0.08 * windUp;
                    } else if (t < 0.35) {
                        // Release: arm swings forward fast, torso snaps forward
                        const release = (t - 0.15) / 0.2;
                        if (this.rightArm) this.rightArm.rotation.x = -1.2 + 2.4 * release;
                        if (this.torso) this.torso.rotation.x = -0.08 + 0.2 * release;
                    } else if (t < 0.6) {
                        // Follow-through: arm settles, torso returns
                        const settle = (t - 0.35) / 0.25;
                        if (this.rightArm) this.rightArm.rotation.x = 1.2 * (1 - settle);
                        if (this.torso) this.torso.rotation.x = 0.12 * (1 - settle);
                    } else {
                        this.isThrowing = false;
                    }
                }

                // ---- EYE TRACKING ----
                if (this.pupils && this.pupils.length > 0) {
                    const basePupilZ = this.role === 'menehune' ? 0.31 : 0.255;
                    // Look toward movement direction when moving, random glance when idle
                    let trackX = 0, trackZ = 0;
                    if (speed > 0.5) {
                        trackZ = 0.012; // eyes look forward when moving
                        trackX = Math.sin(phase * 4) * 0.003; // slight side tracking
                    } else if (this.idleTimer > 2.0) {
                        // Random idle glancing
                        trackX = Math.sin(this.animTime * 0.4 + 2) * 0.008;
                        trackZ = Math.sin(this.animTime * 0.3) * 0.005;
                    }
                    const baseXSpread = this.role === 'menehune' ? 0.12 : 0.1;
                    this.pupils.forEach((pupil, idx) => {
                        pupil.position.z = basePupilZ + trackZ;
                        const baseX = (idx === 0 ? -baseXSpread : baseXSpread);
                        pupil.position.x = baseX + trackX;
                    });
                }

                // ---- BLINKING (variable interval) ----
                if (this.eyes && this.eyes.length > 0) {
                    // Blink cycle varies: faster when moving (alertness)
                    const blinkCycle = this.isMoving ? 3.0 : 4.5;
                    const cyclePos = (this.animTime % blinkCycle) / blinkCycle;
                    let blinkScale = 1.0;
                    if (cyclePos > 0.9 && cyclePos < 0.94) {
                        const blinkPhase = (cyclePos - 0.9) / 0.04;
                        blinkScale = 1.0 - blinkPhase * 0.92;
                    } else if (cyclePos > 0.94 && cyclePos < 0.98) {
                        const recoveryPhase = (cyclePos - 0.94) / 0.04;
                        blinkScale = 0.08 + recoveryPhase * 0.92;
                    }
                    // Double-blink occasionally (every ~3rd cycle)
                    const dblCycle = (this.animTime % (blinkCycle * 3)) / (blinkCycle * 3);
                    if (dblCycle > 0.95 && dblCycle < 0.97) {
                        blinkScale = Math.min(blinkScale, 0.2);
                    }
                    this.eyes.forEach(eye => {
                        eye.scale.y = blinkScale;
                    });
                }

                // Grass skirt physics animation (menehune only) — blended with movement
                if (this.role === 'menehune' && this.skirtStrips && this.skirtStrips.length > 0) {
                    this.skirtStrips.forEach((strip, i) => {
                        const baseRot = strip.userData.baseRot || 0;
                        // Walking: vigorous stride-synced sway with speed scaling
                        const walkSway = Math.sin(phase * 6 + i * 0.5) * (0.15 + speedNorm * 0.25);
                        // Inertia lag — strips trail behind movement
                        const inertiaLag = mb * Math.sin(phase * 4 + i * 0.3) * 0.08;
                        // Idle: gentle breeze-like sway with varied frequency per strip
                        const idleSway = Math.sin(this.animTime * (1.3 + i * 0.1) + i * 0.4) * 0.04;
                        strip.rotation.x = baseRot + mb * (walkSway + inertiaLag) + (1 - mb) * idleSway;
                        // Lateral swing during walking
                        strip.rotation.z = (strip.userData.baseRotZ || 0) + mb * Math.sin(phase * 4 + i * 0.7) * 0.06;
                    });
                }
            }

            hide(propIndex) {
                if (propIndex >= 0 && propIndex < props.length) {
                    this.isTransformed = true;
                    this.hiddenPropIndex = propIndex;
                    props[propIndex].hidden = true;
                    props[propIndex].hiddenBy = this.id;
                    this.mesh.visible = false;
                }
            }

            unhide() {
                if (this.hiddenPropIndex !== null) {
                    props[this.hiddenPropIndex].hidden = false;
                    props[this.hiddenPropIndex].hiddenBy = null;
                }
                this.isTransformed = false;
                this.hiddenPropIndex = null;
                this.mesh.visible = true;
            }

            throwCoconut(direction) {
                const now = Date.now();
                if (now - this.lastThrowTime < 300) return;
                this.lastThrowTime = now;
                // Trigger throw animation (arm wind-up and release)
                this.throwAnimTime = 0;
                this.isThrowing = true;
                const coconut = {
                    position: this.position.clone().add(new THREE.Vector3(0, 1, 0)),
                    velocity: direction.clone().multiplyScalar(15),
                    life: 5,
                    mesh: null,
                };
                // Detailed coconut — slightly oval, fiber texture, three eye spots
                const cocoGroup = new THREE.Group();
                const cocoGeo = new THREE.SphereGeometry(0.15, 14, 12);
                const ccp = cocoGeo.attributes.position;
                // Make slightly oval + fiber bumps
                for (let v = 0; v < ccp.count; v++) {
                    const x = ccp.getX(v), y = ccp.getY(v), z = ccp.getZ(v);
                    const fiber = Math.sin(y * 20 + x * 10) * 0.003 + Math.sin(z * 15) * 0.002;
                    ccp.setX(v, x * 1.05 + fiber);
                    ccp.setY(v, y * 0.92);
                    ccp.setZ(v, z * 1.02 + fiber);
                }
                cocoGeo.computeVertexNormals();
                const shell = new THREE.Mesh(cocoGeo,
                    new THREE.MeshPhongMaterial({ color: 0x8B5E3C, map: barkTex, shininess: 30 })
                );
                shell.castShadow = true;
                cocoGroup.add(shell);
                // Three eye spots (recessed dark spots with lighter rim)
                for (let d = 0; d < 3; d++) {
                    const da = (Math.PI * 2 / 3) * d;
                    // Rim
                    const rim = new THREE.Mesh(
                        new THREE.CircleGeometry(0.025, 8),
                        new THREE.MeshPhongMaterial({ color: 0x5A4030, side: THREE.DoubleSide })
                    );
                    rim.position.set(Math.cos(da) * 0.09, 0.1, Math.sin(da) * 0.09);
                    rim.lookAt(rim.position.clone().multiplyScalar(2));
                    cocoGroup.add(rim);
                    // Dark center
                    const dot = new THREE.Mesh(
                        new THREE.CircleGeometry(0.015, 6),
                        new THREE.MeshPhongMaterial({ color: 0x1A0A00, side: THREE.DoubleSide })
                    );
                    dot.position.set(Math.cos(da) * 0.095, 0.1, Math.sin(da) * 0.095);
                    dot.lookAt(dot.position.clone().multiplyScalar(2));
                    cocoGroup.add(dot);
                }
                coconut.mesh = cocoGroup;
                coconut.mesh.position.copy(coconut.position);
                scene.add(coconut.mesh);
                projectiles.push(coconut);
            }
        }

        let players = {};
        let localPlayer = null;
        let projectiles = [];

        // ============ GAME CONFIGURATION ============
        // Define game parameters and behavior constants
        const GAME_CONFIG = {
            // Timer configuration
            GAME_TIME_LIMIT: 300, // 5 minutes for expanded map
            TIME_DISPLAY_UPDATE_INTERVAL: 1000, // Update display every second

            // Movement configuration
            MENEHUNE_SPEED: 8, // Movement speed for Menehune players
            HUNTER_SPEED: 8, // Movement speed for Hunter players
            BOT_MENEHUNE_SPEED: 5, // Bot menehune movement speed
            BOT_HUNTER_SPEED: 6, // Bot hunter movement speed
            FRICTION: 0.9, // How much velocity decays each frame

            // Coconut throwing configuration
            COCONUT_SPEED: 15, // Initial velocity of thrown coconuts
            COCONUT_MIN_THROW_INTERVAL: 300, // Milliseconds between throws
            COCONUT_LIFETIME: 5, // Seconds before coconut disappears
            COCONUT_GRAVITY: 9.8, // Gravity acceleration for projectiles

            // Transform mechanics (hiding)
            MENEHUNE_HIDE_RANGE: 3, // Distance to hide as Menehune
            BOT_HIDE_CHANCE: 0.02, // Probability each frame to hide
            BOT_UNHIDE_CHANCE: 0.01, // Probability each frame to unhide
            BOT_MOVE_CHANGE_CHANCE: 0.05, // Probability to change direction

            // Hunter bot behavior
            HUNTER_DETECT_RANGE: 20, // Range for hunters to engage menehune (expanded map)
            HUNTER_THROW_CHANCE: 0.1, // Chance to throw coconut when in range

            // Map boundaries — expanded world
            MAP_BOUNDARY_X: 180,
            MAP_BOUNDARY_Z: 180,
            MAP_MIN_Z: -180,

            // Prop system
            TOTAL_PROPS: 80, // Number of hiding spots
            PROP_HEIGHT_OFFSET: 0.5, // Height above ground for props
        };

        // Verify all procedural textures were created using CanvasTexture technology
        // These textures are critical for the dramatic visual upgrade - they provide:
        // - sandTex: beach sand with grain detail via CanvasTexture
        // - grassTex: vegetation with blade-like streaks via CanvasTexture
        // - woodTex: wood grain patterns via CanvasTexture
        // - stoneTex: rocky/granite texture via CanvasTexture
        // - thatchTex: roof thatch material via CanvasTexture
        // - waterTex: ocean foam and wave patterns via CanvasTexture
        // - barkTex: tree bark with grain lines via CanvasTexture
        // - leafTex: leaf vein patterns via CanvasTexture
        // - coralTex: coral structure detail via CanvasTexture
        // - seagullTex: bird feather patterns via CanvasTexture
        // - gravelTex: gravel and stone scattering via CanvasTexture

        // ============ BOT MANAGER ============
        class BotManager {
            constructor() {
                this.bots = [];
            }

            createBots(playerRole) {
                this.bots = [];
                const menehuneBots = playerRole === 'hunter' ? 4 : 2;
                const hunterBots = playerRole === 'menehune' ? 3 : 1;
                for (let i = 0; i < menehuneBots; i++) {
                    const id = 'bot-menehune-' + i;
                    const bot = new Player(id, 'menehune', false);
                    bot.position.set((Math.random() - 0.5) * 250, 0, (Math.random() - 0.5) * 250);
                    players[id] = bot;
                    this.bots.push(bot);
                }
                for (let i = 0; i < hunterBots; i++) {
                    const id = 'bot-hunter-' + i;
                    const bot = new Player(id, 'hunter', false);
                    bot.position.set((Math.random() - 0.5) * 250, 0, (Math.random() - 0.5) * 250);
                    players[id] = bot;
                    this.bots.push(bot);
                }
            }

            updateBots(deltaTime) {
                for (const bot of this.bots) {
                    if (bot.role === 'menehune') {
                        this.updateMenehune(bot);
                    } else {
                        this.updateHunter(bot);
                    }
                }
            }

            updateMenehune(bot) {
                if (bot.isEliminated) return;
                if (!bot.isTransformed && Math.random() < GAME_CONFIG.BOT_HIDE_CHANCE) {
                    // Find nearest available (non-hidden) prop
                    const available = props
                        .map((p, i) => ({ ...p, idx: i }))
                        .filter(p => !p.hidden)
                        .sort((a, b) => a.position.distanceTo(bot.position) - b.position.distanceTo(bot.position));
                    if (available.length > 0 && available[0].position.distanceTo(bot.position) < 8) {
                        bot.hide(available[0].idx);
                    }
                }
                if (bot.isTransformed && Math.random() < GAME_CONFIG.BOT_UNHIDE_CHANCE) {
                    bot.unhide();
                }
                if (!bot.isTransformed) {
                    if (Math.random() < GAME_CONFIG.BOT_MOVE_CHANGE_CHANCE) {
                        // Move toward nearest available prop
                        const available = props.filter(p => !p.hidden);
                        if (available.length > 0) {
                            const target = available.sort((a, b) =>
                                a.position.distanceTo(bot.position) - b.position.distanceTo(bot.position)
                            )[0];
                            const dir = new THREE.Vector3().subVectors(target.position, bot.position).normalize();
                            bot.velocity.copy(dir.multiplyScalar(GAME_CONFIG.BOT_MENEHUNE_SPEED));
                        } else {
                            const angle = Math.random() * Math.PI * 2;
                            bot.velocity.set(Math.cos(angle) * 5, 0, Math.sin(angle) * 5);
                        }
                    }
                }
            }

            updateHunter(bot) {
                // Only detect non-hidden, non-eliminated menehune
                const visibleMenehune = Object.values(players)
                    .filter(p => p.role === 'menehune' && !p.isTransformed && !p.isEliminated);
                const closestMenehune = visibleMenehune
                    .sort((a, b) => a.position.distanceTo(bot.position) - b.position.distanceTo(bot.position))[0];
                if (closestMenehune && closestMenehune.position.distanceTo(bot.position) < GAME_CONFIG.HUNTER_DETECT_RANGE) {
                    const direction = new THREE.Vector3().subVectors(closestMenehune.position, bot.position).normalize();
                    bot.velocity.copy(direction.multiplyScalar(6));
                    if (closestMenehune.position.distanceTo(bot.position) < 10) {
                        if (Math.random() < GAME_CONFIG.HUNTER_THROW_CHANCE) {
                            bot.throwCoconut(direction);
                        }
                    }
                } else {
                    if (Math.random() < 0.05) {
                        const angle = Math.random() * Math.PI * 2;
                        bot.velocity.set(Math.cos(angle) * 5, 0, Math.sin(angle) * 5);
                    }
                }
            }
        }

        const botManager = new BotManager();

        // ============ GAME STATE ============
        let gameState = {
            active: false,
            soloMode: false,
            startTime: 0,
            timeLimit: 300
        };

        // Override default game time limit if needed
        gameState.timeLimit = GAME_CONFIG.GAME_TIME_LIMIT;

        // ============ GAME LOGIC ============
        function startGame(role, isSolo = false) {
            players = {};
            projectiles = [];
            localPlayer = new Player('local-' + Date.now(), role, true);
            localPlayer.position.set(role === 'menehune' ? 60 : -60, 0, 0);
            players[localPlayer.id] = localPlayer;

            gameState.active = true;
            gameState.soloMode = isSolo;
            gameState.startTime = Date.now();

            if (isSolo) {
                botManager.createBots(role);
            }

            document.getElementById('lobby').classList.remove('visible');
            document.getElementById('game-hud').classList.add('visible');
            document.getElementById('end-screen').classList.remove('visible');

            const roleStr = localPlayer.role === 'menehune' ? '🌿 MENEHUNE' : '🏹 HUNTER';
            document.getElementById('role-badge').textContent = roleStr;
            document.getElementById('role-badge').className = 'role-badge ' + (localPlayer.role === 'menehune' ? 'menehune-badge' : 'hunter-badge');
        }

        function endGame(forceWinner) {
            gameState.active = false;
            document.getElementById('crosshair').style.display = 'none';
            document.getElementById('target-indicator').style.display = 'none';
            // Determine winner: if all menehune are eliminated → hunters win; if timer ran out → menehune win
            let hunterWin;
            if (forceWinner === 'hunters') {
                hunterWin = true;
            } else if (forceWinner === 'menehune') {
                hunterWin = false;
            } else {
                const aliveMenehune = Object.values(players).filter(p => p.role === 'menehune' && !p.isEliminated);
                hunterWin = aliveMenehune.length === 0;
            }

            const endTitle = document.getElementById('end-title');
            if (hunterWin) {
                endTitle.textContent = '🏆 HUNTERS WIN!';
                endTitle.className = 'end-title hunters-win';
            } else {
                endTitle.textContent = '🌿 MENEHUNE WIN!';
                endTitle.className = 'end-title menehune-win';
            }

            // Show stats
            let statsHtml = '';
            Object.values(players).forEach(p => {
                const status = p.isEliminated ? '❌ Found' : '✅ Survived';
                const name = p.isLocal ? 'You' : (p.id.startsWith('bot') ? p.id.replace('bot-','Bot ') : p.id);
                statsHtml += '<div>' + name + ' (' + p.role + '): ' + status + '</div>';
            });
            const statsEl = document.getElementById('end-stats');
            if (statsEl) statsEl.innerHTML = statsHtml;

            document.getElementById('game-hud').classList.remove('visible');
            document.getElementById('end-screen').classList.add('visible');
        }

        // Helper: attach both click and touchend for reliable mobile tap handling
        function onTap(el, fn) {
            let touched = false;
            el.addEventListener('touchend', (e) => {
                e.preventDefault();
                touched = true;
                fn();
            }, { passive: false });
            el.addEventListener('click', (e) => {
                if (touched) { touched = false; return; } // Already handled by touchend
                fn();
            });
        }

        onTap(document.getElementById('play-menehune'), () => {
            startGame('menehune', true);
        });

        onTap(document.getElementById('play-hunter'), () => {
            startGame('hunter', true);
        });

        onTap(document.getElementById('solo-btn'), () => {
            // Show role selection buttons, hide main lobby buttons
            document.getElementById('solo-btn').style.display = 'none';
            document.getElementById('create-btn').style.display = 'none';
            document.getElementById('join-btn').style.display = 'none';
            document.getElementById('play-menehune').style.display = 'block';
            document.getElementById('play-hunter').style.display = 'block';
        });

        onTap(document.getElementById('restart-btn'), () => {
            // Clean up all player meshes from the scene
            Object.values(players).forEach(p => {
                if (p.mesh) scene.remove(p.mesh);
            });
            players = {};
            localPlayer = null;

            // Clean up all projectile meshes
            projectiles.forEach(proj => {

        // ============ INPUT & CONTROLS ============
        const keys = {};
        const joystickState = { x: 0, y: 0, pressed: false };
        const cameraState = { angle: 0, pitch: 0.3, touchId: null, lastX: 0, lastY: 0 };

        // Right-side touch for camera rotation
        // Only preventDefault during active gameplay — otherwise lobby/end screen buttons won't work
        document.addEventListener('touchstart', (e) => {
            // Only preventDefault for camera touches, not UI elements
            for (const touch of e.changedTouches) {
                // Only capture touches on the right half of the screen (not on action button or joystick)
                if (touch.clientX > window.innerWidth * 0.4 && cameraState.touchId === null && gameState.active) {
                    const abtn = document.getElementById('action-btn');
                    const btnRect = abtn.getBoundingClientRect();
                    // Avoid capturing touches on the action button
                    if (touch.clientX >= btnRect.left && touch.clientX <= btnRect.right &&
                        touch.clientY >= btnRect.top && touch.clientY <= btnRect.bottom) continue;
                    cameraState.touchId = touch.identifier;
                    cameraState.lastX = touch.clientX;
                    cameraState.lastY = touch.clientY;
                    e.preventDefault();
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            for (const touch of e.changedTouches) {
                if (touch.identifier === cameraState.touchId) {
                    e.preventDefault();
                    const dx = touch.clientX - cameraState.lastX;
                    const dy = touch.clientY - cameraState.lastY;
                    cameraState.angle -= dx * 0.005;
                    cameraState.pitch = Math.max(0.1, Math.min(0.8, cameraState.pitch + dy * 0.003));
                    cameraState.lastX = touch.clientX;
                    cameraState.lastY = touch.clientY;
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            for (const touch of e.changedTouches) {
                if (touch.identifier === cameraState.touchId) {
                    cameraState.touchId = null;
                }
            }
        });

        window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();

                }
            });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        // Joystick
        const joystickContainer = document.getElementById('joystick-container');
        const joystickKnob = document.getElementById('joystick-knob');

        let joystickTouchId = null;

        joystickContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const touch = e.changedTouches[0];
            joystickTouchId = touch.identifier;
            joystickState.pressed = true;
            handleJoystickMove(touch);
        }, { passive: false });

        joystickContainer.addEventListener('touchmove', (e) => {
            e.preventDefault();
            e.stopPropagation();
            for (const touch of e.changedTouches) {
                if (touch.identifier === joystickTouchId && joystickState.pressed) {
                    handleJoystickMove(touch);
                }
            }
        }, { passive: false });

        function resetJoystick() {
            joystickTouchId = null;
            joystickState.pressed = false;
            joystickState.x = 0;
            joystickState.y = 0;
            joystickKnob.style.transform = 'translate(37px, 37px)';
        }

        joystickContainer.addEventListener('touchend', (e) => {
            for (const touch of e.changedTouches) {
                if (touch.identifier === joystickTouchId) {
                    resetJoystick();
                }
            }
        });

        joystickContainer.addEventListener('touchcancel', (e) => {
            resetJoystick();
        });

        function handleJoystickMove(touch) {
            const rect = joystickContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = (touch.clientX - centerX) / (rect.width / 2);
            const dy = (touch.clientY - centerY) / (rect.height / 2);
            const len = Math.sqrt(dx*dx + dy*dy);

            if (len > 1) {
                joystickState.x = dx / len;
                joystickState.y = dy / len;
            } else {
                joystickState.x = dx;
                joystickState.y = dy;
            }

            joystickKnob.style.transform = `translate(calc(37px + ${joystickState.x * 37}px), calc(37px + ${joystickState.y * 37}px))`;
        }

        }, { passive: false });

            onAction();

        // Auto-targeting system for hunters
        let currentTarget = null;

        function findBestTarget() {
            if (!localPlayer || localPlayer.role !== 'hunter') return null;
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            let bestTarget = null;
            let bestScore = Infinity;
            Object.values(players).forEach(p => {
                if (p.role !== 'menehune' || p.isEliminated) return;
                let targetPos = p.position.clone();
                targetPos.y += 0.5;
                if (p.isTransformed && p.hiddenPropIndex !== null && props[p.hiddenPropIndex]) {
                    targetPos = props[p.hiddenPropIndex].position.clone();
                    targetPos.y += 0.5;
                }
                const dist = localPlayer.position.distanceTo(targetPos);
                if (dist > 40) return;
                const toTarget = targetPos.clone().sub(camera.position).normalize();
                const angle = camDir.angleTo(toTarget);
                if (angle > Math.PI / 3) return;
                const score = dist * 0.5 + angle * 20;
                if (score < bestScore) {
                    bestScore = score;
                    bestTarget = { player: p, position: targetPos, dist: dist, angle: angle };
                }
            });
            return bestTarget;
        }

        function onAction() {
            if (!gameState.active || !localPlayer) return;

            if (localPlayer.role === 'menehune') {
                if (!localPlayer.isTransformed) {
                    const closestProp = props
                        .map((p, i) => ({ ...p, index: i }))
                        .filter(p => !p.hidden)
                        .sort((a, b) => a.position.distanceTo(localPlayer.position) - b.position.distanceTo(localPlayer.position))[0];

                    if (closestProp && closestProp.position.distanceTo(localPlayer.position) < 3) {
                        localPlayer.hide(closestProp.index);
                    }
                } else {
                    localPlayer.unhide();
                }
            } else {
                const target = findBestTarget();
                let direction;
                if (target) {
                    direction = target.position.clone().sub(localPlayer.position);
                    const dist = direction.length();
                    const arcHeight = Math.min(0.5, dist * 0.04);
                    direction.normalize();
                    direction.y += arcHeight;
                    direction.normalize();
                } else {
                    direction = new THREE.Vector3();
                    camera.getWorldDirection(direction);
                    direction.y = 0.2;
                    direction.normalize();
                }
                localPlayer.throwCoconut(direction);
            }
        }// ============ GRASS TUFTS ============
        function createGrassTufts() {
            const group = new THREE.Group();
            const greenColors = [0x2D5016, 0x3A6A1F, 0x4A7A2E, 0x5A8A3E, 0x467025];
            for (let i = 0; i < 500; i++) {
                const x = (Math.random() - 0.5) * 360;
                const z = -80 + Math.random() * 240;
                const tuftGroup = new THREE.Group();
                const bladeCount = 3 + Math.floor(Math.random() * 3); // 3-5 blades per tuft
                for (let j = 0; j < bladeCount; j++) {
                    const angle = (Math.PI * 2 / bladeCount) * j + Math.random() * 0.4;
                    const bladeH = 0.5 + Math.random() * 0.5;
                    const bladeW = 0.08 + Math.random() * 0.1;
                    const geo = new THREE.PlaneGeometry(bladeW, bladeH, 1, 5);
                    const gp = geo.attributes.position;
                    for (let v = 0; v < gp.count; v++) {
                        const vy = gp.getY(v), vx = gp.getX(v);
                        const t = (vy + bladeH / 2) / bladeH;
                        // Taper toward tip
                        gp.setX(v, vx * (1 - t * 0.7));
                        // Slight curve
                        gp.setZ(v, t * t * 0.08 * (j % 2 === 0 ? 1 : -1));
                    }
                    geo.computeVertexNormals();
                    const color = greenColors[Math.floor(Math.random() * greenColors.length)];
                    const mat = new THREE.MeshPhongMaterial({ color: color, side: THREE.DoubleSide, shininess: 12 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(Math.cos(angle) * 0.08, 0, Math.sin(angle) * 0.08);
                    mesh.rotation.y = angle;
                    mesh.rotation.z = 0.2 + Math.random() * 0.3;
                    tuftGroup.add(mesh);
                }
                tuftGroup.position.set(x, 0.1, z);
                group.add(tuftGroup);
            }
            return group;
        }
        scene.add(createGrassTufts());

        // ============ STEPPING STONES ============
        function createSteppingStones() {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0x7A7A6A, map: stoneTex, shininess: 15 });
            const mossMat = new THREE.MeshPhongMaterial({ color: 0x3A6A1F, shininess: 5, transparent: true, opacity: 0.7 });
            function makeIrregularStone(r1, r2, h) {
                const geo = new THREE.CylinderGeometry(r1, r2, h, 12, 1);
                const p = geo.attributes.position;
                for (let v = 0; v < p.count; v++) {
                    const x = p.getX(v), z = p.getZ(v);
                    const angle = Math.atan2(z, x);
                    const wobble = 1 + Math.sin(angle * 3) * 0.1 + Math.sin(angle * 7) * 0.05;
                    p.setX(v, x * wobble);
                    p.setZ(v, z * wobble);
                }
                geo.computeVertexNormals();
                return geo;
            }
            // Ring of stones around village
            for (let i = 0; i < 15; i++) {
                const angle = (Math.PI * 2 / 15) * i;
                const distance = 20 + (i % 2) * 5;
                const x = Math.cos(angle) * distance;
                const z = Math.sin(angle) * distance + 40;
                const stone = new THREE.Mesh(makeIrregularStone(0.5, 0.55, 0.08), mat);
                stone.castShadow = true;
                stone.receiveShadow = true;
                stone.position.set(x, 0.04, z);
                stone.rotation.y = Math.random() * Math.PI;
                group.add(stone);
                // Occasional moss patch
                if (Math.random() > 0.6) {
                    const moss = new THREE.Mesh(new THREE.CircleGeometry(0.15 + Math.random() * 0.1, 6), mossMat);
                    moss.position.set(x + (Math.random() - 0.5) * 0.2, 0.09, z + (Math.random() - 0.5) * 0.2);
                    moss.rotation.x = -Math.PI / 2;
                    group.add(moss);
                }
            }
            // Path stepping stones
            for (let i = 0; i < 25; i++) {
                const r = 0.4 + Math.random() * 0.2;
                const stone = new THREE.Mesh(makeIrregularStone(r, r + 0.1, 0.06), mat);
                stone.castShadow = true;
                stone.receiveShadow = true;
                stone.position.set((Math.random() - 0.5) * 3, 0.03, -80 + i * 10 + Math.random() * 5);
                stone.rotation.y = Math.random() * Math.PI;
                group.add(stone);
            }
            return group;
        }
        scene.add(createSteppingStones());

        // ============ BEACH FOAM LINE ============
        function createBeachFoam() {
            const group = new THREE.Group();
            const foamMat = new THREE.MeshPhongMaterial({
                color: 0xFFFFFF,
                transparent: true,
                opacity: 0.35,
                side: THREE.DoubleSide,
                depthWrite: false,
            });
            // Multiple foam strips at slightly different Z positions for depth
            for (let strip = 0; strip < 4; strip++) {
                const w = 400;
                const h = 3.5 - strip * 0.6;
                const geo = new THREE.PlaneGeometry(w, h, 100, 6);
                // Multi-frequency wave for organic foam edge
                const fp = geo.attributes.position;
                for (let v = 0; v < fp.count; v++) {
                    const x = fp.getX(v);
                    const y = fp.getY(v);
                    fp.setY(v, y
                        + Math.sin(x * 0.08 + strip * 1.3) * 0.6
                        + Math.sin(x * 0.25 + strip * 0.7) * 0.25
                        + Math.sin(x * 0.5) * 0.1
                    );
                }
                // Vertex colors for foam density variation
                const foamColors = new Float32Array(fp.count * 3);
                for (let v = 0; v < fp.count; v++) {
                    const bright = 0.85 + Math.random() * 0.15;
                    foamColors[v*3] = bright;
                    foamColors[v*3+1] = bright;
                    foamColors[v*3+2] = bright + 0.05;
                }
                geo.setAttribute('color', new THREE.BufferAttribute(foamColors, 3));
                geo.computeVertexNormals();
                const mat = foamMat.clone();
                mat.vertexColors = true;
                mat.opacity = 0.32 - strip * 0.06;
                const mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.set(0, 0.04 + strip * 0.012, -157.5 + strip * 2.2);
                mesh.receiveShadow = true;
                group.add(mesh);
            }
            // Bubble clusters scattered along the foam line
            const bubbleMat = new THREE.MeshPhongMaterial({
                color: 0xEEFFFF, transparent: true, opacity: 0.25, shininess: 80, specular: 0xFFFFFF, depthWrite: false
            });
            for (let i = 0; i < 40; i++) {
                const bx = (Math.random() - 0.5) * 380;
                const bz = -157 + Math.random() * 6;
                const clusterSize = 2 + Math.floor(Math.random() * 4);
                for (let b = 0; b < clusterSize; b++) {
                    const bub = new THREE.Mesh(
                        new THREE.SphereGeometry(0.04 + Math.random() * 0.08, 6, 6),
                        bubbleMat
                    );
                    bub.position.set(bx + (Math.random() - 0.5) * 0.4, 0.06, bz + (Math.random() - 0.5) * 0.4);
                    group.add(bub);
                }
            }
            group.userData.foamMats = group.children.filter(c => c.isMesh && c.material.vertexColors).map(c => c.material);
            return group;
        }
        const beachFoam = createBeachFoam();
        scene.add(beachFoam);

                for (let v = 0; v < lp.count; v++) {
                    const ly = lp.getY(v);
                    // Ends are more charred
                    const charFactor = Math.pow(Math.abs(ly) / (logLen / 2), 2);
                    logColors[v * 3] = 1 - charFactor * 0.7;
                    logColors[v * 3 + 1] = 1 - charFactor * 0.8;
                    logColors[v * 3 + 2] = 1 - charFactor * 0.85;

                logGeo.setAttribute('color', new THREE.BufferAttribute(logColors, 3));
                const logMat = woodMat.clone();
