                return group;
            }

            update(deltaTime) {
                this.velocity.multiplyScalar(0.9);
                this.position.add(this.velocity.clone().multiplyScalar(deltaTime));
                this.position.x = Math.max(-GAME_CONFIG.MAP_BOUNDARY_X, Math.min(GAME_CONFIG.MAP_BOUNDARY_X, this.position.x));
                this.position.z = Math.max(-GAME_CONFIG.MAP_BOUNDARY_Z, Math.min(GAME_CONFIG.MAP_BOUNDARY_Z, this.position.z));
                this.position.y = 0;
                this.mesh.position.copy(this.position);

                // Walking animation
                const speed = this.velocity.length();
                this.isMoving = speed > 0.5;
                if (this.isMoving) {
                    this.animTime += deltaTime * speed * 1.2;
                    const swing = Math.sin(this.animTime * 4) * 0.6;
                    const armSwing = Math.sin(this.animTime * 4) * 0.5;
                    // Legs swing opposite to each other
                    if (this.leftLeg) this.leftLeg.rotation.x = swing;
                    if (this.rightLeg) this.rightLeg.rotation.x = -swing;
                    // Arms swing opposite to legs
                    if (this.leftArm) this.leftArm.rotation.x = -armSwing;
                    if (this.rightArm) this.rightArm.rotation.x = armSwing;
                    // Subtle torso bob (set to base + offset, not accumulate)
                    if (this.torso) {
                        const baseY = this.role === 'menehune' ? 0.55 : 0.7;
                        this.torso.position.y = baseY + Math.sin(this.animTime * 8) * 0.005;
                    }
                } else {
                    // Idle — subtle breathing sway
                    this.animTime += deltaTime;
                    const breath = Math.sin(this.animTime * 2) * 0.02;
                    if (this.leftArm) this.leftArm.rotation.x = breath;
                    if (this.rightArm) this.rightArm.rotation.x = -breath;
                    if (this.leftLeg) this.leftLeg.rotation.x = 0;
                    if (this.rightLeg) this.rightLeg.rotation.x = 0;
                }

                // Eye tracking and blinking animation
                if (this.pupils && this.pupils.length > 0) {
                    // Eye tracking: offset pupil Z based on movement direction
                    const trackOffset = this.velocity.length() > 0.5 ? Math.sign(this.velocity.length()) * 0.01 : 0;
                    this.pupils.forEach(pupil => {
                        pupil.position.z = (this.role === 'menehune' ? 0.31 : 0.255) + trackOffset;
                    });
                }

                // Blinking animation (every 3-5 seconds)
                if (this.eyes && this.eyes.length > 0) {
                    const blinkCycle = 4.0; // blink cycle in seconds
                    const cyclePos = (this.animTime % blinkCycle) / blinkCycle;
                    let blinkScale = 1.0;
                    if (cyclePos > 0.9 && cyclePos < 0.95) {
                        // Blink (0.05 of cycle = 0.2 seconds at 4 second cycle)
                        const blinkPhase = (cyclePos - 0.9) / 0.05; // 0 to 1 during blink
                        blinkScale = 1.0 - blinkPhase * 0.9; // closes to 0.1 height
                    } else if (cyclePos > 0.95) {
                        // Recover from blink
                        const recoveryPhase = (cyclePos - 0.95) / 0.05;
                        blinkScale = 0.1 + recoveryPhase * 0.9;
                    }
                    this.eyes.forEach(eye => {
                        eye.scale.y = blinkScale;
                    });
                }

                // Grass skirt physics animation (menehune only)
                if (this.role === 'menehune' && this.skirtStrips && this.skirtStrips.length > 0) {
                    if (this.isMoving) {
                        // During movement: skirt sways based on velocity direction
                        this.skirtStrips.forEach((strip, i) => {
                            const baseRot = strip.userData.baseRot || 0;
                            strip.rotation.x = baseRot + Math.sin(this.animTime * 6 + i * 0.5) * 0.3;
                        });
                    } else {
                        // Idle: gentle sway
                        this.skirtStrips.forEach((strip, i) => {
                            const baseRot = strip.userData.baseRot || 0;
                            strip.rotation.x = baseRot + Math.sin(this.animTime * 1.5 + i * 0.4) * 0.05;
                        });
                    }
                }
            }

            hide(propIndex) {
                if (propIndex >= 0 && propIndex < props.length) {
                    this.isTransformed = true;
                    this.hiddenPropIndex = propIndex;
                    props[propIndex].hidden = true;
                    props[propIndex].hiddenBy = this.id;
                    this.mesh.visible = false;
                }
            }

            unhide() {
                if (this.hiddenPropIndex !== null) {
                    props[this.hiddenPropIndex].hidden = false;
                    props[this.hiddenPropIndex].hiddenBy = null;
                }
                this.isTransformed = false;
                this.hiddenPropIndex = null;
                this.mesh.visible = true;
            }

            throwCoconut(direction) {
                const now = Date.now();
                if (now - this.lastThrowTime < 300) return;
                this.lastThrowTime = now;
                const coconut = {
                    position: this.position.clone().add(new THREE.Vector3(0, 1, 0)),
                    velocity: direction.clone().multiplyScalar(15),
                    life: 5,
                    mesh: null,
                };
                // More detailed coconut with texture
                const cocoGroup = new THREE.Group();
                const shell = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15, 12, 12),
                    new THREE.MeshPhongMaterial({ color: 0x8B5E3C, map: barkTex, shininess: 30 })
                );
                shell.castShadow = true;
                cocoGroup.add(shell);
                // Three dots on the coconut
                for (let d = 0; d < 3; d++) {
                    const dot = new THREE.Mesh(
                        new THREE.SphereGeometry(0.025, 6, 6),
                        new THREE.MeshPhongMaterial({ color: 0x3A2A1A })
                    );
                    const da = (Math.PI * 2 / 3) * d;
                    dot.position.set(Math.cos(da) * 0.08, 0.1, Math.sin(da) * 0.08);
                    cocoGroup.add(dot);
                }
                coconut.mesh = cocoGroup;
                coconut.mesh.position.copy(coconut.position);
                scene.add(coconut.mesh);
                projectiles.push(coconut);
            }
        }

        let players = {};
        let localPlayer = null;
        let projectiles = [];

        // ============ GAME CONFIGURATION ============
        // Define game parameters and behavior constants
        const GAME_CONFIG = {
            // Timer configuration
            GAME_TIME_LIMIT: 300, // 5 minutes for expanded map
            TIME_DISPLAY_UPDATE_INTERVAL: 1000, // Update display every second

            // Movement configuration

            HUNTER_SPEED: 8, // Movement speed for Hunter players

        // Override default game time limit if needed

        // Verify all procedural textures were created using CanvasTexture technology

        // ============ BOT MANAGER ============
        class BotManager {
            constructor() {
                this.bots = [];
            }

            createBots(playerRole) {
                this.bots = [];
                const menehuneBots = playerRole === 'hunter' ? 4 : 2;
                const hunterBots = playerRole === 'menehune' ? 3 : 1;
                for (let i = 0; i < menehuneBots; i++) {
                    const id = 'bot-menehune-' + i;
                    const bot = new Player(id, 'menehune', false);
                    bot.position.set((Math.random() - 0.5) * 250, 0, (Math.random() - 0.5) * 250);
                    players[id] = bot;
                    this.bots.push(bot);
                }
                for (let i = 0; i < hunterBots; i++) {
                    const id = 'bot-hunter-' + i;
                    const bot = new Player(id, 'hunter', false);
                    bot.position.set((Math.random() - 0.5) * 250, 0, (Math.random() - 0.5) * 250);
                    players[id] = bot;
                    this.bots.push(bot);
                }
            }

            updateBots(deltaTime) {
                for (const bot of this.bots) {
                    if (bot.role === 'menehune') {
                        this.updateMenehune(bot);
                    } else {
                        this.updateHunter(bot);
                    }
                }
            }

            updateMenehune(bot) {
                if (bot.isEliminated) return;
                if (!bot.isTransformed && Math.random() < GAME_CONFIG.BOT_HIDE_CHANCE) {
                    // Find nearest available (non-hidden) prop
                    const available = props
                        .map((p, i) => ({ ...p, idx: i }))
                        .filter(p => !p.hidden)
                        .sort((a, b) => a.position.distanceTo(bot.position) - b.position.distanceTo(bot.position));
                    if (available.length > 0 && available[0].position.distanceTo(bot.position) < 8) {
                        bot.hide(available[0].idx);
                    }
                }
                if (bot.isTransformed && Math.random() < GAME_CONFIG.BOT_UNHIDE_CHANCE) {
                    bot.unhide();
                }
                if (!bot.isTransformed) {
                    if (Math.random() < GAME_CONFIG.BOT_MOVE_CHANGE_CHANCE) {
                        // Move toward nearest available prop
                        const available = props.filter(p => !p.hidden);
                        if (available.length > 0) {
                            const target = available.sort((a, b) =>
                                a.position.distanceTo(bot.position) - b.position.distanceTo(bot.position)
                            )[0];
                            const dir = new THREE.Vector3().subVectors(target.position, bot.position).normalize();
                            bot.velocity.copy(dir.multiplyScalar(GAME_CONFIG.BOT_MENEHUNE_SPEED));
                        } else {
                            const angle = Math.random() * Math.PI * 2;
                            bot.velocity.set(Math.cos(angle) * 5, 0, Math.sin(angle) * 5);
                        }
                    }
                }
            }

            updateHunter(bot) {
                // Only detect non-hidden, non-eliminated menehune
                const visibleMenehune = Object.values(players)
                    .filter(p => p.role === 'menehune' && !p.isTransformed && !p.isEliminated);
                const closestMenehune = visibleMenehune
                    .sort((a, b) => a.position.distanceTo(bot.position) - b.position.distanceTo(bot.position))[0];
                if (closestMenehune && closestMenehune.position.distanceTo(bot.position) < GAME_CONFIG.HUNTER_DETECT_RANGE) {
                    const direction = new THREE.Vector3().subVectors(closestMenehune.position, bot.position).normalize();
                    bot.velocity.copy(direction.multiplyScalar(6));
                    if (closestMenehune.position.distanceTo(bot.position) < 10) {
                        if (Math.random() < GAME_CONFIG.HUNTER_THROW_CHANCE) {
                            bot.throwCoconut(direction);
                        }
                    }
                } else {
                    if (Math.random() < 0.05) {
                        const angle = Math.random() * Math.PI * 2;
                        bot.velocity.set(Math.cos(angle) * 5, 0, Math.sin(angle) * 5);
                    }
                }
            }
        }

        const botManager = new BotManager();

        // ============ GAME STATE ============
        let gameState = {
            active: false,
            soloMode: false,
            startTime: 0,
            timeLimit: 300
        };

        // ============ GAME LOGIC ============
        function startGame(role, isSolo = false) {
            players = {};
            projectiles = [];
            localPlayer = new Player('local-' + Date.now(), role, true);
            localPlayer.position.set(role === 'menehune' ? 60 : -60, 0, 0);
            players[localPlayer.id] = localPlayer;

            gameState.active = true;
            gameState.soloMode = isSolo;
            gameState.startTime = Date.now();

            if (isSolo) {
                botManager.createBots(role);
            }

            document.getElementById('lobby').classList.remove('visible');
            document.getElementById('game-hud').classList.add('visible');
            document.getElementById('end-screen').classList.remove('visible');

            const roleStr = localPlayer.role === 'menehune' ? '🌿 MENEHUNE' : '🏹 HUNTER';
            document.getElementById('role-badge').textContent = roleStr;
            document.getElementById('role-badge').className = 'role-badge ' + (localPlayer.role === 'menehune' ? 'menehune-badge' : 'hunter-badge');
        }

        function endGame(forceWinner) {
            gameState.active = false;
            // Determine winner: if all menehune are eliminated → hunters win; if timer ran out → menehune win
            let hunterWin;
            if (forceWinner === 'hunters') {
                hunterWin = true;
            } else if (forceWinner === 'menehune') {
                hunterWin = false;
            } else {
                const aliveMenehune = Object.values(players).filter(p => p.role === 'menehune' && !p.isEliminated);
                hunterWin = aliveMenehune.length === 0;
            }

            const endTitle = document.getElementById('end-title');
            if (hunterWin) {
                endTitle.textContent = '🏆 HUNTERS WIN!';
                endTitle.className = 'end-title hunters-win';
            } else {
                endTitle.textContent = '🌿 MENEHUNE WIN!';
                endTitle.className = 'end-title menehune-win';
            }

            // Show stats
            let statsHtml = '';
            Object.values(players).forEach(p => {
                const status = p.isEliminated ? '❌ Found' : '✅ Survived';
                const name = p.isLocal ? 'You' : (p.id.startsWith('bot') ? p.id.replace('bot-','Bot ') : p.id);
                statsHtml += '<div>' + name + ' (' + p.role + '): ' + status + '</div>';
            });
            const statsEl = document.getElementById('end-stats');
            if (statsEl) statsEl.innerHTML = statsHtml;

            document.getElementById('game-hud').classList.remove('visible');
            document.getElementById('end-screen').classList.add('visible');
        }

        document.getElementById('play-menehune').addEventListener('click', () => {
            startGame('menehune', true);
        });

        document.getElementById('play-hunter').addEventListener('click', () => {

            document.getElementById('play-hunter').style.display = 'block';
        });

        document.getElementById('restart-btn').addEventListener('click', () => {

            Object.values(players).forEach(p => {
                if (p.mesh) scene.remove(p.mesh);
            });
            players = {};
            localPlayer = null;

            // Clean up all projectile meshes
            projectiles.forEach(proj => {
                if (proj.mesh) scene.remove(proj.mesh);
            });

            // Reset all props to unhidden state
            props.forEach(p => {
                p.hidden = false;
                p.hiddenBy = null;
            });

            // Reset bot manager
            botManager.bots = [];

            // Toggle screens
            document.getElementById('lobby').classList.add('visible');
            document.getElementById('game-hud').classList.remove('visible');
            document.getElementById('end-screen').classList.remove('visible');
        });

        // ============ INPUT & CONTROLS ============
        const keys = {};
        const joystickState = { x: 0, y: 0, pressed: false };
        const cameraState = { angle: 0, pitch: 0.3, touchId: null, lastX: 0, lastY: 0 };

        // Right-side touch for camera rotation
        // Only preventDefault during active gameplay — otherwise lobby/end screen buttons won't work
        document.addEventListener('touchstart', (e) => {
            if (gameState.active) {
                e.preventDefault();
            }
            for (const touch of e.changedTouches) {
                // Only capture touches on the right half of the screen (not on action button)
                if (touch.clientX > window.innerWidth * 0.4 && cameraState.touchId === null && gameState.active) {
                    const actionBtn = document.getElementById('action-btn');
                    const btnRect = actionBtn.getBoundingClientRect();
                    // Avoid capturing touches on the action button
                    if (touch.clientX >= btnRect.left && touch.clientX <= btnRect.right &&
                        touch.clientY >= btnRect.top && touch.clientY <= btnRect.bottom) continue;
                    cameraState.touchId = touch.identifier;
                    cameraState.lastX = touch.clientX;
                    cameraState.lastY = touch.clientY;
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (gameState.active) {
                e.preventDefault();
            }
            for (const touch of e.changedTouches) {
                if (touch.identifier === cameraState.touchId) {
                    const dx = touch.clientX - cameraState.lastX;
                    const dy = touch.clientY - cameraState.lastY;
                    cameraState.angle -= dx * 0.005;
                    cameraState.pitch = Math.max(0.1, Math.min(0.8, cameraState.pitch + dy * 0.003));
                    cameraState.lastX = touch.clientX;
                    cameraState.lastY = touch.clientY;
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            for (const touch of e.changedTouches) {
                if (touch.identifier === cameraState.touchId) {
                    cameraState.touchId = null;
                }
            }
        });

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        // Joystick
        const joystickContainer = document.getElementById('joystick-container');
        const joystickKnob = document.getElementById('joystick-knob');

        joystickContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            joystickState.pressed = true;
            handleJoystickMove(e.touches[0]);
        }, { passive: false });

        joystickContainer.addEventListener('touchmove', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (joystickState.pressed) handleJoystickMove(e.touches[0]);
        }, { passive: false });

        joystickContainer.addEventListener('touchend', () => {
            joystickState.pressed = false;
            joystickState.x = 0;
            joystickState.y = 0;
            joystickKnob.style.transform = 'translate(37px, 37px)';
        });

        function handleJoystickMove(touch) {
            const rect = joystickContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = (touch.clientX - centerX) / (rect.width / 2);
            const dy = (touch.clientY - centerY) / (rect.height / 2);
            const len = Math.sqrt(dx*dx + dy*dy);

            if (len > 1) {
                joystickState.x = dx / len;
                joystickState.y = dy / len;
            } else {
                joystickState.x = dx;
                joystickState.y = dy;
            }

            joystickKnob.style.transform = `translate(calc(37px + ${joystickState.x * 37}px), calc(37px + ${joystickState.y * 37}px))`;
        }

        // Action button
        document.getElementById('action-btn').addEventListener('click', () => {

        });

        function onAction() {
            if (!gameState.active || !localPlayer) return;

            if (localPlayer.role === 'menehune') {
                if (!localPlayer.isTransformed) {
                    const closestProp = props
                        .filter(p => !p.hidden)
                        .map((p, i) => ({ ...p, index: i }))
                        .sort((a, b) => a.position.distanceTo(localPlayer.position) - b.position.distanceTo(localPlayer.position))[0];

                    if (closestProp && closestProp.position.distanceTo(localPlayer.position) < 3) {
                        localPlayer.hide(closestProp.index);
                    }
                } else {
                    localPlayer.unhide();
                }
            } else {
                // Throw coconut in the direction the camera is facing
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                direction.y = 0.2; // slight upward arc
                direction.normalize();
                localPlayer.throwCoconut(direction);
            }
        }

        // ============ ANIMATION LOOP ============
        let lastTime = Date.now();
        function animate() {
            requestAnimationFrame(animate);

            const now = Date.now();
            const deltaTime = Math.min((now - lastTime) / 1000, 0.016);
            lastTime = now;

            // Update game
            if (gameState.active) {
                const elapsed = (now - gameState.startTime) / 1000;
                const remaining = Math.max(0, gameState.timeLimit - Math.floor(elapsed));
                document.getElementById('game-timer').textContent = remaining;

                if (remaining <= 0) {
                    endGame('menehune'); // Timer ran out — menehune survive!
                }

                // Player movement (camera-relative)
                if (localPlayer) {
                    const inputX = (keys['arrowleft'] || keys['a'] ? -1 : 0) + (keys['arrowright'] || keys['d'] ? 1 : 0) + joystickState.x;
                    const inputZ = (keys['arrowup'] || keys['w'] ? -1 : 0) + (keys['arrowdown'] || keys['s'] ? 1 : 0) + joystickState.y;

                    if (Math.abs(inputX) > 0.01 || Math.abs(inputZ) > 0.01) {
                        // Get camera forward/right vectors projected onto XZ plane
                        const camForward = new THREE.Vector3();
                        camera.getWorldDirection(camForward);
                        camForward.y = 0;
                        camForward.normalize();
                        const camRight = new THREE.Vector3().crossVectors(camForward, new THREE.Vector3(0, 1, 0)).normalize();

                        // Combine input with camera orientation
                        const move = new THREE.Vector3();
                        move.addScaledVector(camRight, inputX);
                        move.addScaledVector(camForward, -inputZ); // negative because joystick up = forward
                        move.normalize();
                        localPlayer.velocity.copy(move.multiplyScalar(8));

                        // Rotate player mesh to face movement direction
                        localPlayer.mesh.rotation.y = Math.atan2(move.x, move.z);
                    } else {
                        localPlayer.velocity.set(0, 0, 0);
                    }
                    localPlayer.update(deltaTime);
                }

                // Update other players
                Object.values(players).forEach(p => {
                    if (p !== localPlayer) p.update(deltaTime);
                });

                // Update bots
                if (gameState.soloMode) {
                    botManager.updateBots(deltaTime);
                }

                // Update projectiles with hit detection
                projectiles = projectiles.filter(proj => {
                    proj.position.add(proj.velocity.clone().multiplyScalar(deltaTime));
                    proj.velocity.y -= 9.8 * deltaTime;
                    proj.life -= deltaTime;
                    proj.mesh.position.copy(proj.position);

                    // Check collision with menehune players (hidden or visible)
                    let hit = false;
                    Object.values(players).forEach(p => {
                        if (p.role !== 'menehune' || p.isEliminated || hit) return;
                        // For hidden menehune, check distance to their hidden prop
                        let targetPos = p.position;
                        if (p.isTransformed && p.hiddenPropIndex !== null && props[p.hiddenPropIndex]) {
                            targetPos = props[p.hiddenPropIndex].position;
                        }
                        const dist = proj.position.distanceTo(targetPos);
                        if (dist < 2.0) {
                            p.isEliminated = true;
                            if (p.isTransformed) p.unhide();
                            p.mesh.visible = true;
                            // Gray out the eliminated player
                            p.mesh.traverse(child => {
                                if (child.material) {
                                    child.material = child.material.clone();
                                    child.material.color.set(0x666666);
                                }
                            });
                            hit = true;
                        }
                    });

                    if (hit) {
                        scene.remove(proj.mesh);
                        // Check if all menehune eliminated → hunters win
                        const alive = Object.values(players).filter(p => p.role === 'menehune' && !p.isEliminated);
                        if (alive.length === 0) endGame('hunters');
                        return false;
                    }

                    // Remove expired/fallen projectiles
                    if (proj.life <= 0 || proj.position.y < -10) {
                        scene.remove(proj.mesh);
                        return false;
                    }
                    return true;
                });

                document.getElementById('player-count').textContent = Object.keys(players).length;
            }

            // Animate ocean waves with multi-frequency for complex patterns
            const pos = ocean.geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = oceanPositions[i*3];
                const z = oceanPositions[i*3+2];
                const w1 = Math.sin(x*0.15 + now*0.002)*0.4;
                const w2 = Math.sin(x*0.08 + z*0.1 + now*0.0015)*0.6;
                const w3 = Math.cos(z*0.2 + now*0.001)*0.3;
                const w4 = Math.sin(x*0.12 + z*0.08 + now*0.0025)*0.2;
                // Wave amplitude varies across surface
                const distFromCenter = Math.sqrt(x*x + z*z) / 300;
                const amplitudeFactor = Math.max(0.5, 1 - distFromCenter * 0.5);
                pos.setY(i, (w1 + w2 + w3 + w4) * amplitudeFactor);
            }
            pos.needsUpdate = true;

            // Animate shoreline with subtle tide oscillation
            if (shoreMesh && shoreMesh.userData.baseZ !== undefined) {
                shoreMesh.position.z = shoreMesh.userData.baseZ + Math.sin(now * 0.0008) * 0.3;
            }

            // Animate ocean texture with drift and reflection
            ocean.material.map.offset.x = Math.sin(now * 0.0003) * 0.1;
            ocean.material.map.offset.y = now * 0.00005;

            // Animate clouds with drift
            clouds.children.forEach(cloud => {
                cloud.position.x += cloud.userData.cloudSpeed;
                if (cloud.position.x > 320) cloud.position.x = -320;
            });

            // Animate palm tree frond sway in wind
            palmTrees.forEach((palm, idx) => {
                const windPhase = now * 0.001 + idx * 0.5;
                // Sway the top portion (fronds are the last children)
                for (let c = palm.children.length - 1; c >= Math.max(0, palm.children.length - 12); c--) {
                    const child = palm.children[c];
                    if (child.geometry && child.geometry.type === 'PlaneGeometry') {
                        // Store base rotation on first frame
                        if (child.userData.baseRotZ === undefined) child.userData.baseRotZ = child.rotation.z;
                        child.rotation.z = child.userData.baseRotZ + Math.sin(windPhase + c) * 0.08;
                    }
                }
            });

            // Animate smoke particles — rise and fade
            smokeEmitters.forEach(smoke => {
                const sp = smoke.geometry.attributes.position;
                const vel = smoke.userData.velocities;
                const ages = smoke.userData.ages;
                const maxAge = smoke.userData.maxAge;
                for (let i = 0; i < sp.count; i++) {
                    ages[i] += deltaTime;
                    if (ages[i] > maxAge) {
                        ages[i] = 0;
                        sp.setXYZ(i, (Math.random()-0.5)*0.5, 0, (Math.random()-0.5)*0.5);
                        vel[i*3] = (Math.random()-0.5)*0.3;
                        vel[i*3+1] = 0.5 + Math.random()*1.0;
                        vel[i*3+2] = (Math.random()-0.5)*0.3;
                    }
                    sp.setX(i, sp.getX(i) + vel[i*3] * deltaTime);
                    sp.setY(i, sp.getY(i) + vel[i*3+1] * deltaTime);
                    sp.setZ(i, sp.getZ(i) + vel[i*3+2] * deltaTime);
                    // Drift with wind
                    sp.setX(i, sp.getX(i) + Math.sin(now*0.001+i) * 0.01);
                }
                sp.needsUpdate = true;
                // Fade opacity based on average age
                smoke.material.opacity = 0.2 + Math.sin(now * 0.002) * 0.05;
            });

            // Animate torch flames with individual x/z wobble and organic scaling
            torches.forEach(torch => {
                const flameBaseY = [2.0, 2.25, 2.45];
                torch.flameMeshes.forEach((mesh, i) => {
                    // More organic scale animation with different frequencies per axis
                    const scaleX = 1 + Math.sin(now * 0.007 + i * 0.5) * 0.25;
                    const scaleY = 1 + Math.sin(now * 0.009 + i) * 0.2;
                    const scaleZ = 1 + Math.sin(now * 0.008 + i * 0.3) * 0.25;
                    // Apply base scale factors
                    if (torch.userData.baseScales) {
                        mesh.scale.set(
                            scaleX * torch.userData.baseScales[i][0],
                            scaleY * torch.userData.baseScales[i][1],
                            scaleZ * torch.userData.baseScales[i][2]
                        );
                    }
                    // Individual x/z wobble, not just y
                    const wobbleY = Math.sin(now * 0.006 + i * 0.2) * 0.15;
                    const wobbleX = Math.sin(now * 0.005 + i) * 0.08;
                    const wobbleZ = Math.cos(now * 0.007 + i * 0.5) * 0.08;
                    mesh.position.set(wobbleX, flameBaseY[i] + wobbleY, wobbleZ);
                });
                if (torch.children[4]) {
                    torch.children[4].intensity = 0.8 + Math.sin(now * 0.01) * 0.4;
                }
            });

            // Animate bonfire flames with firelight flicker
            const fireFl = 0.7 + Math.sin(now * 0.007) * 0.15 + Math.sin(now * 0.013) * 0.1;
            bonfire.children.forEach((mesh, i) => {
                if (mesh.userData && mesh.userData.isFlame !== false) {
                    if (i >= 3 && i < 6) {
                        const flicker = 0.8 + Math.sin(now * 0.009 + i) * 0.3;
                        mesh.scale.set(flicker, flicker, flicker);
                        // Apply flickering emissive intensity
                        if (mesh.material) {
                            mesh.material.emissiveIntensity = fireFl;
                        }
                    }
                }
            });
            // Modulate firelight intensity
            if (bonfire.userData.fireLight) {
                bonfire.userData.fireLight.intensity = 1.5 * fireFl;
                // Animate firelight color between warm orange and deeper red
                bonfire.userData.fireLight.color.setHSL(0.07 + Math.sin(now*0.005)*0.02, 0.9, 0.5 + fireFl * 0.15);
            }
            // Apply same effect to secondary bonfires
            [bonfire2, bonfire3].forEach(fire => {
                if (fire && fire.userData.fireLight) {
                    fire.userData.fireLight.intensity = 1.5 * fireFl;
                    fire.userData.fireLight.color.setHSL(0.07 + Math.sin(now*0.005)*0.02, 0.9, 0.5 + fireFl * 0.15);
                }
                if (fire) {
                    fire.children.forEach((mesh, i) => {
                        if (mesh.userData && mesh.userData.isFlame !== false) {
                            if (i >= 3 && i < 6) {
                                const flicker = 0.8 + Math.sin(now * 0.009 + i) * 0.3;
                                mesh.scale.set(flicker, flicker, flicker);
                                if (mesh.material) {
                                    mesh.material.emissiveIntensity = fireFl;
                                }
                            }
                        }
                    });
                }
            });

            // Animate ember particles rising from bonfires
            emberEmitters.forEach(embers => {
                const ep = embers.geometry.attributes.position;
                const vel = embers.userData.velocities;
                const ages = embers.userData.ages;
                const maxAge = embers.userData.maxAge;
                for (let i = 0; i < ep.count; i++) {
                    ages[i] += deltaTime;
                    if (ages[i] > maxAge) {
                        ages[i] = 0;
                        ep.setXYZ(i, (Math.random()-0.5)*0.8, 0, (Math.random()-0.5)*0.8);
                        vel[i*3] = (Math.random()-0.5)*0.5;
                        vel[i*3+1] = 0.8 + Math.random()*1.5;
                        vel[i*3+2] = (Math.random()-0.5)*0.5;
                    }
                    ep.setX(i, ep.getX(i) + vel[i*3] * deltaTime);
                    ep.setY(i, ep.getY(i) + vel[i*3+1] * deltaTime);
                    ep.setZ(i, ep.getZ(i) + vel[i*3+2] * deltaTime);
                }
                ep.needsUpdate = true;
                embers.material.opacity = 0.4 + Math.sin(now * 0.003) * 0.1;
            });

            // Animate beach foam opacity — wave wash in/out
            if (beachFoam.userData.foamMats) {
                beachFoam.userData.foamMats.forEach((mat, idx) => {
                    mat.opacity = (0.25 - idx * 0.06) + Math.sin(now * 0.002 + idx * 0.8) * 0.12;
                });
                // Move foam strips back and forth (tide effect)
                beachFoam.position.z = Math.sin(now * 0.001) * 1.5;
            }

            // Animate wave splash particles
            const wsp = waveSplash.geometry.attributes.position;
            for (let i = 0; i < wsp.count; i++) {
                let wy = wsp.getY(i) + (0.5 + Math.random()) * deltaTime;
                let wz = wsp.getZ(i) + Math.sin(now * 0.003 + i) * 0.01;
                if (wy > 1.5) {
                    wy = 0;
                    wsp.setX(i, (Math.random()-0.5) * 400);
                    wsp.setZ(i, -160 + Math.random() * 5);
                }
                wsp.setY(i, wy);
            }
            wsp.needsUpdate = true;
            waveSplash.material.opacity = 0.3 + Math.sin(now * 0.004) * 0.15;

            // Animate waterfall stream — flowing vertex displacement
            if (waterfall.userData.stream) {
                const sGeo = waterfall.userData.stream.geometry.attributes.position;
                const sOrig = waterfall.userData.streamOrig;
                for (let i = 0; i < sGeo.count; i++) {
                    const oy = sOrig[i*3+1];
                    const ox = sOrig[i*3];
                    // Rippling motion flowing downward
                    const flow = Math.sin(oy * 2 + now * 0.005) * 0.08;
                    const turbulence = Math.sin(oy * 5 + now * 0.008 + ox * 3) * 0.03;
                    sGeo.setZ(i, sOrig[i*3+2] + flow + turbulence);
                    sGeo.setX(i, ox + Math.sin(oy * 3 + now * 0.004) * 0.04);
                }
                sGeo.needsUpdate = true;
            }
            // Animate waterfall mist particles
            if (waterfall.userData.mist) {
                const mp = waterfall.userData.mist.geometry.attributes.position;
                for (let i = 0; i < mp.count; i++) {
                    let my = mp.getY(i) + (0.3 + Math.random() * 0.2) * deltaTime;
                    let mx = mp.getX(i) + Math.sin(now * 0.002 + i * 0.5) * 0.01;
                    if (my > 4) {
                        my = 0;
                        mx = (Math.random() - 0.5) * 4;
                        mp.setZ(i, 3 + Math.random() * 2);
                    }
                    mp.setX(i, mx);
                    mp.setY(i, my);
                }
                mp.needsUpdate = true;
                waterfall.userData.mist.material.opacity = 0.2 + Math.sin(now * 0.003) * 0.08;
            }

            // Animate dust motes drift
            const dustPos = dustMotes.geometry.attributes.position;
            const dustVel = dustMotes.userData.velocities;
            for (let i = 0; i < dustPos.count; i++) {
                dustPos.setX(i, dustPos.getX(i) + dustVel[i*3] * deltaTime);
                dustPos.setY(i, dustPos.getY(i) + dustVel[i*3+1] * 0.05 * deltaTime);
                dustPos.setZ(i, dustPos.getZ(i) + dustVel[i*3+2] * deltaTime);

                const x = dustPos.getX(i);
                if (x > 80) dustPos.setX(i, -80);
                if (x < -80) dustPos.setX(i, 80);
            }
            dustPos.needsUpdate = true;

            // Animate fireflies bob and pulse - provide ambient glow and movement
            const ffyPos = fireflies.geometry.attributes.position;
            for (let i = 0; i < ffyPos.count; i++) {
                const baseY = 1 + Math.sin(i) * 3.5;
                const bob = Math.sin(now * 0.002 + i) * 0.5;
                ffyPos.setY(i, baseY + bob);
            }
            ffyPos.needsUpdate = true;
            fireflies.material.opacity = 0.6 + Math.sin(now * 0.003) * 0.2;

            // Animate seagulls in circular flight patterns with wing flapping and body tilt
            seagulls.children.forEach((seagull, idx) => {
                const angle = seagull.userData.flightAngle + now * 0.0003;
                const distance = seagull.userData.flightDistance + Math.sin(now * 0.001 + idx) * 5;
                const height = 35 + Math.sin(now * 0.0008 + idx * 0.5) * 8;

                seagull.position.set(
                    Math.cos(angle) * distance,
                    height,
                    Math.sin(angle) * distance + 20
                );

                // Body tilt in direction of flight (lean into turns)
                const flightDir = angle + Math.PI / 2;
                seagull.rotation.z = Math.sin(angle) * 0.3;
                seagull.rotation.x = Math.cos(angle) * 0.2;

                // More organic wing flapping with varying speed
                seagull.children.slice(2).forEach((wing, wIdx) => {
                    const flapSpeed = 0.008 + Math.random() * 0.004;
                    const flapAmount = 0.3 + Math.sin(now * flapSpeed + wIdx * 0.5) * 0.25;
                    wing.rotation.z = (wIdx === 0 ? -1 : 1) * flapAmount;
                });
            });

            // Animate butterflies — asymmetric wing flap and varied path radius
            butterflies.children.forEach((bf, idx) => {
                const d = bf.userData;
                const t = now * 0.001 * d.speed + d.phase;
                // Slight size variation in path radius
                const pathScale = 1 + Math.sin(now * 0.0005 + idx * 0.3) * 0.2;
                bf.position.x += Math.sin(t) * 0.03 * pathScale;
                bf.position.z += Math.cos(t * 0.7) * 0.02 * pathScale;
                bf.position.y = d.baseY + Math.sin(t * 1.5) * 0.5;
                // Asymmetric wing flap — slightly different timing per wing
                bf.children.forEach((wing, wIdx) => {
                    const wingTiming = (wIdx === 0 ? -1 : 1);
                    const wingPhase = wIdx === 0 ? 0.05 : 0; // Slight offset
                    wing.rotation.y = wingTiming * (0.3 + Math.sin(now * 0.02 + idx + wingPhase) * 0.5);
                });
            });

            // Animate falling leaves — drift down and sway
            const leafPos = fallingLeaves.geometry.attributes.position;
            for (let i = 0; i < leafPos.count; i++) {
                let ly = leafPos.getY(i) - fallingLeaves.userData.fallSpeeds[i] * deltaTime;
                const sway = Math.sin(now * 0.002 + fallingLeaves.userData.swayPhases[i]) * 0.02;
                leafPos.setX(i, leafPos.getX(i) + sway);
                if (ly < 0) { ly = 10 + Math.random() * 10; leafPos.setX(i, (Math.random() - 0.5) * 350); }
                leafPos.setY(i, ly);
            }
            leafPos.needsUpdate = true;

            // Camera follow with smooth lerp and rotation
            if (localPlayer) {
                const camDist = 7;
                const camHeight = 2 + cameraState.pitch * 8; // pitch controls height (2-8.4 range)
                const targetX = localPlayer.position.x - Math.sin(cameraState.angle) * camDist;
                const targetY = localPlayer.position.y + camHeight;
                const targetZ = localPlayer.position.z - Math.cos(cameraState.angle) * camDist;
                camera.position.lerp(new THREE.Vector3(targetX, targetY, targetZ), 0.06);
                camera.lookAt(localPlayer.position.x, localPlayer.position.y + 0.5, localPlayer.position.z);
            }

            renderer.render(scene, camera);
        }

        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
