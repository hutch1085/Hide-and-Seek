<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lydia is Pretty and Awesome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }
        canvas { display: block; touch-action: none; }

        /* UI Overlays */
        #lobby, #game-hud, #end-screen { position: absolute; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; }
        #lobby.visible, #game-hud.visible, #end-screen.visible { display: flex !important; }
        #lobby, #end-screen { z-index: 100; background: rgba(0,0,0,0.85); }
        #game-hud { z-index: 50; pointer-events: none; flex-direction: column; }

        .lobby-container, .end-container {
            text-align: center;
            background: rgba(30, 20, 10, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #D4A574;
        }

        .lobby-title, .end-title {
            font-size: 3em;
            margin-bottom: 30px;
            color: #D4A574;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .lobby-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .lobby-btn {
            padding: 15px 30px;
            font-size: 1.2em;
            border: 2px solid #D4A574;
            background: rgba(50, 35, 20, 0.8);
            color: #D4A574;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lobby-btn:hover, .lobby-btn:active { transform: scale(1.05); background: rgba(70, 50, 30, 0.9); }
        .lobby-btn { -webkit-tap-highlight-color: rgba(212, 165, 116, 0.3); touch-action: manipulation; }
        .solo-btn { background: rgba(60, 100, 40, 0.8); color: #90EE90; border-color: #90EE90; }
        .solo-btn:hover, .solo-btn:active { background: rgba(80, 130, 50, 0.9); }

        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 20px;
            color: white;
            font-size: 1.2em;
            pointer-events: auto;
        }

        .timer { color: #FF6B6B; font-weight: bold; }
        .role-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            border-left: 4px solid;
        }
        .menehune-badge { border-left: 4px solid #228B22; color: #228B22; }
        .hunter-badge { border-left: 4px solid #FF6B35; color: #FF6B35; }

        .hud-bottom {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            pointer-events: auto;
        }

        .controls-hint {
            font-size: 0.9em;
            color: #AAAAAA;
            margin-top: 10px;
        }

        /* game-hud visibility handled by unified .visible rule above */

        .end-container { background: rgba(20, 10, 20, 0.95); }
        .hunters-win { color: #FF6B35; }
        .menehune-win { color: #228B22; }

        /* end-screen visibility handled by unified .visible rule above */

        .restart-btn {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.1em;
            background: #D4A574;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: rgba(212, 165, 116, 0.3);
        }

        .restart-btn:hover, .restart-btn:active { background: #E8B88E; }

        #joystick-container {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom, 20px));
            left: max(20px, env(safe-area-inset-left, 10px));
            width: 130px;
            height: 130px;
            background: rgba(0, 0, 0, 0.35);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            touch-action: none;
            z-index: 60;
        }

        #joystick-knob {
            position: absolute;
            width: 55px;
            height: 55px;
            background: rgba(212, 165, 116, 0.75);
            border: 2px solid rgba(212, 165, 116, 1);
            border-radius: 50%;
            top: 37px;
            left: 37px;
            cursor: grab;
        }

        #action-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom, 20px));
            right: max(20px, env(safe-area-inset-right, 10px));
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(139, 69, 19, 0.75);
            border: 3px solid rgba(212, 165, 116, 1);
            color: #D4A574;
            font-size: 1.8em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 60;
        }

        #action-btn:active { transform: scale(0.92); background: rgba(139, 69, 19, 0.95); }

        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 45;
        }
    </style>
</head>
<body>
    <!-- Lobby Screen -->
    <div id="lobby" class="visible">
        <div class="lobby-container">
            <div class="lobby-title">🌺 Lydia is Pretty and Awesome 🌺</div>
            <div class="lobby-buttons">
                <button class="lobby-btn solo-btn" id="solo-btn">🎮 PLAY SOLO</button>
                <button class="lobby-btn solo-btn" id="play-menehune" style="display:none;">🌿 MENEHUNE — Hide from hunters</button>
                <button class="lobby-btn solo-btn" id="play-hunter" style="display:none;">🏹 HUNTER — Find the Menehune</button>
                <div style="margin: 15px 0; color: #D4A574;">Multiplayer:</div>
                <button class="lobby-btn" id="create-btn">🌴 CREATE ROOM</button>
                <button class="lobby-btn" id="join-btn">🎯 JOIN ROOM</button>
            </div>
        </div>
    </div>

    <!-- Game HUD -->
    <div id="game-hud">
        <div class="game-info">
            <div class="timer">Time: <span id="game-timer">300</span>s</div>
            <div class="role-badge" id="role-badge">🌿 MENEHUNE</div>
            <div id="status">Players: <span id="player-count">1</span></div>
        </div>
        <div class="hud-bottom">
            <div id="action-hint">Press SPACE or tap button to hide/throw!</div>
            <div class="controls-hint">WASD or arrow keys to move • Mouse/touch to look</div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen">
        <div class="end-container">
            <div class="end-title hunters-win" id="end-title">🏆 HUNTERS WIN!</div>
            <p id="end-msg" style="color: #DDD; font-size: 1.2em; margin: 20px 0;">The hunters found all the Menehune!</p>
            <div id="end-stats" style="color: #CCC; font-size: 1em; margin: 15px 0; text-align: left; max-width: 300px;"></div>
            <button class="restart-btn" id="restart-btn">Play Again</button>
        </div>
    </div>

    <!-- Joystick & Action Button -->
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>
    <button id="action-btn">🥥</button>

    <!-- Crosshair (hunter targeting) -->
    <div id="crosshair" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:60; pointer-events:none;">
        <svg width="60" height="60" viewBox="0 0 60 60">
            <circle cx="30" cy="30" r="18" stroke="#FF6B35" stroke-width="2" fill="none" opacity="0.7"/>
            <circle cx="30" cy="30" r="3" fill="#FF6B35" opacity="0.8"/>
            <line x1="30" y1="5" x2="30" y2="18" stroke="#FF6B35" stroke-width="2" opacity="0.6"/>
            <line x1="30" y1="42" x2="30" y2="55" stroke="#FF6B35" stroke-width="2" opacity="0.6"/>
            <line x1="5" y1="30" x2="18" y2="30" stroke="#FF6B35" stroke-width="2" opacity="0.6"/>
            <line x1="42" y1="30" x2="55" y2="30" stroke="#FF6B35" stroke-width="2" opacity="0.6"/>
        </svg>
    </div>
    <div id="target-indicator" style="display:none; position:fixed; z-index:59; pointer-events:none; color:#FF4444; font-weight:bold; font-size:14px; text-shadow:0 0 4px #000;">
        \u{1F3AF} TARGET LOCKED
    </div>

    <!-- Vignette Overlay -->
    <div id="vignette"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        // ============ THREE.JS SETUP ============
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.35;
        renderer.setClearColor(0xC4A882);
        renderer.gammaFactor = 2.2;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        scene.fog = new THREE.FogExp2(0xC4A882, 0.003);

        // NaN sanitizer — auto-clean positions before computing normals
        const _origComputeNormals = THREE.BufferGeometry.prototype.computeVertexNormals;
        THREE.BufferGeometry.prototype.computeVertexNormals = function() {
            const pos = this.attributes.position;
            if (pos) {
                for (let i = 0; i < pos.count; i++) {
                    if (isNaN(pos.getX(i))) pos.setX(i, 0);
                    if (isNaN(pos.getY(i))) pos.setY(i, 0);
                    if (isNaN(pos.getZ(i))) pos.setZ(i, 0);
                }
            }
            _origComputeNormals.call(this);
        };


        // ============ PROCEDURAL TEXTURES ============
        function makeTexture(width, height, drawFn) {
            const c = document.createElement('canvas');
            c.width = width;
            c.height = height;
            const ctx = c.getContext('2d');
            drawFn(ctx, width, height);
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        const sandTex = makeTexture(512, 512, (ctx, w, h) => {
            // Multi-layer sand with depth
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
            grad.addColorStop(0, '#DED4B0');
            grad.addColorStop(1, '#C4B490');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Fine grain
            for (let i = 0; i < 15000; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const brightness = 170 + Math.random() * 85;
                ctx.fillStyle = `rgb(${brightness},${brightness-15},${brightness-45})`;
                ctx.fillRect(x, y, 1 + Math.random() * 1.5, 1 + Math.random() * 1.5);
            }

            // Wet sand patches (darker spots near edges)
            for (let i = 0; i < 30; i++) {
                const wx = Math.random() * w, wy = Math.random() * h;
                const wr = 15 + Math.random() * 40;
                const wGrad = ctx.createRadialGradient(wx, wy, 0, wx, wy, wr);
                wGrad.addColorStop(0, 'rgba(140,130,90,0.4)');
                wGrad.addColorStop(1, 'rgba(160,150,110,0.1)');
                ctx.fillStyle = wGrad;
                ctx.beginPath();
                ctx.arc(wx, wy, wr, 0, Math.PI * 2);
                ctx.fill();
            }

            // Shell fragments / pebbles with more variety
            for (let i = 0; i < 400; i++) {
                const x = Math.random() * w, y = Math.random() * h;
                const shellSize = 1 + Math.random() * 3;
                // Vary shell colors
                const shellCol = Math.random() * 4;
                let r, g, b;
                if (shellCol < 1) { r = 220; g = 200; b = 170; } // beige
                else if (shellCol < 2) { r = 200; g = 180; b = 160; } // tan
                else if (shellCol < 3) { r = 210; g = 190; b = 170; } // light
                else { r = 190; g = 170; b = 150; } // dark
                ctx.fillStyle = `rgba(${r},${g},${b},${0.4 + Math.random() * 0.3})`;
                ctx.beginPath();
                ctx.arc(x, y, shellSize, 0, Math.PI * 2);
                ctx.fill();
            }

            // Subtle ripple lines
            for (let i = 0; i < 25; i++) {
                ctx.strokeStyle = `rgba(200,190,160,${0.08 + Math.random() * 0.08})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                let rx = Math.random() * w, ry = Math.random() * h;
                ctx.moveTo(rx, ry);
                for (let j = 0; j < 6; j++) {
                    rx += Math.random() * 50 - 25;
                    ry += Math.random() * 30 - 15;
                    ctx.lineTo(rx, ry);
                }
                ctx.stroke();
            }
        });
        sandTex.repeat.set(30, 30);

        const grassTex = makeTexture(512, 512, (ctx, w, h) => {
            // Multi-shade grass base
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#4A7A2E');
            grad.addColorStop(0.5, '#3D6B24');
            grad.addColorStop(1, '#527E32');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            // Dense grass blades — multiple layers
            for (let layer = 0; layer < 3; layer++) {
                for (let i = 0; i < 2000; i++) {
                    const x = Math.random() * w;
                    const y = Math.random() * h;
                    const g = 70 + Math.random() * 110;
                    const a = 0.3 + layer * 0.15;
                    ctx.strokeStyle = `rgba(${25+Math.random()*45},${g},${15+Math.random()*35},${a})`;
                    ctx.lineWidth = 0.5 + layer * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    const bend = (Math.random() - 0.5) * 6;
                    const height = 4 + Math.random() * 10 + layer * 3;
                    ctx.quadraticCurveTo(x + bend, y - height * 0.6, x + bend * 1.5, y - height);
                    ctx.stroke();
                }
            }
            // Tiny flowers
            for (let i = 0; i < 80; i++) {
                ctx.fillStyle = ['#FFFF88','#FF88AA','#FFFFFF','#AADDFF'][Math.floor(Math.random()*4)];
                ctx.beginPath();
                ctx.arc(Math.random() * w, Math.random() * h, 1 + Math.random(), 0, Math.PI * 2);
                ctx.fill();
            }
        });
        grassTex.repeat.set(30, 30);

        const woodTex = makeTexture(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(0, 0, w, h);
            // Multiple layers of grain for depth
            for (let layer = 0; layer < 3; layer++) {
                for (let i = 0; i < 50; i++) {
                    ctx.strokeStyle = `rgba(${60+Math.random()*40},${30+Math.random()*30},${10+Math.random()*20},${0.3 + layer * 0.15})`;
                    ctx.lineWidth = 1 + Math.random() * (2 + layer);
                    ctx.beginPath();
                    const y = Math.random() * h;
                    ctx.moveTo(0, y);
                    for (let x = 0; x < w; x += 5) {
                        ctx.lineTo(x, y + Math.sin(x*0.1 + layer)*3);
                    }
                    ctx.stroke();
                }
            }
            // Wood knots (darker circles scattered)
            for (let i = 0; i < 15; i++) {
                const kx = Math.random() * w, ky = Math.random() * h;
                const kr = 3 + Math.random() * 8;
                const kGrad = ctx.createRadialGradient(kx, ky, 0, kx, ky, kr);
                kGrad.addColorStop(0, 'rgba(40,20,10,0.6)');
                kGrad.addColorStop(1, 'rgba(60,30,15,0.3)');
                ctx.fillStyle = kGrad;
                ctx.beginPath();
                ctx.arc(kx, ky, kr, 0, Math.PI * 2);
                ctx.fill();
            }
            // Color variation between planks
            for (let i = 0; i < 8; i++) {
                const py = (i / 8) * h;
                const grad = ctx.createLinearGradient(0, py, w, py);
                const col = 100 + Math.random() * 30;
                grad.addColorStop(0, `rgba(${col},${col-20},${col-40},0.1)`);
                grad.addColorStop(1, `rgba(${col-10},${col-30},${col-50},0.1)`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, py, w, h/8);
            }
        });

        const stoneTex = makeTexture(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#7A7A6A';
            ctx.fillRect(0, 0, w, h);
            // Speckles for stone texture
            for (let i = 0; i < 3000; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const v = 90 + Math.random() * 80;
                ctx.fillStyle = `rgb(${v},${v-5},${v-15})`;
                ctx.fillRect(x, y, 2 + Math.random() * 3, 2 + Math.random() * 3);
            }
            // Deeper crevice lines
            for (let i = 0; i < 8; i++) {
                ctx.strokeStyle = 'rgba(40,35,30,0.6)';
                ctx.lineWidth = 2 + Math.random() * 1.5;
                ctx.beginPath();
                let x = Math.random() * w;
                let y = Math.random() * h;
                ctx.moveTo(x, y);
                for (let j=0; j<12; j++) {
                    x += Math.random()*25-12;
                    y += Math.random()*25;
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            // Lichen/moss patches (green-gray spots)
            for (let i = 0; i < 40; i++) {
                const mx = Math.random() * w, my = Math.random() * h;
                const mr = 8 + Math.random() * 20;
                const mGrad = ctx.createRadialGradient(mx, my, 0, mx, my, mr);
                mGrad.addColorStop(0, 'rgba(100,120,80,0.4)');
                mGrad.addColorStop(0.5, 'rgba(80,100,60,0.3)');
                mGrad.addColorStop(1, 'rgba(70,80,50,0)');
                ctx.fillStyle = mGrad;
                ctx.beginPath();
                ctx.arc(mx, my, mr, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        const thatchTex = makeTexture(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#6B5D1C';
            ctx.fillRect(0, 0, w, h);
            // Multiple overlapping layers of straw
            for (let layer = 0; layer < 3; layer++) {
                for (let i = 0; i < 600; i++) {
                    const x = Math.random() * w;
                    const y = Math.random() * h;
                    // Vary straw colors from golden to darker brown
                    const hue = 30 + Math.random() * 20;
                    const sat = 40 + Math.random() * 40;
                    const light = 40 + Math.random() * 30 - layer * 8;
                    ctx.strokeStyle = `hsl(${hue},${sat}%,${light}%)`;
                    ctx.lineWidth = 0.8 + Math.random() * 1.2;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    const len = 8 + Math.random() * 20;
                    const angle = Math.random() * Math.PI * 0.3 - Math.PI * 0.15;
                    ctx.lineTo(x + Math.cos(angle) * len, y - Math.sin(angle) * len);
                    ctx.stroke();
                }
            }
            // Small gaps showing darker under-layer
            for (let i = 0; i < 80; i++) {
                const gx = Math.random() * w, gy = Math.random() * h;
                const gw = 2 + Math.random() * 5;
                const gh = 2 + Math.random() * 4;
                ctx.fillStyle = 'rgba(40,30,10,0.6)';
                ctx.fillRect(gx, gy, gw, gh);
            }
        });

        const waterTex = makeTexture(512, 512, (ctx, w, h) => {
            // Deep ocean gradient with color variation
            const grad = ctx.createRadialGradient(w*0.3, h*0.3, 0, w/2, h/2, w*0.8);
            grad.addColorStop(0, '#00AACC');
            grad.addColorStop(0.3, '#0088AA');
            grad.addColorStop(0.6, '#006994');
            grad.addColorStop(1, '#003355');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // More caustic light patterns with higher density near center
            for (let i = 0; i < 100; i++) {
                const dist = Math.random() * 0.6;
                const angle = Math.random() * Math.PI * 2;
                const cx = w/2 + Math.cos(angle) * dist * w/2;
                const cy = h/2 + Math.sin(angle) * dist * h/2;
                const r = 8 + Math.random() * 40;
                const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                cGrad.addColorStop(0, 'rgba(150,240,255,0.15)');
                cGrad.addColorStop(0.5, 'rgba(100,200,255,0.08)');
                cGrad.addColorStop(1, 'rgba(80,180,255,0)');
                ctx.fillStyle = cGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();
            }

            // Wave lines and foam streaks
            for (let i = 0; i < 80; i++) {
                ctx.strokeStyle = `rgba(120,220,255,${0.1 + Math.random()*0.12})`;
                ctx.lineWidth = 1.5 + Math.random() * 2.5;
                ctx.beginPath();
                let x = Math.random() * w, y = Math.random() * h;
                ctx.moveTo(x, y);
                for (let j = 0; j < 10; j++) {
                    x += Math.random() * 40 - 20;
                    y += Math.random() * 40 - 20;
                    ctx.quadraticCurveTo(x + 10, y + 10, x, y);
                }
                ctx.stroke();
            }

            // Foam highlights and streaks
            for (let i = 0; i < 200; i++) {
                ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random()*0.08})`;
                ctx.beginPath();
                ctx.arc(Math.random()*w, Math.random()*h, 2 + Math.random()*6, 0, Math.PI*2);
                ctx.fill();
            }

            // Foam streaks
            for (let i = 0; i < 15; i++) {
                ctx.strokeStyle = `rgba(255,255,255,${0.1 + Math.random()*0.08})`;
                ctx.lineWidth = 2 + Math.random() * 3;
                ctx.beginPath();
                let sx = Math.random() * w, sy = Math.random() * h;
                ctx.moveTo(sx, sy);
                for (let j = 0; j < 6; j++) {
                    sx += Math.random() * 60 - 30;
                    sy += Math.random() * 30;
                    ctx.lineTo(sx, sy);
                }
                ctx.stroke();
            }
        });
        waterTex.repeat.set(12, 12);

        const barkTex = makeTexture(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#5C4033';
            ctx.fillRect(0, 0, w, h);
            // Vertical ridges for palm bark texture
            for (let i = 0; i < 80; i++) {
                ctx.strokeStyle = `rgba(${40+Math.random()*30},${30+Math.random()*20},${20+Math.random()*15},0.6)`;
                ctx.lineWidth = 3 + Math.random() * 2.5;
                ctx.beginPath();

        // ============ ENVIRONMENT CUBEMAP (procedural) ============
        // Creates a gradient cubemap with sunset warm tones matching sky dome
        function createEnvMap() {
            const size = 128;
            const faces = [];
            for (let f = 0; f < 6; f++) {
                const canvas = document.createElement('canvas');
                canvas.width = size; canvas.height = size;
                const ctx = canvas.getContext('2d');
                const grad = ctx.createLinearGradient(0, 0, 0, size);
                if (f === 2) { // top - zenith with purple tint
                    grad.addColorStop(0, '#4a3a8a');
                    grad.addColorStop(1, '#88CCEE');
                } else if (f === 3) { // bottom - ground
                    grad.addColorStop(0, '#445522');
                    grad.addColorStop(1, '#334418');
                } else {
                    // Horizon faces - more sunset warm tones
                    grad.addColorStop(0, '#FFBB88');
                    grad.addColorStop(0.3, '#FFAA77');
                    grad.addColorStop(0.6, '#88AADD');
                    grad.addColorStop(1, '#556644');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, size, size);
                faces.push(canvas);
            }
            const cubeTexture = new THREE.CubeTexture(faces);
            cubeTexture.needsUpdate = true;
            return cubeTexture;
        }

        // ============ SMOKE PARTICLE SYSTEM ============
        function createSmokeSystem(count) {
            const positions = new Float32Array(count * 3);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                color: 0x888888,
                size: 0.4,
                transparent: true,
                opacity: 0.25,
                sizeAttenuation: true,
                depthWrite: false,
            });
            const particles = new THREE.Points(geo, mat);
            particles.userData.velocities = [];
            particles.userData.ages = [];
            particles.userData.maxAge = 4;
            for (let i = 0; i < count; i++) {
                particles.userData.velocities.push(
                    (Math.random() - 0.5) * 0.3,
                    0.5 + Math.random() * 1.0,
                    (Math.random() - 0.5) * 0.3
                );
                particles.userData.ages.push(Math.random() * 4);
            }
            return particles;
        }

        // ============ SKY ============
        function createSky() {
            const geo = new THREE.SphereGeometry(400, 48, 32);
            const colors = [];
            const positions = geo.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const y = positions.getY(i);
                const t = (y + 400) / 800;
                let r, g, b;
                if (t < 0.3) { r=0.82; g=0.71; b=0.55; }
                else if (t < 0.45) { const f=(t-0.3)/0.15; r=0.82+f*0.13; g=0.71-f*0.1; b=0.55-f*0.15; }
                else if (t < 0.55) { const f=(t-0.45)/0.1; r=0.95-f*0.45; g=0.61-f*0.05; b=0.4+f*0.3; }
                else if (t < 0.75) { const f=(t-0.55)/0.2; r=0.5-f*0.2; g=0.56+f*0.22; b=0.7+f*0.18; }
                else { const f=(t-0.75)/0.25; r=0.3-f*0.12; g=0.78-f*0.23; b=0.88-f*0.08; }
                colors.push(r, g, b);
            }
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
