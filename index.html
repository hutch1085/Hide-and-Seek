<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lydia is Pretty and Awesome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            overflow: hidden;
            touch-action: none;
        }
        canvas { display: block; }

        /* UI Overlays */
        #lobby, #game-hud, #end-screen { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #lobby, #end-screen { z-index: 100; background: rgba(0,0,0,0.85); }
        #game-hud { z-index: 50; pointer-events: none; flex-direction: column; }

        .lobby-container, .end-container {
            text-align: center;
            background: rgba(30, 20, 10, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #D4A574;
        }

        .lobby-title, .end-title {
            font-size: 3em;
            margin-bottom: 30px;
            color: #D4A574;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .lobby-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .lobby-btn {
            padding: 15px 30px;
            font-size: 1.2em;
            border: 2px solid #D4A574;
            background: rgba(50, 35, 20, 0.8);
            color: #D4A574;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lobby-btn:hover { transform: scale(1.05); background: rgba(70, 50, 30, 0.9); }
        .solo-btn { background: rgba(60, 100, 40, 0.8); color: #90EE90; border-color: #90EE90; }
        .solo-btn:hover { background: rgba(80, 130, 50, 0.9); }

        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 20px;
            color: white;
            font-size: 1.2em;
            pointer-events: auto;
        }

        .timer { color: #FF6B6B; font-weight: bold; }
        .role-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            border-left: 4px solid;
        }
        .menehune-badge { border-left: 4px solid #228B22; color: #228B22; }
        .hunter-badge { border-left: 4px solid #FF6B35; color: #FF6B35; }

        .hud-bottom {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            pointer-events: auto;
        }

        .controls-hint {
            font-size: 0.9em;
            color: #AAAAAA;
            margin-top: 10px;
        }

        #game-hud.visible { display: flex !important; }
        #game-hud:not(.visible) { display: none !important; }

        .end-container { background: rgba(20, 10, 20, 0.95); }
        .hunters-win { color: #FF6B35; }
        .menehune-win { color: #228B22; }

        #end-screen { display: none; }
        #end-screen.visible { display: flex !important; }

        .restart-btn {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.1em;
            background: #D4A574;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .restart-btn:hover { background: #E8B88E; }

        #joystick-container {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom, 20px));
            left: max(20px, env(safe-area-inset-left, 10px));
            width: 130px;
            height: 130px;
            background: rgba(0, 0, 0, 0.35);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            touch-action: none;
            z-index: 60;
        }

        #joystick-knob {
            position: absolute;
            width: 55px;
            height: 55px;
            background: rgba(212, 165, 116, 0.75);
            border: 2px solid rgba(212, 165, 116, 1);
            border-radius: 50%;
            top: 37px;
            left: 37px;
            cursor: grab;
        }

        #action-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom, 20px));
            right: max(20px, env(safe-area-inset-right, 10px));
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(139, 69, 19, 0.75);
            border: 3px solid rgba(212, 165, 116, 1);
            color: #D4A574;
            font-size: 1.8em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 60;
        }

        #action-btn:active { transform: scale(0.92); background: rgba(139, 69, 19, 0.95); }

        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 45;
        }
    </style>
</head>
<body>
    <!-- Lobby Screen -->
    <div id="lobby" class="visible">
        <div class="lobby-container">
            <div class="lobby-title">🌺 Lydia is Pretty and Awesome 🌺</div>
            <div class="lobby-buttons">
                <button class="lobby-btn solo-btn" id="solo-btn">🎮 PLAY SOLO</button>
                <button class="lobby-btn solo-btn" id="play-menehune" style="display:none;">🌿 MENEHUNE — Hide from hunters</button>
                <button class="lobby-btn solo-btn" id="play-hunter" style="display:none;">🏹 HUNTER — Find the Menehune</button>
                <div style="margin: 15px 0; color: #D4A574;">Multiplayer:</div>
                <button class="lobby-btn" id="create-btn">🌴 CREATE ROOM</button>
                <button class="lobby-btn" id="join-btn">🎯 JOIN ROOM</button>
            </div>
        </div>
    </div>

    <!-- Game HUD -->
    <div id="game-hud">
        <div class="game-info">
            <div class="timer">Time: <span id="game-timer">300</span>s</div>
            <div class="role-badge" id="role-badge">🌿 MENEHUNE</div>
            <div id="status">Players: <span id="player-count">1</span></div>
        </div>
        <div class="hud-bottom">
            <div id="action-hint">Press SPACE or tap button to hide/throw!</div>
            <div class="controls-hint">WASD or arrow keys to move • Mouse/touch to look</div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen">
        <div class="end-container">
            <div class="end-title hunters-win" id="end-title">🏆 HUNTERS WIN!</div>
            <p id="end-msg" style="color: #DDD; font-size: 1.2em; margin: 20px 0;">The hunters found all the Menehune!</p>
            <div id="end-stats" style="color: #CCC; font-size: 1em; margin: 15px 0; text-align: left; max-width: 300px;"></div>
            <button class="restart-btn" id="restart-btn">Play Again</button>
        </div>
    </div>

    <!-- Joystick & Action Button -->
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>
    <button id="action-btn">🥥</button>

    <!-- Vignette Overlay -->
    <div id="vignette"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        // ============ THREE.JS SETUP ============
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.35;
        renderer.setClearColor(0x87CEEB);
        renderer.gammaFactor = 2.2;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        scene.fog = new THREE.FogExp2(0x99AAAA, 0.0035);

        // ============ PROCEDURAL TEXTURES ============
        function makeTexture(width, height, drawFn) {
            const c = document.createElement('canvas');
            c.width = width;
            c.height = height;
            const ctx = c.getContext('2d');
            drawFn(ctx, width, height);
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        const sandTex = makeTexture(512, 512, (ctx, w, h) => {
            // Multi-layer sand with depth
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
            grad.addColorStop(0, '#DED4B0');
            grad.addColorStop(1, '#C4B490');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Fine grain
            for (let i = 0; i < 15000; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const brightness = 170 + Math.random() * 85;
                ctx.fillStyle = `rgb(${brightness},${brightness-15},${brightness-45})`;
                ctx.fillRect(x, y, 1 + Math.random() * 1.5, 1 + Math.random() * 1.5);
            }

            // Wet sand patches (darker spots near edges)
            for (let i = 0; i < 30; i++) {
                const wx = Math.random() * w, wy = Math.random() * h;
                const wr = 15 + Math.random() * 40;
                const wGrad = ctx.createRadialGradient(wx, wy, 0, wx, wy, wr);
                wGrad.addColorStop(0, 'rgba(140,130,90,0.4)');
                wGrad.addColorStop(1, 'rgba(160,150,110,0.1)');
                ctx.fillStyle = wGrad;
                ctx.beginPath();
                ctx.arc(wx, wy, wr, 0, Math.PI * 2);
                ctx.fill();
            }

            // Shell fragments / pebbles with more variety
            for (let i = 0; i < 400; i++) {
                const x = Math.random() * w, y = Math.random() * h;
                const shellSize = 1 + Math.random() * 3;
                // Vary shell colors
                const shellCol = Math.random() * 4;
                let r, g, b;
                if (shellCol < 1) { r = 220; g = 200; b = 170; } // beige
                else if (shellCol < 2) { r = 200; g = 180; b = 160; } // tan
                else if (shellCol < 3) { r = 210; g = 190; b = 170; } // light
                else { r = 190; g = 170; b = 150; } // dark
                ctx.fillStyle = `rgba(${r},${g},${b},${0.4 + Math.random() * 0.3})`;
                ctx.beginPath();
                ctx.arc(x, y, shellSize, 0, Math.PI * 2);
                ctx.fill();
            }

            // Subtle ripple lines
            for (let i = 0; i < 25; i++) {
                ctx.strokeStyle = `rgba(200,190,160,${0.08 + Math.random() * 0.08})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                let rx = Math.random() * w, ry = Math.random() * h;
                ctx.moveTo(rx, ry);
                for (let j = 0; j < 6; j++) {
                    rx += Math.random() * 50 - 25;
                    ry += Math.random() * 30 - 15;
                    ctx.lineTo(rx, ry);
                }
                ctx.stroke();
            }
        });
        sandTex.repeat.set(30, 30);

        const grassTex = makeTexture(512, 512, (ctx, w, h) => {
            // Multi-shade grass base
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#4A7A2E');
            grad.addColorStop(0.5, '#3D6B24');
            grad.addColorStop(1, '#527E32');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            // Dense grass blades — multiple layers
            for (let layer = 0; layer < 3; layer++) {
                for (let i = 0; i < 2000; i++) {
                    const x = Math.random() * w;
                    const y = Math.random() * h;
                    const g = 70 + Math.random() * 110;
                    const a = 0.3 + layer * 0.15;
                    ctx.strokeStyle = `rgba(${25+Math.random()*45},${g},${15+Math.random()*35},${a})`;
                    ctx.lineWidth = 0.5 + layer * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    const bend = (Math.random() - 0.5) * 6;
                    const height = 4 + Math.random() * 10 + layer * 3;
                    ctx.quadraticCurveTo(x + bend, y - height * 0.6, x + bend * 1.5, y - height);
                    ctx.stroke();
                }
            }
            // Tiny flowers
            for (let i = 0; i < 80; i++) {
                ctx.fillStyle = ['#FFFF88','#FF88AA','#FFFFFF','#AADDFF'][Math.floor(Math.random()*4)];
                ctx.beginPath();
                ctx.arc(Math.random() * w, Math.random() * h, 1 + Math.random(), 0, Math.PI * 2);
                ctx.fill();
            }
        });
        grassTex.repeat.set(30, 30);

        const woodTex = makeTexture(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(0, 0, w, h);
            // Multiple layers of grain for depth
            for (let layer = 0; layer < 3; layer++) {
                for (let i = 0; i < 50; i++) {
                    ctx.strokeStyle = `rgba(${60+Math.random()*40},${30+Math.random()*30},${10+Math.random()*20},${0.3 + layer * 0.15})`;
                    ctx.lineWidth = 1 + Math.random() * (2 + layer);
                    ctx.beginPath();
                    const y = Math.random() * h;
                    ctx.moveTo(0, y);
                    for (let x = 0; x < w; x += 5) {
                        ctx.lineTo(x, y + Math.sin(x*0.1 + layer)*3);
                    }
                    ctx.stroke();
                }
            }
            // Wood knots (darker circles scattered)
            for (let i = 0; i < 15; i++) {
                const kx = Math.random() * w, ky = Math.random() * h;
                const kr = 3 + Math.random() * 8;
                const kGrad = ctx.createRadialGradient(kx, ky, 0, kx, ky, kr);
                kGrad.addColorStop(0, 'rgba(40,20,10,0.6)');
                kGrad.addColorStop(1, 'rgba(60,30,15,0.3)');
                ctx.fillStyle = kGrad;
                ctx.beginPath();
                ctx.arc(kx, ky, kr, 0, Math.PI * 2);
                ctx.fill();
            }
            // Color variation between planks
            for (let i = 0; i < 8; i++) {
                const py = (i / 8) * h;
                const grad = ctx.createLinearGradient(0, py, w, py);
                const col = 100 + Math.random() * 30;
                grad.addColorStop(0, `rgba(${col},${col-20},${col-40},0.1)`);
                grad.addColorStop(1, `rgba(${col-10},${col-30},${col-50},0.1)`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, py, w, h/8);
            }
        });

        const stoneTex = makeTexture(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#7A7A6A';
            ctx.fillRect(0, 0, w, h);
            // Speckles for stone texture
            for (let i = 0; i < 3000; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const v = 90 + Math.random() * 80;
                ctx.fillStyle = `rgb(${v},${v-5},${v-15})`;
                ctx.fillRect(x, y, 2 + Math.random() * 3, 2 + Math.random() * 3);
            }
            // Deeper crevice lines
            for (let i = 0; i < 8; i++) {
                ctx.strokeStyle = 'rgba(40,35,30,0.6)';
                ctx.lineWidth = 2 + Math.random() * 1.5;
                ctx.beginPath();
                let x = Math.random() * w;
                let y = Math.random() * h;
                ctx.moveTo(x, y);
                for (let j=0; j<12; j++) {
                    x += Math.random()*25-12;
                    y += Math.random()*25;
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            // Lichen/moss patches (green-gray spots)
            for (let i = 0; i < 40; i++) {
                const mx = Math.random() * w, my = Math.random() * h;
                const mr = 8 + Math.random() * 20;
                const mGrad = ctx.createRadialGradient(mx, my, 0, mx, my, mr);
                mGrad.addColorStop(0, 'rgba(100,120,80,0.4)');
                mGrad.addColorStop(0.5, 'rgba(80,100,60,0.3)');
                mGrad.addColorStop(1, 'rgba(70,80,50,0)');
                ctx.fillStyle = mGrad;
                ctx.beginPath();
                ctx.arc(mx, my, mr, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        const thatchTex = makeTexture(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#6B5D1C';
            ctx.fillRect(0, 0, w, h);
            // Multiple overlapping layers of straw
            for (let layer = 0; layer < 3; layer++) {
                for (let i = 0; i < 600; i++) {
                    const x = Math.random() * w;
                    const y = Math.random() * h;
                    // Vary straw colors from golden to darker brown
                    const hue = 30 + Math.random() * 20;
                    const sat = 40 + Math.random() * 40;
                    const light = 40 + Math.random() * 30 - layer * 8;
                    ctx.strokeStyle = `hsl(${hue},${sat}%,${light}%)`;
                    ctx.lineWidth = 0.8 + Math.random() * 1.2;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    const len = 8 + Math.random() * 20;
                    const angle = Math.random() * Math.PI * 0.3 - Math.PI * 0.15;
                    ctx.lineTo(x + Math.cos(angle) * len, y - Math.sin(angle) * len);
                    ctx.stroke();
                }
            }
            // Small gaps showing darker under-layer
            for (let i = 0; i < 80; i++) {
                const gx = Math.random() * w, gy = Math.random() * h;
                const gw = 2 + Math.random() * 5;
                const gh = 2 + Math.random() * 4;
                ctx.fillStyle = 'rgba(40,30,10,0.6)';
                ctx.fillRect(gx, gy, gw, gh);
            }
        });

        const waterTex = makeTexture(512, 512, (ctx, w, h) => {
            // Deep ocean gradient with color variation
            const grad = ctx.createRadialGradient(w*0.3, h*0.3, 0, w/2, h/2, w*0.8);
            grad.addColorStop(0, '#00AACC');
            grad.addColorStop(0.3, '#0088AA');
            grad.addColorStop(0.6, '#006994');
            grad.addColorStop(1, '#003355');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // More caustic light patterns with higher density near center
            for (let i = 0; i < 100; i++) {
                const dist = Math.random() * 0.6;
                const angle = Math.random() * Math.PI * 2;
                const cx = w/2 + Math.cos(angle) * dist * w/2;
                const cy = h/2 + Math.sin(angle) * dist * h/2;
                const r = 8 + Math.random() * 40;
                const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                cGrad.addColorStop(0, 'rgba(150,240,255,0.15)');
                cGrad.addColorStop(0.5, 'rgba(100,200,255,0.08)');
                cGrad.addColorStop(1, 'rgba(80,180,255,0)');
                ctx.fillStyle = cGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();
            }

            // Wave lines and foam streaks
            for (let i = 0; i < 80; i++) {
                ctx.strokeStyle = `rgba(120,220,255,${0.1 + Math.random()*0.12})`;
                ctx.lineWidth = 1.5 + Math.random() * 2.5;
                ctx.beginPath();
                let x = Math.random() * w, y = Math.random() * h;
                ctx.moveTo(x, y);
                for (let j = 0; j < 10; j++) {
                    x += Math.random() * 40 - 20;
                    y += Math.random() * 40 - 20;
                    ctx.quadraticCurveTo(x + 10, y + 10, x, y);
                }
                ctx.stroke();
            }

            // Foam highlights and streaks
            for (let i = 0; i < 200; i++) {
                ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random()*0.08})`;
                ctx.beginPath();
                ctx.arc(Math.random()*w, Math.random()*h, 2 + Math.random()*6, 0, Math.PI*2);
                ctx.fill();
            }

            // Foam streaks
            for (let i = 0; i < 15; i++) {
                ctx.strokeStyle = `rgba(255,255,255,${0.1 + Math.random()*0.08})`;
                ctx.lineWidth = 2 + Math.random() * 3;
                ctx.beginPath();
                let sx = Math.random() * w, sy = Math.random() * h;
                ctx.moveTo(sx, sy);
                for (let j = 0; j < 6; j++) {
                    sx += Math.random() * 60 - 30;
                    sy += Math.random() * 30;
                    ctx.lineTo(sx, sy);
                }
                ctx.stroke();
            }
        });
        waterTex.repeat.set(12, 12);

        const barkTex = makeTexture(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#5C4033';
            ctx.fillRect(0, 0, w, h);
            // Vertical ridges for palm bark texture
            for (let i = 0; i < 80; i++) {
                ctx.strokeStyle = `rgba(${40+Math.random()*30},${30+Math.random()*20},${20+Math.random()*15},0.6)`;
                ctx.lineWidth = 3 + Math.random() * 2.5;
                ctx.beginPath();
                const x = (i % 8) * (w / 8) + Math.random() * 8;
                const y = 0;
                ctx.moveTo(x, y);
                for (let py = 0; py < h; py += 10) {
                    ctx.lineTo(x + Math.sin(py * 0.05) * 2, py);
                }
                ctx.stroke();
            }
            // Horizontal ring marks (like real palm bark)
            for (let i = 0; i < 12; i++) {
                ctx.strokeStyle = `rgba(30,20,10,0.5)`;
                ctx.lineWidth = 1.5;
                const ry = (i / 12) * h;
                ctx.beginPath();
                ctx.moveTo(0, ry);
                for (let x = 0; x < w; x += 15) {
                    ctx.lineTo(x, ry + Math.sin(x * 0.1) * 1.5);
                }
                ctx.stroke();
            }
            // Moss at the base area
            const mossGrad = ctx.createLinearGradient(0, h * 0.6, 0, h);
            mossGrad.addColorStop(0, 'rgba(70,80,50,0)');
            mossGrad.addColorStop(1, 'rgba(80,100,60,0.5)');
            ctx.fillStyle = mossGrad;
            ctx.fillRect(0, h * 0.6, w, h * 0.4);
        });

        const leafTex = makeTexture(128, 128, (ctx, w, h) => {
            // Gradient from light to dark green edges
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2.5);
            grad.addColorStop(0, '#4A8C2A');
            grad.addColorStop(1, '#1D4010');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Central vein (main vein)
            ctx.strokeStyle = 'rgba(100,180,80,0.8)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(w/2, 0);
            for (let y = 0; y < h; y += 5) {
                ctx.lineTo(w/2 + Math.sin(y * 0.05) * 2, y);
            }
            ctx.stroke();

            // Branching side veins
            for (let i = 0; i < 16; i++) {
                const y = (i / 16) * h;
                const side = i % 2 === 0 ? -1 : 1;

        // ============ ENVIRONMENT CUBEMAP (procedural) ============
        // Creates a gradient cubemap with sunset warm tones matching sky dome
        function createEnvMap() {
            const size = 128;
            const faces = [];
            for (let f = 0; f < 6; f++) {
                const canvas = document.createElement('canvas');
                canvas.width = size; canvas.height = size;
                const ctx = canvas.getContext('2d');
                const grad = ctx.createLinearGradient(0, 0, 0, size);
                if (f === 2) { // top - zenith with purple tint
                    grad.addColorStop(0, '#4a3a8a');
                    grad.addColorStop(1, '#88CCEE');
                } else if (f === 3) { // bottom - ground
                    grad.addColorStop(0, '#445522');
                    grad.addColorStop(1, '#334418');
                } else {
                    // Horizon faces - more sunset warm tones
                    grad.addColorStop(0, '#FFBB88');
                    grad.addColorStop(0.3, '#FFAA77');
                    grad.addColorStop(0.6, '#88AADD');
                    grad.addColorStop(1, '#556644');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, size, size);
                faces.push(canvas);
            }
            const cubeTexture = new THREE.CubeTexture(faces);
            cubeTexture.needsUpdate = true;
            return cubeTexture;
        }
        const envMap = createEnvMap();

        // ============ SKY DOME ============
        (function createSkyDome() {
            const skyGeo = new THREE.SphereGeometry(500, 32, 16);
            const skyCanvas = document.createElement('canvas');
            skyCanvas.width = 512; skyCanvas.height = 256;

            const grad = sCtx.createLinearGradient(0, 0, 0, 256);
            grad.addColorStop(0, '#2a1a5a');     // deep blue/purple zenith
            grad.addColorStop(0.15, '#4a2a8a');  // purple tint
            grad.addColorStop(0.25, '#3366aa');   // mid blue
            grad.addColorStop(0.5, '#77aadd');    // light blue
            grad.addColorStop(0.7, '#ffcc88');    // golden horizon
            grad.addColorStop(0.85, '#ff8866');   // sunset orange
            grad.addColorStop(1.0, '#cc5544');    // warm horizon floor
            sCtx.fillStyle = grad;
            sCtx.fillRect(0, 0, 512, 256);

            // Sun glow - bright circle near horizon
            const sunGlow = sCtx.createRadialGradient(256, 210, 0, 256, 210, 100);
            sunGlow.addColorStop(0, 'rgba(255,200,100,0.4)');
            sunGlow.addColorStop(0.5, 'rgba(255,150,50,0.2)');
            sunGlow.addColorStop(1, 'rgba(255,100,0,0)');
            sCtx.fillStyle = sunGlow;
            sCtx.beginPath();
            sCtx.arc(256, 210, 100, 0, Math.PI * 2);
            sCtx.fill();

            // Add wispy clouds to the sky texture - multiple layers at different heights
            sCtx.globalAlpha = 0.08;
            for (let i = 0; i < 35; i++) {
                const cx = Math.random() * 512;
                const cy = 30 + Math.random() * 60;  // Higher clouds
                const cw = 40 + Math.random() * 100;
                const ch = 6 + Math.random() * 14;
                sCtx.fillStyle = '#ffffff';
                sCtx.beginPath();
                sCtx.ellipse(cx, cy, cw, ch, 0, 0, Math.PI * 2);
                sCtx.fill();
            }
            sCtx.globalAlpha = 0.14;
            for (let i = 0; i < 50; i++) {
                const cx = Math.random() * 512;
                const cy = 60 + Math.random() * 120;  // Lower cloud layer
                const cw = 30 + Math.random() * 90;
                const ch = 4 + Math.random() * 10;
                sCtx.fillStyle = '#f0f0ff';
                sCtx.beginPath();
                sCtx.ellipse(cx, cy, cw, ch, 0, 0, Math.PI * 2);
                sCtx.fill();
            }
            sCtx.globalAlpha = 1;
            const skyTex = new THREE.CanvasTexture(skyCanvas);

            const sky = new THREE.Mesh(skyGeo, skyMat);

        // ============ SMOKE PARTICLE SYSTEM ============
        function createSmokeSystem(count) {
            const positions = new Float32Array(count * 3);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                color: 0x888888,
                size: 0.4,
                transparent: true,
                opacity: 0.25,
                sizeAttenuation: true,
                depthWrite: false,
            });
            const particles = new THREE.Points(geo, mat);
            particles.userData.velocities = [];
            particles.userData.ages = [];
            particles.userData.maxAge = 4;
            for (let i = 0; i < count; i++) {
                particles.userData.velocities.push(
                    (Math.random() - 0.5) * 0.3,
                    0.5 + Math.random() * 1.0,
                    (Math.random() - 0.5) * 0.3
                );
                particles.userData.ages.push(Math.random() * 4);
            }
            return particles;
        }
        // Smoke at each bonfire
        const smokeEmitters = [];
        const smokePositions = [[-50, 0, 50], [70, 0, -120], [-120, 0, 100]];
        for (const pos of smokePositions) {
            const smoke = createSmokeSystem(20);
            smoke.position.set(pos[0], pos[1] + 1.5, pos[2]);
            scene.add(smoke);
            smokeEmitters.push(smoke);
        }
        // Smaller smoke at torches (select every 4th torch)
        for (let i = 0; i < torches.length; i += 4) {
            const smoke = createSmokeSystem(8);
            const tp = torches[i].position;
            smoke.position.set(tp.x, tp.y + 2.2, tp.z);
            scene.add(smoke);
            smokeEmitters.push(smoke);
        }

        // Ember particle system for bonfires (reuse smoke approach but orange/red)

        // ============ SKY ============
        function createSky() {
            const geo = new THREE.SphereGeometry(400, 48, 32);
            const colors = [];
            const positions = geo.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const y = positions.getY(i);
                const t = (y + 400) / 800;
                let r, g, b;
                if (t < 0.3) { r=0.82; g=0.71; b=0.55; }
                else if (t < 0.45) { const f=(t-0.3)/0.15; r=0.82+f*0.13; g=0.71-f*0.1; b=0.55-f*0.15; }
                else if (t < 0.55) { const f=(t-0.45)/0.1; r=0.95-f*0.45; g=0.61-f*0.05; b=0.4+f*0.3; }
                else if (t < 0.75) { const f=(t-0.55)/0.2; r=0.5-f*0.2; g=0.56+f*0.22; b=0.7+f*0.18; }
                else { const f=(t-0.75)/0.25; r=0.3-f*0.12; g=0.78-f*0.23; b=0.88-f*0.08; }
                colors.push(r, g, b);
            }
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            const mat = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide });
            return new THREE.Mesh(geo, mat);
        }
        scene.add(createSky());

        // ============ GROUND ============
        function createGround() {
            const groundGroup = new THREE.Group();

            // Wide beach strip along south edge with natural dunes
            const beachGeo = new THREE.PlaneGeometry(400, 60, 60, 30);
            beachGeo.rotateX(-Math.PI / 2);
            // Add vertex displacement for natural dunes (multi-frequency noise)
            const bPos = beachGeo.attributes.position;
            for (let i = 0; i < bPos.count; i++) {
                const x = bPos.getX(i), z = bPos.getZ(i);
                // Multi-frequency noise for realistic dunes
                const h = Math.sin(x * 0.02) * 0.4 + Math.cos(z * 0.015) * 0.35 +
                         Math.sin(x * 0.08 + z * 0.06) * 0.15;
                bPos.setY(i, h);
            }
            beachGeo.computeVertexNormals();
            const beachMat = new THREE.MeshPhongMaterial({ map: sandTex, bumpMap: sandBumpTex, bumpScale: 0.3, shininess: 10 });
            const beachMesh = new THREE.Mesh(beachGeo, beachMat);
            beachMesh.position.z = -130;
            beachMesh.receiveShadow = true;
            groundGroup.add(beachMesh);

            // Main grass field — center of the map
            const grassGeo = new THREE.PlaneGeometry(400, 200, 60, 60);
            grassGeo.rotateX(-Math.PI / 2);
            // Interesting terrain with increased amplitude and second frequency layer
            const gPos = grassGeo.attributes.position;
            for (let i = 0; i < gPos.count; i++) {
                const x = gPos.getX(i), z = gPos.getZ(i);
                // First frequency - larger hills
                const h1 = Math.sin(x * 0.02) * 0.5 + Math.cos(z * 0.03) * 0.4;
                // Second frequency - smaller details
                const h2 = Math.sin(x * 0.08 + z * 0.1) * 0.25 + Math.cos(x * 0.06) * 0.15;
                const h = h1 + h2;
                gPos.setY(i, h);
            }
            // Add vertex colors for zone blending (Z-based gradient)
            const gColor = grassGeo.getAttribute('color') || new THREE.BufferAttribute(new Float32Array(gPos.count * 3), 3);
            grassGeo.setAttribute('color', gColor);
            const minZ = -100, maxZ = 100;
            for (let i = 0; i < gPos.count; i++) {
                const z = gPos.getZ(i);
                const t = (z - minZ) / (maxZ - minZ); // 0 at south (beach), 1 at north (jungle)
                // South edge: sandy tan (0.86, 0.82, 0.71)
                // Center: rich green (0.29, 0.48, 0.18)
                // North edge: dark jungle green (0.12, 0.29, 0.06)
                let r, g, b;
                if (t < 0.5) {
                    // South to center: tan to green
                    const s = t * 2;
                    r = 0.86 - s * (0.86 - 0.29);
                    g = 0.82 - s * (0.82 - 0.48);
                    b = 0.71 - s * (0.71 - 0.18);
                } else {
                    // Center to north: green to dark jungle green
                    const s = (t - 0.5) * 2;
                    r = 0.29 - s * (0.29 - 0.12);
                    g = 0.48 - s * (0.48 - 0.29);
                    b = 0.18 - s * (0.18 - 0.06);
                }
                gColor.setXYZ(i, r, g, b);
            }
            grassGeo.computeVertexNormals();
            const grassMat = new THREE.MeshPhongMaterial({ map: grassTex, bumpMap: sandBumpTex, bumpScale: 0.2, shininess: 5, vertexColors: true });
            const grassMesh = new THREE.Mesh(grassGeo, grassMat);
            grassMesh.position.z = 0;
            grassMesh.receiveShadow = true;
            groundGroup.add(grassMesh);

            // Dense jungle zone at the north with subtle undulation
            const jungleGeo = new THREE.PlaneGeometry(400, 80, 60, 30);
            jungleGeo.rotateX(-Math.PI / 2);
            // Add slight undulation to jungle ground
            const jPos = jungleGeo.attributes.position;
            for (let i = 0; i < jPos.count; i++) {
                const x = jPos.getX(i), z = jPos.getZ(i);
                const h = Math.sin(x * 0.03) * 0.2 + Math.cos(z * 0.04) * 0.15;
                jPos.setY(i, h);
            }
            jungleGeo.computeVertexNormals();
            const jungleMat = new THREE.MeshPhongMaterial({ map: grassTex, shininess: 5 });
            jungleMat.color.set(0x1E4A0E);
            const jungleMesh = new THREE.Mesh(jungleGeo, jungleMat);
            jungleMesh.position.z = 140;
            jungleMesh.receiveShadow = true;
            groundGroup.add(jungleMesh);

            // Volcanic rock area — east side
            const volcGeo = new THREE.PlaneGeometry(80, 120, 30, 30);
            volcGeo.rotateX(-Math.PI / 2);
            const vPos = volcGeo.attributes.position;
            for (let i = 0; i < vPos.count; i++) {
                const x = vPos.getX(i), z = vPos.getZ(i);
                vPos.setY(i, Math.sin(x * 0.08) * 0.5 + Math.cos(z * 0.06) * 0.4);
            }
            volcGeo.computeVertexNormals();
            const volcMat = new THREE.MeshPhongMaterial({ map: gravelTex, color: 0x4A4A4A, shininess: 8 });
            const volcMesh = new THREE.Mesh(volcGeo, volcMat);
            volcMesh.position.set(160, 0.05, 40);
            volcMesh.receiveShadow = true;
            groundGroup.add(volcMesh);

            // Sandy path winding through the center with terrain following
            const pathGeo = new THREE.PlaneGeometry(8, 200, 4, 40);
            pathGeo.rotateX(-Math.PI / 2);
            // Displace path vertices to follow terrain hills
            const pPos = pathGeo.attributes.position;
            for (let i = 0; i < pPos.count; i++) {
                const x = pPos.getX(i), z = pPos.getZ(i);
                const h = Math.sin(x * 0.02) * 0.5 + Math.cos(z * 0.03) * 0.4 +
                         Math.sin(x * 0.08 + z * 0.1) * 0.25;
                pPos.setY(i, h);
            }
            pathGeo.computeVertexNormals();
            const pathMat = new THREE.MeshPhongMaterial({ map: sandTex, color: 0xC4B490, shininess: 5 });
            const pathMesh = new THREE.Mesh(pathGeo, pathMat);
            pathMesh.position.set(0, 0.02, 0);
            pathMesh.receiveShadow = true;
            groundGroup.add(pathMesh);

            return groundGroup;
        }
        scene.add(createGround());

        // ============ OCEAN ============
        function createOcean() {
            const geo = new THREE.PlaneGeometry(600, 200, 100, 50);
            const mat = new THREE.MeshPhongMaterial({
                map: waterTex,
                envMap: envMap,
                transparent: true,

        }
        const ocean = createOcean();
        scene.add(ocean);
        const oceanPositions = ocean.geometry.attributes.position.array.slice();

        // Water shoreline gradient (shallow water zone between beach and ocean)
        const shoreGeo = new THREE.PlaneGeometry(400, 20, 40, 4);
        const shoreColor = shoreGeo.getAttribute('color') || new THREE.BufferAttribute(new Float32Array(shoreGeo.attributes.position.count * 3), 3);
        shoreGeo.setAttribute('color', shoreColor);
        // Beach side (Z = -150) nearly transparent, ocean side (Z = -170) more opaque
        for (let i = 0; i < shoreGeo.attributes.position.count; i++) {
            const z = shoreGeo.attributes.position.getZ(i);
            const t = (z - (-150)) / (-170 - (-150));
            const opacity = 0.05 + t * 0.3; // gradient from 0.05 to 0.35
            const col = Math.floor(opacity * 255);
            shoreColor.setXYZ(i, col / 255, col / 255, col / 255);
        }
        const shoreMat = new THREE.MeshPhongMaterial({
            color: 0x44CCBB,
            transparent: true,
            opacity: 0.25,
            shininess: 80,
            specular: 0xCCEEFF,
            vertexColors: true,
            side: THREE.DoubleSide
        });
        const shoreMesh = new THREE.Mesh(shoreGeo, shoreMat);
        shoreMesh.position.set(0, 0.05, -160);
        shoreMesh.rotation.x = -Math.PI / 2;
        shoreMesh.receiveShadow = true;
        shoreMesh.userData.baseZ = -160;
        scene.add(shoreMesh);

        // ============ CLOUDS ============
        function createClouds() {
            const group = new THREE.Group();
            for (let i = 0; i < 35; i++) {
                const cloudGroup = new THREE.Group();
                const puffs = 4 + Math.floor(Math.random()*5);
                const opacity = 0.5 + Math.random() * 0.3;
                const mat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF, transparent: true, opacity: opacity });
                for (let j = 0; j < puffs; j++) {
                    const geo = new THREE.SphereGeometry(2.5 + Math.random()*4, 10, 8);
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.scale.y = 0.25 + Math.random()*0.2;
                    mesh.scale.x = 0.8 + Math.random()*0.6;
                    mesh.position.set(j*2.8 - puffs*1.2, Math.random()*0.8, Math.random()*3-1.5);
                    cloudGroup.add(mesh);
                }
                cloudGroup.position.set((Math.random()-0.5)*600, 50+Math.random()*30, (Math.random()-0.5)*600);
                cloudGroup.userData.cloudSpeed = Math.random() * 0.025 + 0.008;
                group.add(cloudGroup);
            }
            return group;
        }
        const clouds = createClouds();
        scene.add(clouds);

        // ============ FIREFLIES ============
        function createFireflies() {
            const count = 200;
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                positions[i*3] = (Math.random()-0.5) * 400;
                positions[i*3+1] = 0.5 + Math.random() * 5;
                positions[i*3+2] = (Math.random()-0.5) * 400;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                color: 0xFFFF66,
                size: 0.2,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });
            return new THREE.Points(geo, mat);
        }
        const fireflies = createFireflies();
        scene.add(fireflies);

        // ============ PALM TREES ============
        function createPalmTree() {
            const group = new THREE.Group();
            const barkMat = new THREE.MeshPhongMaterial({ map: barkTex, bumpMap: barkBumpTex, bumpScale: 0.3, shininess: 10, specular: 0x221100 });

            // Trunk — 12 segments for smooth organic curve
            let yOff = 0, lean = 0, leanX = 0;
            for (let i = 0; i < 12; i++) {
                const t = i / 11;
                const r1 = 0.3 - t * 0.18, r2 = 0.28 - t * 0.16, h = 0.75;
                const seg = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, h, 14), barkMat);
                seg.castShadow = true;
                lean += (Math.random() - 0.35) * 0.08;
                leanX += (Math.random() - 0.5) * 0.05;
                seg.position.set(lean * i * 0.6, yOff + h / 2, leanX * i * 0.35);
                seg.rotation.z = lean;
                seg.rotation.x = leanX;
                group.add(seg);
                yOff += h * 0.9;
                // Bark rings
                if (i < 10) {
                    const ring = new THREE.Mesh(
                        new THREE.TorusGeometry(r2 + 0.02, 0.015, 6, 14),
                        barkMat
                    );
                    ring.position.set(lean * i * 0.6, yOff, leanX * i * 0.35);
                    ring.rotation.x = Math.PI / 2;
                    group.add(ring);
                }
            }

            // Coconuts at the top (2-3 small brown spheres)
            const cocoTopMat = new THREE.MeshPhongMaterial({ color: 0x6B3A2A, shininess: 30 });
            for (let i = 0; i < 3; i++) {
                const cocoTop = new THREE.Mesh(new THREE.SphereGeometry(0.15, 10, 10), cocoTopMat);
                cocoTop.castShadow = true;
                const angle = (Math.PI * 2 / 3) * i;
                cocoTop.position.set(Math.cos(angle)*0.25, yOff + 0.3, Math.sin(angle)*0.25);
                group.add(cocoTop);
            }

            // Fronds — longer with more droop and varied green shades
            const leafColors = [0x1B8C1B, 0x2A9A2A, 0x1A7A1A, 0x228C22];
            const leafMaterials = leafColors.map(col =>
                new THREE.MeshPhongMaterial({ color: col, map: leafTex, side: THREE.DoubleSide, shininess: 20, specular: 0x114411 })
            );
            for (let i = 0; i < 12; i++) {
                const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.2;
                const frondLen = 4.0 + Math.random() * 2.0;
                const frondGeo = new THREE.PlaneGeometry(0.45, frondLen, 2, 10);
                const fpos = frondGeo.attributes.position;
                for (let v = 0; v < fpos.count; v++) {
                    const vy = fpos.getY(v);
                    const t = (vy + frondLen / 2) / frondLen; // 0 at base, 1 at tip
                    // More pronounced drooping curve
                    fpos.setZ(v, -t * t * frondLen * 0.18);
                    // More tapering toward tip
                    fpos.setX(v, fpos.getX(v) * (1 - t * 0.8));
                }
                frondGeo.computeVertexNormals();
                const frond = new THREE.Mesh(frondGeo, leafMaterials[i % leafMaterials.length]);
                frond.castShadow = true;
                frond.position.set(Math.cos(angle) * 0.45, yOff - 0.3, Math.sin(angle) * 0.45);
                frond.rotation.y = -angle;
                frond.rotation.x = 0.4 + Math.random() * 0.5;
                group.add(frond);
            }

            return group;
        }

        let palmTrees = [];
        // Beach palms
        for (let i = 0; i < 50; i++) {
            const palm = createPalmTree();
            const x = (Math.random() - 0.5) * 360;
            const z = -160 + Math.random() * 60;
            palm.position.set(x, 0, z);
            palm.scale.setScalar(0.8 + Math.random() * 0.5);
            scene.add(palm);
            palmTrees.push(palm);
        }
        // Scattered inland palms
        for (let i = 0; i < 30; i++) {
            const palm = createPalmTree();
            const x = (Math.random() - 0.5) * 300;
            const z = -30 + Math.random() * 140;
            palm.position.set(x, 0, z);
            palm.scale.setScalar(0.7 + Math.random() * 0.6);
            scene.add(palm);
            palmTrees.push(palm);
        }

        // ============ TIKI STATUES ============
        function createTikiStatue() {
            const group = new THREE.Group();
            const stoneMat = new THREE.MeshPhongMaterial({ map: stoneTex, shininess: 15, emissive: 0x0A0A00, specular: 0x333322 });
            const darkStoneMat = new THREE.MeshPhongMaterial({ map: stoneTex, color: 0x5A5A4A, shininess: 12 });

            // Tapered base platform
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.6, 0.35, 12), stoneMat);
            base.castShadow = true; base.receiveShadow = true;
            base.position.y = 0.17;
            group.add(base);

            // Body — tapered with carved grooves and belly bulge
            const bodyGeo = new THREE.CylinderGeometry(0.32, 0.38, 1.5, 14);
            const bPos = bodyGeo.attributes.position;
            for (let v = 0; v < bPos.count; v++) {
                const y = bPos.getY(v);
                const angle = Math.atan2(bPos.getZ(v), bPos.getX(v));
                // Carved groove pattern with increased frequency
                const groove = Math.sin(angle * 6) * 0.02 + Math.sin(y * 8) * 0.015;
                // Belly bulge via vertex displacement
                const bellyBulge = Math.max(0, 0.4 - Math.abs(y)) * 0.1;
                const len = Math.sqrt(bPos.getX(v)**2 + bPos.getZ(v)**2);
                const newLen = len + groove + bellyBulge;
                bPos.setX(v, bPos.getX(v) / len * newLen);
                bPos.setZ(v, bPos.getZ(v) / len * newLen);
            }
            bodyGeo.computeVertexNormals();
            const body = new THREE.Mesh(bodyGeo, stoneMat);
            body.castShadow = true;
            body.position.y = 1.1;
            group.add(body);

            // Shoulder carvings
            for (let s of [-1, 1]) {
                const arm = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.6, 0.2), stoneMat);
                arm.position.set(s * 0.38, 1.3, 0);
                arm.rotation.z = s * 0.15;
                arm.castShadow = true;
                group.add(arm);
                // Hand
                const hand = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), stoneMat);
                hand.position.set(s * 0.4, 0.95, 0.15);
                group.add(hand);
            }

            // Head — larger and more imposing
            const headGeo = new THREE.SphereGeometry(0.48, 16, 16);
            const head = new THREE.Mesh(headGeo, stoneMat);
            head.scale.set(1.15, 0.95, 1.0);
            head.castShadow = true;
            head.position.y = 2.4;
            group.add(head);

            // Glowing eyes with light
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0xFF6600, emissive: 0xFF5500, emissiveIntensity: 1.0 });
            for (let i of [-1, 1]) {
                const eyeSocket = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 10), darkStoneMat);
                eyeSocket.position.set(i * 0.18, 2.4, 0.28);
                group.add(eyeSocket);
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 10), eyeMat);
                eye.position.set(i * 0.18, 2.4, 0.33);
                group.add(eye);
            }
            // Eye glow light — added conditionally per-statue for mobile perf

            // Wide carved mouth with teeth
            const mouthFrame = new THREE.Mesh(
                new THREE.BoxGeometry(0.35, 0.18, 0.1),
                darkStoneMat
            );
            mouthFrame.position.set(0, 2.1, 0.32);
            group.add(mouthFrame);
            // Teeth
            for (let t = 0; t < 4; t++) {
                const tooth = new THREE.Mesh(
                    new THREE.BoxGeometry(0.06, 0.06, 0.04),
                    new THREE.MeshPhongMaterial({ color: 0xDDDDBB, shininess: 20 })
                );
                tooth.position.set(-0.1 + t * 0.07, 2.15, 0.36);
                group.add(tooth);
            }

            // Crown horns
            const hornMat = new THREE.MeshPhongMaterial({ color: 0x5A5A4A, shininess: 10 });
            for (let i of [-1, 1]) {
                const horn = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.55, 8), hornMat);
                horn.position.set(i * 0.32, 2.85, 0);
                horn.rotation.z = i * 0.25;
                horn.castShadow = true;
                group.add(horn);
            }
            // Top spike
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.4, 6), hornMat);
            spike.position.y = 2.95;
            spike.castShadow = true;
            group.add(spike);

            // Nose
            const nose = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.12, 0.12), stoneMat);
            nose.position.set(0, 2.28, 0.35);
            group.add(nose);

            return group;
        }

        for (let i = 0; i < 25; i++) {
            const statue = createTikiStatue();
            const x = (Math.random() - 0.5) * 300;
            const z = -40 + Math.random() * 180;
            statue.position.set(x, 0, z);
            statue.scale.setScalar(0.7 + Math.random() * 0.6);
            // Only every 4th statue gets an eye glow light for mobile GPU perf
            if (i % 4 === 0) {
                const eyeGlow = new THREE.PointLight(0xFF6600, 0.5, 5);
                eyeGlow.position.set(0, 2.4, 0.4);
                statue.add(eyeGlow);
            }
            scene.add(statue);
        }

        // ============ TIKI HUTS ============
        function createTikiHut() {
            const group = new THREE.Group();
            const woodMat = new THREE.MeshPhongMaterial({ map: woodTex, shininess: 25, specular: 0x221100 });
            const thatchMat = new THREE.MeshPhongMaterial({ map: thatchTex, shininess: 10 });
            const darkWoodMat = new THREE.MeshPhongMaterial({ color: 0x5A3A1A, map: woodTex, shininess: 15 });

            // Raised floor with planks
            const floorGeo = new THREE.BoxGeometry(3.8, 0.15, 3.2);
            const floorMesh = new THREE.Mesh(floorGeo, woodMat);
            floorMesh.castShadow = true;
            floorMesh.receiveShadow = true;
            floorMesh.position.y = 0.3;
            group.add(floorMesh);
            // Floor edge trim
            for (let side of [[-1.9,0,0,0.15,3.2],[1.9,0,0,0.15,3.2],[0,0,-1.6,3.8,0.15],[0,0,1.6,3.8,0.15]]) {
                const trim = new THREE.Mesh(new THREE.BoxGeometry(side[3], 0.08, side[4]), darkWoodMat);
                trim.position.set(side[0], 0.2, side[2]);
                trim.castShadow = true;
                group.add(trim);
            }
            // Floor support stilts
            for (let x of [-1.5, 0, 1.5]) {
                for (let z of [-1, 1]) {
                    const stilt = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.3, 8), darkWoodMat);
                    stilt.position.set(x, 0.08, z);
                    stilt.castShadow = true;
                    group.add(stilt);
                }
            }

            // Corner poles — thicker, tapered
            const poles = [[-1.6, -1.3], [1.6, -1.3], [-1.6, 1.3], [1.6, 1.3]];
            for (const [x, z] of poles) {
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 2.5, 12), woodMat);
                pole.castShadow = true;
                pole.position.set(x, 1.55, z);
                group.add(pole);
            }

            // Cross beams connecting poles
            for (let z of [-1.3, 1.3]) {
                const beam = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.1, 0.1), woodMat);
                beam.position.set(0, 2.7, z);
                beam.castShadow = true;
                group.add(beam);
            }

            // Thatch roof — thicker cone with second layer underneath
            const roofGeo = new THREE.ConeGeometry(3.0, 2.2, 16);
            const roofMesh = new THREE.Mesh(roofGeo, thatchMat);
            roofMesh.castShadow = true;
            roofMesh.position.y = 3.9;
            group.add(roofMesh);

            // Second cone layer underneath for thickness
            const roofUnderlayGeo = new THREE.ConeGeometry(3.15, 1.8, 16);
            const roofUnderlay = new THREE.Mesh(roofUnderlayGeo, thatchMat);
            roofUnderlay.castShadow = true;
            roofUnderlay.position.y = 3.0;
            group.add(roofUnderlay);

            // Roof ridge detail at the peak
            const ridgeGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.4, 6);
            const ridge = new THREE.Mesh(ridgeGeo, thatchMat);
            ridge.position.y = 4.95;
            ridge.rotation.z = Math.PI / 2;
            ridge.castShadow = true;
            group.add(ridge);

            // Roof overhang ring
            const overhang = new THREE.Mesh(
                new THREE.TorusGeometry(2.9, 0.08, 6, 20),
                thatchMat
            );
            overhang.position.y = 2.8;
            overhang.rotation.x = Math.PI / 2;
            overhang.castShadow = true;
            group.add(overhang);

            // Bar counter
            const bar = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.12, 0.6), woodMat);
            bar.position.set(0, 1.0, 1.3);
            bar.castShadow = true;
            group.add(bar);
            // Bar front panel
            const barFront = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.65, 0.08), darkWoodMat);
            barFront.position.set(0, 0.65, 1.55);
            barFront.castShadow = true;
            group.add(barFront);

            // Bar stools — 3 along the counter
            for (let s = 0; s < 3; s++) {
                const stoolBase = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.6, 8), darkWoodMat);
                stoolBase.position.set(-0.7 + s * 0.7, 0.6, 1.9);
                stoolBase.castShadow = true;
                group.add(stoolBase);
                const stoolSeat = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.16, 0.06, 12), woodMat);
                stoolSeat.position.set(-0.7 + s * 0.7, 0.93, 1.9);
                stoolSeat.castShadow = true;
                group.add(stoolSeat);
            }

            // Hanging decorations — string of shells along beam
            const shellMat = new THREE.MeshPhongMaterial({ color: 0xFFF5E1, shininess: 40 });
            for (let d = 0; d < 7; d++) {
                const shell = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), shellMat);
                shell.scale.y = 0.6;
                shell.position.set(-1.2 + d * 0.4, 2.5 + Math.sin(d * 0.9) * 0.1, 0);
                shell.castShadow = true;
                group.add(shell);
            }
            // String connecting shells
            const stringMat = new THREE.MeshPhongMaterial({ color: 0x8B7355, shininess: 5 });
            const string = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 2.8, 4), stringMat);
            string.rotation.z = Math.PI / 2;
            string.position.set(0, 2.55, 0);
            group.add(string);

            // Tiki masks on poles — carved faces
            for (let s of [-1.6, 1.6]) {
                const maskMat = new THREE.MeshPhongMaterial({ color: 0x6B4226, map: woodTex, shininess: 12 });
                const mask = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.35, 0.08), maskMat);
                mask.position.set(s, 1.8, 0);
                mask.castShadow = true;
                group.add(mask);
                // Mask eyes
                const mEyeMat = new THREE.MeshPhongMaterial({ color: 0xFF6600, emissive: 0xFF4400, emissiveIntensity: 0.5 });
                for (let e of [-1, 1]) {
                    const mEye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), mEyeMat);
                    mEye.position.set(s + e * 0.06, 1.84, 0.05);
                    group.add(mEye);
                }
                // Mask mouth
                const mMouth = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.06, 0.04), new THREE.MeshPhongMaterial({ color: 0x3A1A0A }));
                mMouth.position.set(s, 1.72, 0.05);
                group.add(mMouth);
            }

            return group;
        }

        // Village cluster — south-central
        for (let i = 0; i < 6; i++) {
            const hut = createTikiHut();
            const angle = (Math.PI * 2 / 6) * i;
            hut.position.set(Math.cos(angle) * 35, 0, Math.sin(angle) * 35 + 40);
            scene.add(hut);
        }
        // Market area — west side
        for (let i = 0; i < 5; i++) {
            const hut = createTikiHut();
            hut.position.set(-100 + i * 15, 0, 20 + (i % 2) * 12);
            hut.rotation.y = Math.random() * 0.4;
            scene.add(hut);
        }
        // Jungle outpost — north
        for (let i = 0; i < 4; i++) {
            const hut = createTikiHut();
            const angle = (Math.PI * 2 / 4) * i;
            hut.position.set(Math.cos(angle) * 20 + 80, 0, Math.sin(angle) * 20 + 120);
            hut.scale.setScalar(0.9);
            scene.add(hut);
        }

        // ============ TIKI TORCHES ============
        function createTikiTorch() {
            const group = new THREE.Group();
            const poleMat = new THREE.MeshPhongMaterial({ map: woodTex, shininess: 20 });
            const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.8, 12);
            const poleMesh = new THREE.Mesh(poleGeo, poleMat);
            poleMesh.castShadow = true;
            poleMesh.position.y = 0.9;
            group.add(poleMesh);

            // Torch bowl/cup at the top (torus shape)
            const bowlMat = new THREE.MeshPhongMaterial({ color: 0x8B6F47, shininess: 30 });
            const bowlGeo = new THREE.CylinderGeometry(0.22, 0.2, 0.12, 12);
            const bowl = new THREE.Mesh(bowlGeo, bowlMat);
            bowl.castShadow = true;
            bowl.position.y = 1.88;
            group.add(bowl);

            // Varied flame shapes with different scales on x/y/z
            const flameMat1 = new THREE.MeshPhongMaterial({ color: 0xFFDD00, emissive: 0xFFAA00, emissiveIntensity: 0.7 });
            const flameGeo1 = new THREE.SphereGeometry(0.2, 8, 8);
            const flameMesh1 = new THREE.Mesh(flameGeo1, flameMat1);
            flameMesh1.scale.set(1.1, 1.0, 0.9);
            flameMesh1.position.y = 2.0;
            group.add(flameMesh1);

            const flameMat2 = new THREE.MeshPhongMaterial({ color: 0xFF8800, emissive: 0xFF6600, emissiveIntensity: 0.8 });
            const flameGeo2 = new THREE.SphereGeometry(0.15, 8, 8);
            const flameMesh2 = new THREE.Mesh(flameGeo2, flameMat2);
            flameMesh2.scale.set(0.9, 1.1, 1.0);
            flameMesh2.position.y = 2.25;
            group.add(flameMesh2);

            const flameMat3 = new THREE.MeshPhongMaterial({ color: 0xFF4400, emissive: 0xFF2200, emissiveIntensity: 0.9 });
            const flameGeo3 = new THREE.SphereGeometry(0.1, 8, 8);
            const flameMesh3 = new THREE.Mesh(flameGeo3, flameMat3);
            flameMesh3.scale.set(1.0, 0.9, 1.1);
            flameMesh3.position.y = 2.45;
            group.add(flameMesh3);

            // Light added conditionally — see torch creation loops

            group.flameIndex = 0;
            group.flameMeshes = [flameMesh1, flameMesh2, flameMesh3];
            group.userData.baseScales = [
                [1.1, 1.0, 0.9],
                [0.9, 1.1, 1.0],
                [1.0, 0.9, 1.1]
            ];
            return group;
        }

        let torches = [];
        let torchIndex = 0;
        function addTorch(x, y, z) {
            const torch = createTikiTorch();
            torch.position.set(x, y, z);
            // Only every 3rd torch gets a PointLight for mobile GPU perf
            if (torchIndex % 3 === 0) {
                const light = new THREE.PointLight(0xFF8844, 1.5, 18);
                light.position.set(0, 1.9, 0);
                torch.add(light);
            }
            torchIndex++;
            scene.add(torch);
            torches.push(torch);
        }
        // Ring around village
        for (let i = 0; i < 18; i++) {
            const angle = (Math.PI * 2 / 18) * i;
            addTorch(Math.cos(angle) * 40, 0, Math.sin(angle) * 40 + 40);
        }
        // Path torches along the sandy path
        for (let i = 0; i < 16; i++) {
            const side = (i % 2 === 0) ? 5 : -5;
            addTorch(side, 0, -80 + i * 15);
        }
        // Beach torches
        for (let i = 0; i < 10; i++) {
            addTorch(-140 + i * 30, 0, -130);
        }

        // ============ PROPS - Enhanced transformable objects ============
        // These are the objects that Menehune can hide behind to disguise themselves
        // Each prop is detailed and uses procedural textures for maximum visual quality
        const propMaterials = {
            surfboard: new THREE.MeshPhongMaterial({ color: 0xFF6B35, map: woodTex, bumpMap: woodBumpTex, bumpScale: 0.3, shininess: 25 }),
            umbrella: new THREE.MeshPhongMaterial({ color: 0xFF69B4, shininess: 30 }),
            chair: new THREE.MeshPhongMaterial({ color: 0xA0826D, map: woodTex, bumpMap: woodBumpTex, bumpScale: 0.3, shininess: 15 }),
            barrel: new THREE.MeshPhongMaterial({ color: 0x8B5A2B, map: woodTex, bumpMap: woodBumpTex, bumpScale: 0.3, shininess: 20 }),
            rock: new THREE.MeshPhongMaterial({ color: 0x808080, map: stoneTex, bumpMap: stoneBumpTex, bumpScale: 0.3, shininess: 10 }),
            cooler: new THREE.MeshPhongMaterial({ color: 0x1E90FF, shininess: 40 }),
            kayak: new THREE.MeshPhongMaterial({ color: 0xFFD700, shininess: 35 }),
            crate: new THREE.MeshPhongMaterial({ color: 0x7B5B3A, map: woodTex, bumpMap: woodBumpTex, bumpScale: 0.3, shininess: 12 }),
            hammock: new THREE.MeshPhongMaterial({ color: 0xE8D5B7, shininess: 8 }),

        // Enhanced prop creation with more geometric detail

            const types = ['surfboard', 'umbrella', 'chair', 'barrel', 'rock', 'cooler', 'kayak', 'crate', 'hammock', 'lantern', 'drum', 'fishNet'];
            const type = types[Math.floor(Math.random() * types.length)];

                mesh = new THREE.Group();
                const boardGeo = new THREE.BoxGeometry(0.5, 0.1, 2.2, 4, 1, 8);

                const bp = boardGeo.attributes.position;
                for (let v = 0; v < bp.count; v++) {
                    const z = bp.getZ(v);
                    const x = bp.getX(v);
                    const taper = 1 - Math.pow(Math.abs(z) / 1.1, 2) * 0.6;
                    bp.setX(v, x * Math.max(0.2, taper));
                    // Slight curve upward at nose
                    if (z > 0.8) bp.setY(v, bp.getY(v) + (z - 0.8) * 0.15);

                boardGeo.computeVertexNormals();
                const board = new THREE.Mesh(boardGeo, propMaterials.surfboard);

                // Metal bands
                const bandMat = new THREE.MeshPhongMaterial({ color: 0x555555, shininess: 50, specular: 0x888888 });
                for (let j = 0; j < 3; j++) {

                for (let s of [-1, 1]) {
                    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.2, 6), postMat);
                    post.position.set(s * 0.8, 0.6, 0);

        // Helper function to add vertex colors for weathering effect
        function addPropWeathering(propMesh) {
            propMesh.traverse(child => {
                if (child.isMesh && child.geometry) {
                    const geo = child.geometry;
                    const posAttr = geo.attributes.position;
                    if (!posAttr) return;

                    // Create color attribute if it doesn't exist
                    if (!geo.attributes.color) {
                        const colors = new Float32Array(posAttr.count * 3);
                        for (let i = 0; i < colors.length; i++) colors[i] = 1.0; // default white
                        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                    }

                    const colorAttr = geo.attributes.color;

                    // Get bounding box to determine Y range
                    geo.computeBoundingBox();
                    const box = geo.boundingBox;
                    const minY = box.min.y, maxY = box.max.y;
                    const yRange = maxY - minY;

                    // Apply weathering colors based on Y position
                    for (let i = 0; i < posAttr.count; i++) {
                        const y = posAttr.getY(i);
                        const t = yRange > 0 ? (y - minY) / yRange : 0.5; // 0 at bottom, 1 at top

                        // Bottom: darker (ground dirt/shadow, multiply by 0.6)
                        // Top: lighter (sun bleaching, multiply by 1.1)
                        const factor = 0.6 + t * (1.1 - 0.6);

                        colorAttr.setXYZ(i, factor, factor, factor);
                    }

                    // Enable vertex colors on material
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(mat => mat.vertexColors = true);
                        } else {
                            child.material.vertexColors = true;
                        }
                    }
                }
            });
        }

        // Spawn 80 props across the expanded map — Menehune use these to hide
        for (let i = 0; i < 80; i++) {
            const mesh = createRandomProp();
            const x = (Math.random() - 0.5) * 340;
            const z = -140 + Math.random() * 280;
            mesh.position.set(x, 0.5, z);
            mesh.rotation.y = Math.random() * Math.PI * 2;
            // Add weathering vertex colors
            addPropWeathering(mesh);
            scene.add(mesh);
            props.push({
                mesh: mesh,
                position: mesh.position.clone(),
                hidden: false,
                hiddenBy: null
            });
        }

        // ============ BANANA TREES ============
        function createBananaTree() {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshPhongMaterial({ color: 0x6B8E23, map: barkTex, shininess: 10 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 3.5, 10), trunkMat);

            group.add(trunk);

            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i;
                const leafGeo = new THREE.PlaneGeometry(0.8, 2.5, 1, 6);
                const lp = leafGeo.attributes.position;
                for (let v = 0; v < lp.count; v++) {
                    const vy = lp.getY(v);
                    lp.setZ(v, -vy * vy * 0.05);
                }
                leafGeo.computeVertexNormals();
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.set(Math.cos(angle) * 0.3, 3.3, Math.sin(angle) * 0.3);
                leaf.rotation.y = -angle;
                leaf.rotation.x = 0.4 + Math.random() * 0.3;

        // ============ WATERFALL ============
        function createWaterfall() {
            const group = new THREE.Group();
            // Cliff face — layered rock with ledges
            const cliffMat = new THREE.MeshPhongMaterial({ map: stoneTex, color: 0x6A6A5A, shininess: 8 });
            const darkCliffMat = new THREE.MeshPhongMaterial({ map: stoneTex, color: 0x4A4A3A, shininess: 6 });

            // Main cliff body
            const cliff = new THREE.Mesh(new THREE.BoxGeometry(8, 12, 6), cliffMat);
            cliff.position.y = 6;
            cliff.castShadow = true;
            cliff.receiveShadow = true;
            group.add(cliff);

            // Rock ledges on cliff face
            for (let i = 0; i < 4; i++) {
                const ledge = new THREE.Mesh(
                    new THREE.BoxGeometry(3 + Math.random() * 3, 0.4, 1.2),
                    darkCliffMat
                );
                ledge.position.set((Math.random() - 0.5) * 2, 2 + i * 2.5, 3.2);
                ledge.castShadow = true;
                group.add(ledge);
            }

            // Cliff vegetation — ferns growing from cracks
            const fernMat = new THREE.MeshPhongMaterial({ color: 0x2D7A2D, side: THREE.DoubleSide, shininess: 10 });
            for (let i = 0; i < 12; i++) {
                const fern = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.8, 1, 3), fernMat);
                const fp = fern.geometry.attributes.position;
                for (let v = 0; v < fp.count; v++) {
                    fp.setZ(v, -fp.getY(v) * fp.getY(v) * 0.15);
                }
                fern.geometry.computeVertexNormals();
                fern.position.set(
                    -3 + Math.random() * 6,
                    1 + Math.random() * 10,
                    3.1 + Math.random() * 0.3
                );
                fern.rotation.y = Math.random() * 0.6 - 0.3;
                fern.castShadow = true;
                group.add(fern);
            }

            // Water stream — animated vertex displacement
            const streamMat = new THREE.MeshPhongMaterial({
                color: 0x44AADD, transparent: true, opacity: 0.6,
                shininess: 100, specular: 0xFFFFFF, emissive: 0x113344, emissiveIntensity: 0.2
            });
            const streamGeo = new THREE.PlaneGeometry(2, 12, 6, 30);
            const stream = new THREE.Mesh(streamGeo, streamMat);
            stream.position.set(0, 6, 3.05);
            group.add(stream);
            group.userData.stream = stream;
            // Store original positions for animation
            const streamOrig = new Float32Array(streamGeo.attributes.position.array);
            group.userData.streamOrig = streamOrig;

            // Secondary cascade stream (wider, thinner)
            const cascade = new THREE.Mesh(
                new THREE.PlaneGeometry(3, 12, 4, 20),
                new THREE.MeshPhongMaterial({ color: 0x66CCEE, transparent: true, opacity: 0.3, shininess: 80 })
            );
            cascade.position.set(0, 6, 3.02);
            group.add(cascade);

            // Pool at base — rippled surface
            const poolGeo = new THREE.CylinderGeometry(4, 4, 0.3, 32);
            const pool = new THREE.Mesh(poolGeo, new THREE.MeshPhongMaterial({
                color: 0x2288BB, transparent: true, opacity: 0.7,
                shininess: 120, specular: 0x99CCFF, envMap: envMap, reflectivity: 0.3
            }));
            pool.position.y = 0.15;
            pool.receiveShadow = true;
            group.add(pool);
            group.userData.pool = pool;

            // Splash mist particles at base
            const mistCount = 50;
            const mistPos = new Float32Array(mistCount * 3);
            for (let i = 0; i < mistCount; i++) {
                mistPos[i*3] = (Math.random() - 0.5) * 4;
                mistPos[i*3+1] = Math.random() * 3;
                mistPos[i*3+2] = 3 + Math.random() * 2;
            }
            const mistGeo = new THREE.BufferGeometry();
            mistGeo.setAttribute('position', new THREE.BufferAttribute(mistPos, 3));
            const mistParticles = new THREE.Points(mistGeo, new THREE.PointsMaterial({
                color: 0xCCEEFF, size: 0.3, transparent: true, opacity: 0.25, sizeAttenuation: true
            }));
            group.add(mistParticles);
            group.userData.mist = mistParticles;

            // Mist light — brighter
            const mistLight = new THREE.PointLight(0x88CCFF, 0.8, 18);
            mistLight.position.set(0, 3, 4);
            group.add(mistLight);

            // Rainbow effect near the mist (subtle arc)
            const rainbowMat = new THREE.MeshPhongMaterial({
                color: 0xFFFFFF, transparent: true, opacity: 0.08,
                emissive: 0xFF8844, emissiveIntensity: 0.3, side: THREE.DoubleSide
            });
            const rainbowGeo = new THREE.TorusGeometry(5, 0.15, 4, 32, Math.PI * 0.6);
            const rainbow = new THREE.Mesh(rainbowGeo, rainbowMat);
            rainbow.position.set(0, 5, 5);
            rainbow.rotation.z = -0.2;
            group.add(rainbow);

            return group;
        }
        const waterfall = createWaterfall();
        waterfall.position.set(100, 0, 130);
        scene.add(waterfall);

        function createSeagulls() {
            const group = new THREE.Group();
            const wingMat = new THREE.MeshPhongMaterial({ color: 0xEEEEEE, shininess: 15 });

            // Create 12 flying seagulls
            for (let i = 0; i < 12; i++) {
                const seagull = new THREE.Group();
                const angle = (Math.PI * 2 / 6) * i;
                const distance = 80 + Math.random() * 30;

                // Body
                const body = new THREE.Mesh(
                    new THREE.SphereGeometry(0.2, 8, 8),
                    new THREE.MeshPhongMaterial({ color: 0xFFFFFF, shininess: 20 })
                );
                body.castShadow = true;
                seagull.add(body);

                // Head
                const head = new THREE.Mesh(
                    new THREE.SphereGeometry(0.12, 8, 8),
                    new THREE.MeshPhongMaterial({ color: 0xEEEEEE, shininess: 15 })
                );
                head.position.z = 0.2;
                head.castShadow = true;
                seagull.add(head);

                // Wings
                for (let j of [-1, 1]) {
                    const wing = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.8, 0.3),
                        wingMat
                    );
                    wing.position.set(j * 0.5, 0, 0);
                    wing.rotation.z = j * 0.3;
                    wing.castShadow = true;
                    seagull.add(wing);
                }

                seagull.position.set(

                );
                seagull.userData.flightAngle = angle;
                seagull.userData.flightDistance = distance;
                group.add(seagull);
            }
            return group;
