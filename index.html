        // ============ GROUND ============
        function createGround() {
            const groundGroup = new THREE.Group();

            // Wide beach strip along south edge with natural dunes
            const beachGeo = new THREE.PlaneGeometry(400, 60, 80, 40);
            beachGeo.rotateX(-Math.PI / 2);
            // 3-frequency noise for realistic dunes with micro ripples
            const bPos = beachGeo.attributes.position;
            for (let i = 0; i < bPos.count; i++) {
                const x = bPos.getX(i), z = bPos.getZ(i);
                const h = Math.sin(x * 0.02) * 0.45 + Math.cos(z * 0.015) * 0.35
                    + Math.sin(x * 0.08 + z * 0.06) * 0.18
                    + Math.sin(x * 0.22 + z * 0.18) * 0.06; // micro wind ripples
                bPos.setY(i, h);
            }
            // Vertex colors: wet sand near shore, dry sand inland
            const bColors = new Float32Array(bPos.count * 3);
            for (let i = 0; i < bPos.count; i++) {
                const z = bPos.getZ(i);
                const wetness = Math.max(0, Math.min(1, (z + 30) / 30)); // 0=inland(dry), 1=shore(wet)
                // Dry: warm tan (0.87,0.82,0.70), Wet: darker damp (0.65,0.58,0.45)
                bColors[i*3]   = 0.87 - wetness * 0.22;
                bColors[i*3+1] = 0.82 - wetness * 0.24;
                bColors[i*3+2] = 0.70 - wetness * 0.25;
            }
            beachGeo.setAttribute('color', new THREE.BufferAttribute(bColors, 3));
            beachGeo.computeVertexNormals();
            const beachMat = new THREE.MeshPhongMaterial({ map: sandTex, bumpMap: sandBumpTex, bumpScale: 0.3, shininess: 10, vertexColors: true });
            const beachMesh = new THREE.Mesh(beachGeo, beachMat);
            beachMesh.position.z = -130;
            beachMesh.receiveShadow = true;
            groundGroup.add(beachMesh);

            // Main grass field — center of the map
            const grassGeo = new THREE.PlaneGeometry(400, 200, 80, 80);
            grassGeo.rotateX(-Math.PI / 2);
            // 3-frequency terrain: rolling hills + medium bumps + micro clumps
            const gPos = grassGeo.attributes.position;
            for (let i = 0; i < gPos.count; i++) {
                const x = gPos.getX(i), z = gPos.getZ(i);
                const h1 = Math.sin(x * 0.02) * 0.5 + Math.cos(z * 0.03) * 0.4;
                const h2 = Math.sin(x * 0.08 + z * 0.1) * 0.25 + Math.cos(x * 0.06) * 0.15;
                const h3 = Math.sin(x * 0.2 + z * 0.25) * 0.07; // micro bumps (tufts/roots)
                const h = h1 + h2 + h3;
                gPos.setY(i, h);
            }
            // Add vertex colors for zone blending (Z-based gradient)
            const gColor = grassGeo.getAttribute('color') || new THREE.BufferAttribute(new Float32Array(gPos.count * 3), 3);
            grassGeo.setAttribute('color', gColor);
            const minZ = -100, maxZ = 100;
            for (let i = 0; i < gPos.count; i++) {
                const z = gPos.getZ(i);
                const t = (z - minZ) / (maxZ - minZ); // 0 at south (beach), 1 at north (jungle)
                // South edge: sandy tan (0.86, 0.82, 0.71)
                // Center: rich green (0.29, 0.48, 0.18)
                // North edge: dark jungle green (0.12, 0.29, 0.06)
                let r, g, b;
                if (t < 0.5) {
                    // South to center: tan to green
                    const s = t * 2;
                    r = 0.86 - s * (0.86 - 0.29);
                    g = 0.82 - s * (0.82 - 0.48);
                    b = 0.71 - s * (0.71 - 0.18);
                } else {
                    // Center to north: green to dark jungle green
                    const s = (t - 0.5) * 2;
                    r = 0.29 - s * (0.29 - 0.12);
                    g = 0.48 - s * (0.48 - 0.29);
                    b = 0.18 - s * (0.18 - 0.06);
                }
                gColor.setXYZ(i, r, g, b);
            }
            grassGeo.computeVertexNormals();
            const grassMat = new THREE.MeshPhongMaterial({ map: grassTex, bumpMap: sandBumpTex, bumpScale: 0.2, shininess: 5, vertexColors: true });
            const grassMesh = new THREE.Mesh(grassGeo, grassMat);
            grassMesh.position.z = 0;
            grassMesh.receiveShadow = true;
            groundGroup.add(grassMesh);

            // Dense jungle zone at the north with root-covered ground
            const jungleGeo = new THREE.PlaneGeometry(400, 80, 70, 40);
            jungleGeo.rotateX(-Math.PI / 2);
            // Multi-frequency: gentle undulation + root bumps + leaf-litter micro noise
            const jPos = jungleGeo.attributes.position;
            for (let i = 0; i < jPos.count; i++) {
                const x = jPos.getX(i), z = jPos.getZ(i);
                const h = Math.sin(x * 0.03) * 0.25 + Math.cos(z * 0.04) * 0.2
                    + Math.sin(x * 0.12 + z * 0.1) * 0.1  // root bumps
                    + Math.sin(x * 0.3) * Math.cos(z * 0.25) * 0.04; // leaf litter micro
                jPos.setY(i, h);
            }
            // Vertex colors for dappled shadow / mulch variation
            const jColors = new Float32Array(jPos.count * 3);
            for (let i = 0; i < jPos.count; i++) {
                const x = jPos.getX(i), z = jPos.getZ(i);
                const dapple = 0.7 + Math.sin(x * 0.15 + z * 0.12) * 0.15 + Math.random() * 0.1;
                jColors[i*3]   = 0.12 * dapple;
                jColors[i*3+1] = 0.29 * dapple;
                jColors[i*3+2] = 0.06 * dapple;
            }
            jungleGeo.setAttribute('color', new THREE.BufferAttribute(jColors, 3));
            jungleGeo.computeVertexNormals();
            const jungleMat = new THREE.MeshPhongMaterial({ map: grassTex, shininess: 5, vertexColors: true });
            jungleMat.color.set(0x1E4A0E);
            const jungleMesh = new THREE.Mesh(jungleGeo, jungleMat);
            jungleMesh.position.z = 140;
            jungleMesh.receiveShadow = true;
            groundGroup.add(jungleMesh);

            // Volcanic rock area — east side with jagged basalt texture
            const volcGeo = new THREE.PlaneGeometry(80, 120, 40, 40);
            volcGeo.rotateX(-Math.PI / 2);
            const vPos = volcGeo.attributes.position;
            for (let i = 0; i < vPos.count; i++) {
                const x = vPos.getX(i), z = vPos.getZ(i);
                vPos.setY(i, Math.sin(x * 0.08) * 0.5 + Math.cos(z * 0.06) * 0.4
                    + Math.sin(x * 0.2 + z * 0.18) * 0.2  // jagged basalt cracks
                    + Math.random() * 0.05);  // micro roughness
            }
            // Vertex colors: dark basalt with reddish oxidation patches
            const vColors = new Float32Array(vPos.count * 3);
            for (let i = 0; i < vPos.count; i++) {
                const rust = Math.random() > 0.7 ? 0.15 : 0;
                vColors[i*3]   = 0.22 + rust + Math.random() * 0.05;
                vColors[i*3+1] = 0.20 + Math.random() * 0.04;
                vColors[i*3+2] = 0.18 + Math.random() * 0.03;
            }
            volcGeo.setAttribute('color', new THREE.BufferAttribute(vColors, 3));
            volcGeo.computeVertexNormals();
            const volcMat = new THREE.MeshPhongMaterial({ map: gravelTex, color: 0x4A4A4A, shininess: 8, vertexColors: true });
            const volcMesh = new THREE.Mesh(volcGeo, volcMat);
            volcMesh.position.set(160, 0.05, 40);
            volcMesh.receiveShadow = true;
            groundGroup.add(volcMesh);

            // Sandy path winding through the center with terrain following
            const pathGeo = new THREE.PlaneGeometry(8, 200, 4, 40);
            pathGeo.rotateX(-Math.PI / 2);
            // Displace path vertices to follow terrain hills
            const pPos = pathGeo.attributes.position;
            for (let i = 0; i < pPos.count; i++) {
                const x = pPos.getX(i), z = pPos.getZ(i);
                const h = Math.sin(x * 0.02) * 0.5 + Math.cos(z * 0.03) * 0.4 +
                         Math.sin(x * 0.08 + z * 0.1) * 0.25;
                pPos.setY(i, h);
            }
            pathGeo.computeVertexNormals();
            const pathMat = new THREE.MeshPhongMaterial({ map: sandTex, color: 0xC4B490, shininess: 5 });
            const pathMesh = new THREE.Mesh(pathGeo, pathMat);
            pathMesh.position.set(0, 0.02, 0);
            pathMesh.receiveShadow = true;
            groundGroup.add(pathMesh);

            return groundGroup;
        }
        scene.add(createGround());

        // ============ OCEAN ============
        function createOcean() {
            const geo = new THREE.PlaneGeometry(600, 200, 120, 60);
            // Depth color gradient — shallows are turquoise, deep water is dark blue
            const oPos = geo.attributes.position;
            const oColors = new Float32Array(oPos.count * 3);
            for (let i = 0; i < oPos.count; i++) {
                const y = oPos.getY(i); // in plane coords, Y = depth direction
                const t = Math.max(0, Math.min(1, (y + 100) / 200)); // 0=near shore, 1=far
                // Shallow: turquoise (0.2, 0.67, 0.6) → Deep: dark navy (0.08, 0.15, 0.35)
                oColors[i*3]   = 0.20 - t * 0.12;
                oColors[i*3+1] = 0.67 - t * 0.52;
                oColors[i*3+2] = 0.60 - t * 0.25;
            }
            geo.setAttribute('color', new THREE.BufferAttribute(oColors, 3));
            const mat = new THREE.MeshPhongMaterial({
                map: waterTex,
                envMap: envMap,
                transparent: true,
                opacity: 0.8,
                shininess: 180,
                specular: 0xCCEEFF,
                color: 0x33AA99,
                reflectivity: 0.65,
                combine: THREE.MixOperation,
                vertexColors: true,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(0, -0.3, -260);
            mesh.receiveShadow = true;
            return mesh;
        }
        const ocean = createOcean();
        scene.add(ocean);
        const oceanPositions = ocean.geometry.attributes.position.array.slice();

        // Water shoreline gradient (shallow water zone between beach and ocean)
        const shoreGeo = new THREE.PlaneGeometry(400, 20, 60, 10);
        const shoreColor = shoreGeo.getAttribute('color') || new THREE.BufferAttribute(new Float32Array(shoreGeo.attributes.position.count * 3), 3);
        shoreGeo.setAttribute('color', shoreColor);
        // Beach side (Z = -150) nearly transparent, ocean side (Z = -170) more opaque
        for (let i = 0; i < shoreGeo.attributes.position.count; i++) {
            const z = shoreGeo.attributes.position.getZ(i);
            const t = (z - (-150)) / (-170 - (-150));
            const opacity = 0.05 + t * 0.3; // gradient from 0.05 to 0.35
            const col = Math.floor(opacity * 255);
            shoreColor.setXYZ(i, col / 255, col / 255, col / 255);
        }
        const shoreMat = new THREE.MeshPhongMaterial({
            color: 0x44CCBB,
            transparent: true,
            opacity: 0.25,
            shininess: 80,
            specular: 0xCCEEFF,
            vertexColors: true,
            side: THREE.DoubleSide
        });
        const shoreMesh = new THREE.Mesh(shoreGeo, shoreMat);
        shoreMesh.position.set(0, 0.05, -160);
        shoreMesh.rotation.x = -Math.PI / 2;
        shoreMesh.receiveShadow = true;
        shoreMesh.userData.baseZ = -160;
        scene.add(shoreMesh);

        // ============ CLOUDS ============
        function createClouds() {
            const group = new THREE.Group();
            // Low cumulus clouds — thick, warm-tinted near sunset
            for (let i = 0; i < 25; i++) {
                const cloudGroup = new THREE.Group();
                const puffs = 5 + Math.floor(Math.random()*6);
                const opacity = 0.5 + Math.random() * 0.3;
                // Sunset-tinted bottom, brighter top
                const topMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF, transparent: true, opacity: opacity });
                const botMat = new THREE.MeshBasicMaterial({ color: 0xFFDDCC, transparent: true, opacity: opacity * 0.7 });
                for (let j = 0; j < puffs; j++) {
                    const r = 2.5 + Math.random()*4;
                    const geo = new THREE.SphereGeometry(r, 10, 8);
                    const mesh = new THREE.Mesh(geo, j % 3 === 0 ? botMat : topMat);
                    mesh.scale.y = 0.25 + Math.random()*0.2;
                    mesh.scale.x = 0.8 + Math.random()*0.6;
                    mesh.position.set(j*2.8 - puffs*1.2, (Math.random()-0.3)*1.2, Math.random()*3-1.5);
                    cloudGroup.add(mesh);
                }
                cloudGroup.position.set((Math.random()-0.5)*600, 45+Math.random()*20, (Math.random()-0.5)*600);
                cloudGroup.userData.cloudSpeed = Math.random() * 0.025 + 0.008;
                group.add(cloudGroup);
            }
            // High wispy cirrus clouds — thin, fast, semi-transparent
            for (let i = 0; i < 15; i++) {
                const cloudGroup = new THREE.Group();
                const wisps = 2 + Math.floor(Math.random()*3);
                const mat = new THREE.MeshBasicMaterial({ color: 0xEEEEFF, transparent: true, opacity: 0.15 + Math.random() * 0.15 });
                for (let j = 0; j < wisps; j++) {
                    const geo = new THREE.SphereGeometry(3 + Math.random()*5, 8, 6);
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.scale.set(2 + Math.random(), 0.08 + Math.random()*0.06, 0.6 + Math.random()*0.4);
                    mesh.position.set(j*6 - wisps*3, 0, Math.random()*2-1);
                    cloudGroup.add(mesh);
                }
                cloudGroup.position.set((Math.random()-0.5)*700, 72+Math.random()*15, (Math.random()-0.5)*700);
                cloudGroup.userData.cloudSpeed = Math.random() * 0.04 + 0.015; // faster
                group.add(cloudGroup);
            }
            return group;
        }
        const clouds = createClouds();
        scene.add(clouds);

        // ============ FIREFLIES ============
        function createFireflies() {
            const count = 200;
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                positions[i*3] = (Math.random()-0.5) * 400;
                positions[i*3+1] = 0.5 + Math.random() * 5;
                positions[i*3+2] = (Math.random()-0.5) * 400;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                color: 0xFFFF66,
                size: 0.2,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });
            return new THREE.Points(geo, mat);
        }
        const fireflies = createFireflies();
        scene.add(fireflies);

        // ============ PALM TREES ============
        function createPalmTree() {
            const group = new THREE.Group();
            const barkMat = new THREE.MeshPhongMaterial({ color: 0x6B4423, map: barkTex, bumpMap: barkBumpTex, bumpScale: 0.3, shininess: 10, specular: 0x221100 });

            // Trunk — 12 segments for smooth organic curve
            let yOff = 0, lean = 0, leanX = 0;
            for (let i = 0; i < 12; i++) {
                const t = i / 11;
                const r1 = 0.3 - t * 0.18, r2 = 0.28 - t * 0.16, h = 0.75;
                const seg = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, h, 14), barkMat);
                seg.castShadow = true;
                lean += (Math.random() - 0.35) * 0.08;
                leanX += (Math.random() - 0.5) * 0.05;
                seg.position.set(lean * i * 0.6, yOff + h / 2, leanX * i * 0.35);
                seg.rotation.z = lean;
                seg.rotation.x = leanX;
                group.add(seg);
                yOff += h * 0.9;
                // Bark rings
                if (i < 10) {
                    const ring = new THREE.Mesh(
                        new THREE.TorusGeometry(r2 + 0.02, 0.015, 6, 14),
                        barkMat
                    );
                    ring.position.set(lean * i * 0.6, yOff, leanX * i * 0.35);
                    ring.rotation.x = Math.PI / 2;
                    group.add(ring);
                }
            }

            // Coconuts at the top (2-3 small brown spheres)
            const cocoTopMat = new THREE.MeshPhongMaterial({ color: 0x6B3A2A, shininess: 30 });
            for (let i = 0; i < 3; i++) {
                const cocoTop = new THREE.Mesh(new THREE.SphereGeometry(0.15, 10, 10), cocoTopMat);
                cocoTop.castShadow = true;
                const angle = (Math.PI * 2 / 3) * i;
                cocoTop.position.set(Math.cos(angle)*0.25, yOff + 0.3, Math.sin(angle)*0.25);
                group.add(cocoTop);
            }

            // Crown shaft (smooth green section at top of trunk)
            const crownShaft = new THREE.Mesh(
                new THREE.CylinderGeometry(0.14, 0.18, 0.5, 10),
                new THREE.MeshPhongMaterial({ color: 0x3A7A2A, shininess: 25 })
            );
            crownShaft.position.y = yOff;
            group.add(crownShaft);

            // Fronds — longer with more droop, varied green shades, midrib detail
            const leafColors = [0x1B8C1B, 0x2A9A2A, 0x1A7A1A, 0x228C22];
            const leafMaterials = leafColors.map(col =>
                new THREE.MeshPhongMaterial({ color: col, map: leafTex, side: THREE.DoubleSide, shininess: 20, specular: 0x114411 })
            );
            const midribMat = new THREE.MeshPhongMaterial({ color: 0x4A6A2A, shininess: 12 });
            for (let i = 0; i < 12; i++) {
                const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.2;
                const frondLen = 4.0 + Math.random() * 2.0;
                const frondGeo = new THREE.PlaneGeometry(0.45, frondLen, 3, 12);
                const fpos = frondGeo.attributes.position;
                for (let v = 0; v < fpos.count; v++) {
                    const vy = fpos.getY(v);
                    const vx = fpos.getX(v);
                    const t = (vy + frondLen / 2) / frondLen;
                    // Drooping curve
                    fpos.setZ(v, -t * t * frondLen * 0.18);
                    // Tapering toward tip
                    fpos.setX(v, vx * (1 - t * 0.8));
                    // Leaflet separation — zigzag the edges
                    if (Math.abs(vx) > 0.1) {
                        const leafletWave = Math.sin(vy * 6) * 0.03 * (Math.abs(vx) / 0.225);
                        fpos.setZ(v, fpos.getZ(v) + leafletWave);
                    }
                }
                frondGeo.computeVertexNormals();
                const frond = new THREE.Mesh(frondGeo, leafMaterials[i % leafMaterials.length]);
                frond.castShadow = true;
                frond.position.set(Math.cos(angle) * 0.45, yOff - 0.3, Math.sin(angle) * 0.45);
                frond.rotation.y = -angle;
                frond.rotation.x = 0.4 + Math.random() * 0.5;
                group.add(frond);
                // Midrib (central vein on each frond)
                const midrib = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.01, 0.005, frondLen * 0.85, 6),
                    midribMat
                );
                midrib.position.copy(frond.position);
                midrib.rotation.copy(frond.rotation);
                group.add(midrib);
            }

            return group;
        }

        let palmTrees = [];
        // Beach palms
        for (let i = 0; i < 50; i++) {
            const palm = createPalmTree();
            const x = (Math.random() - 0.5) * 360;
            const z = -160 + Math.random() * 60;
            palm.position.set(x, 0, z);
            palm.scale.setScalar(0.8 + Math.random() * 0.5);
            scene.add(palm);
            palmTrees.push(palm);
        }
        // Scattered inland palms
        for (let i = 0; i < 30; i++) {
            const palm = createPalmTree();
            const x = (Math.random() - 0.5) * 300;
            const z = -30 + Math.random() * 140;
            palm.position.set(x, 0, z);
            palm.scale.setScalar(0.7 + Math.random() * 0.6);
            scene.add(palm);
            palmTrees.push(palm);
        }

        // ============ TIKI STATUES ============
        function createTikiStatue() {
            const group = new THREE.Group();
            const stoneMat = new THREE.MeshPhongMaterial({ map: stoneTex, shininess: 15, emissive: 0x0A0A00, specular: 0x333322 });
            const darkStoneMat = new THREE.MeshPhongMaterial({ map: stoneTex, color: 0x5A5A4A, shininess: 12 });

            // Tapered base platform
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.6, 0.35, 12), stoneMat);
            base.castShadow = true; base.receiveShadow = true;
            base.position.y = 0.17;
            group.add(base);

            // Body — tapered with carved grooves and belly bulge
            const bodyGeo = new THREE.CylinderGeometry(0.32, 0.38, 1.5, 14);
            const bPos = bodyGeo.attributes.position;
            for (let v = 0; v < bPos.count; v++) {
                const y = bPos.getY(v);
                const angle = Math.atan2(bPos.getZ(v), bPos.getX(v));
                // Carved groove pattern with increased frequency
                const groove = Math.sin(angle * 6) * 0.02 + Math.sin(y * 8) * 0.015;
                // Belly bulge via vertex displacement
                const bellyBulge = Math.max(0, 0.4 - Math.abs(y)) * 0.1;
                const len = Math.sqrt(bPos.getX(v)**2 + bPos.getZ(v)**2);
                const newLen = len + groove + bellyBulge;
                bPos.setX(v, bPos.getX(v) / len * newLen);
                bPos.setZ(v, bPos.getZ(v) / len * newLen);
            }
            bodyGeo.computeVertexNormals();
            const body = new THREE.Mesh(bodyGeo, stoneMat);
            body.castShadow = true;
            body.position.y = 1.1;
            group.add(body);

            // Shoulder carvings — tapered cylinders with elbow bend
            for (let s of [-1, 1]) {
                // Upper arm
                const upperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.35, 8), stoneMat);
                upperArm.position.set(s * 0.38, 1.45, 0);
                upperArm.rotation.z = s * 0.25;
                upperArm.castShadow = true;
                group.add(upperArm);
                // Forearm (angled forward)
                const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.08, 0.3, 8), stoneMat);
                forearm.position.set(s * 0.42, 1.15, 0.1);
                forearm.rotation.x = -0.4;
                forearm.rotation.z = s * 0.1;
                group.add(forearm);
                // Hand with fingers
                const hand = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), stoneMat);
                hand.position.set(s * 0.42, 0.98, 0.18);
                hand.scale.set(1, 0.7, 1.2);
                group.add(hand);
                // Finger bumps
                for (let f = 0; f < 3; f++) {
                    const finger = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), stoneMat);
                    finger.position.set(s * 0.42 + (f - 1) * 0.025, 0.94, 0.22);
                    group.add(finger);
                }
            }

            // Head — larger and more imposing
            const headGeo = new THREE.SphereGeometry(0.48, 16, 16);
            const head = new THREE.Mesh(headGeo, stoneMat);
            head.scale.set(1.15, 0.95, 1.0);
            head.castShadow = true;
            head.position.y = 2.4;
            group.add(head);

            // Glowing eyes with light
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0xFF6600, emissive: 0xFF5500, emissiveIntensity: 1.0 });
            for (let i of [-1, 1]) {
                const eyeSocket = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 10), darkStoneMat);
                eyeSocket.position.set(i * 0.18, 2.4, 0.28);
                group.add(eyeSocket);
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 10), eyeMat);
                eye.position.set(i * 0.18, 2.4, 0.33);
                group.add(eye);
            }
            // Eye glow light — added conditionally per-statue for mobile perf

            // Wide carved mouth — recessed cavity with teeth
            const mouthCavity = new THREE.Mesh(
                new THREE.BoxGeometry(0.32, 0.16, 0.12),
                new THREE.MeshPhongMaterial({ color: 0x1A0800, shininess: 2 })
            );
            mouthCavity.position.set(0, 2.1, 0.3);
            group.add(mouthCavity);
            // Mouth frame/lips
            const mouthFrame = new THREE.Mesh(
                new THREE.BoxGeometry(0.38, 0.2, 0.06),
                darkStoneMat
            );
            mouthFrame.position.set(0, 2.1, 0.35);
            group.add(mouthFrame);
            // Upper teeth (pointed, varied)
            const toothMat = new THREE.MeshPhongMaterial({ color: 0xDDDDBB, shininess: 20 });
            for (let t = 0; t < 5; t++) {
                const tw = 0.04 + Math.random() * 0.02;
                const tooth = new THREE.Mesh(
                    new THREE.ConeGeometry(tw / 2, 0.06, 4),
                    toothMat
                );
                tooth.position.set(-0.12 + t * 0.06, 2.16, 0.36);
                tooth.rotation.x = Math.PI;
                group.add(tooth);
            }
            // Lower teeth
            for (let t = 0; t < 4; t++) {
                const tooth = new THREE.Mesh(
                    new THREE.ConeGeometry(0.02, 0.05, 4),
                    toothMat
                );
                tooth.position.set(-0.09 + t * 0.06, 2.04, 0.36);
                group.add(tooth);
            }

            // Crown horns
            const hornMat = new THREE.MeshPhongMaterial({ color: 0x5A5A4A, shininess: 10 });
            for (let i of [-1, 1]) {
                const horn = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.55, 8), hornMat);
                horn.position.set(i * 0.32, 2.85, 0);
                horn.rotation.z = i * 0.25;
                horn.castShadow = true;
                group.add(horn);
            }
            // Top spike
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.4, 6), hornMat);
            spike.position.y = 2.95;
            spike.castShadow = true;
            group.add(spike);

            // Nose — wider, flared, with nostrils
            const noseGeo = new THREE.BoxGeometry(0.12, 0.14, 0.14, 2, 2, 2);
            const np = noseGeo.attributes.position;
            for (let v = 0; v < np.count; v++) {
                // Flare bottom outward
                if (np.getY(v) < 0) {
                    np.setX(v, np.getX(v) * 1.3);
                    np.setZ(v, np.getZ(v) * 1.2);
                }
            }
            noseGeo.computeVertexNormals();
            const nose = new THREE.Mesh(noseGeo, stoneMat);
            nose.position.set(0, 2.28, 0.38);
            group.add(nose);
            // Nostrils (dark recessed dots)
            for (let ns of [-1, 1]) {
                const nostril = new THREE.Mesh(
                    new THREE.SphereGeometry(0.025, 8, 8),
                    new THREE.MeshPhongMaterial({ color: 0x1A1000, shininess: 2 })
                );
                nostril.position.set(ns * 0.04, 2.24, 0.44);
                group.add(nostril);
            }

            return group;
        }

        for (let i = 0; i < 25; i++) {
            const statue = createTikiStatue();
            const x = (Math.random() - 0.5) * 300;
            const z = -40 + Math.random() * 180;
            statue.position.set(x, 0, z);
            statue.scale.setScalar(0.7 + Math.random() * 0.6);
            // Only every 4th statue gets an eye glow light for mobile GPU perf
            if (i % 4 === 0) {
                const eyeGlow = new THREE.PointLight(0xFF6600, 0.5, 5);
                eyeGlow.position.set(0, 2.4, 0.4);
                statue.add(eyeGlow);
            }
            scene.add(statue);
        }

        // ============ TIKI HUTS ============
        function createTikiHut() {
            const group = new THREE.Group();
            const woodMat = new THREE.MeshPhongMaterial({ color: 0x8B6B3E, map: woodTex, shininess: 25, specular: 0x221100 });
            const thatchMat = new THREE.MeshPhongMaterial({ color: 0x8B7D1A, map: thatchTex, shininess: 10 });
            const darkWoodMat = new THREE.MeshPhongMaterial({ color: 0x5A3A1A, map: woodTex, shininess: 15 });

            // Raised floor with planks
            const floorGeo = new THREE.BoxGeometry(3.8, 0.15, 3.2, 16, 1, 12);
            // Add plank-like grooves to floor surface
            const flp = floorGeo.attributes.position;
            for (let i = 0; i < flp.count; i++) {
                if (flp.getY(i) > 0.06) {
                    const z = flp.getZ(i);
                    const plankWarp = Math.sin(z * 8) * 0.003 + (Math.random() - 0.5) * 0.003;
                    flp.setY(i, flp.getY(i) + plankWarp);
                }
            }
            floorGeo.computeVertexNormals();
            const floorMesh = new THREE.Mesh(floorGeo, woodMat);
            floorMesh.castShadow = true;
            floorMesh.receiveShadow = true;
            floorMesh.position.y = 0.3;
            group.add(floorMesh);
            // Floor edge trim
            for (let side of [[-1.9,0,0,0.15,3.2],[1.9,0,0,0.15,3.2],[0,0,-1.6,3.8,0.15],[0,0,1.6,3.8,0.15]]) {
                const trim = new THREE.Mesh(new THREE.BoxGeometry(side[3], 0.08, side[4]), darkWoodMat);
                trim.position.set(side[0], 0.2, side[2]);
                trim.castShadow = true;
                group.add(trim);
            }
            // Floor support stilts
            for (let x of [-1.5, 0, 1.5]) {
                for (let z of [-1, 1]) {
                    const stilt = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.3, 8), darkWoodMat);
                    stilt.position.set(x, 0.08, z);
                    stilt.castShadow = true;
                    group.add(stilt);
                }
            }

            // Corner poles — thicker, tapered
            const poles = [[-1.6, -1.3], [1.6, -1.3], [-1.6, 1.3], [1.6, 1.3]];
            for (const [x, z] of poles) {
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 2.5, 12), woodMat);
                pole.castShadow = true;
                pole.position.set(x, 1.55, z);
                group.add(pole);
            }

            // Cross beams connecting poles — with slight natural warp
            for (let z of [-1.3, 1.3]) {
                const beamGeo = new THREE.BoxGeometry(3.2, 0.1, 0.1, 10, 1, 1);
                const bmp = beamGeo.attributes.position;
                for (let i = 0; i < bmp.count; i++) {
                    bmp.setY(i, bmp.getY(i) + Math.sin(bmp.getX(i) * 1.5) * 0.012);
                }
                beamGeo.computeVertexNormals();
                const beam = new THREE.Mesh(beamGeo, woodMat);
                beam.position.set(0, 2.7, z);
                beam.castShadow = true;
                group.add(beam);
            }

            // Thatch roof — thicker cone with second layer underneath
            const roofGeo = new THREE.ConeGeometry(3.0, 2.2, 16);
            const roofMesh = new THREE.Mesh(roofGeo, thatchMat);
            roofMesh.castShadow = true;
            roofMesh.position.y = 3.9;
            group.add(roofMesh);

            // Second cone layer underneath for thickness
            const roofUnderlayGeo = new THREE.ConeGeometry(3.15, 1.8, 16);
            const roofUnderlay = new THREE.Mesh(roofUnderlayGeo, thatchMat);
            roofUnderlay.castShadow = true;
            roofUnderlay.position.y = 3.0;
            group.add(roofUnderlay);

            // Roof ridge detail at the peak (bound bundle with lashing)
            const ridgeGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.4, 10, 4);
            // Add straw-like bumps to the ridge
            const rp = ridgeGeo.attributes.position;
            for (let i = 0; i < rp.count; i++) {
                const r = Math.sqrt(rp.getX(i)**2 + rp.getZ(i)**2);
                if (r > 0.08) {
                    const bump = Math.sin(rp.getY(i) * 20) * 0.008;
                    rp.setX(i, rp.getX(i) * (1 + bump));
                    rp.setZ(i, rp.getZ(i) * (1 + bump));
                }
            }
            ridgeGeo.computeVertexNormals();
            const ridge = new THREE.Mesh(ridgeGeo, thatchMat);
            ridge.position.y = 4.95;
            ridge.rotation.z = Math.PI / 2;
            ridge.castShadow = true;
            group.add(ridge);
            // Lashing wraps around ridge
            for (let lw = 0; lw < 3; lw++) {
                const lash = new THREE.Mesh(
                    new THREE.TorusGeometry(0.13, 0.01, 4, 10),
                    new THREE.MeshPhongMaterial({ color: 0x6A5A3A, shininess: 8 })
                );
                lash.position.set(0, 4.95, 0);
                lash.rotation.set(Math.PI / 2, 0, lw * 0.5 - 0.5);
                group.add(lash);
            }
            // Ridge cap ornament
            const ridgeCap = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 8), thatchMat);
            ridgeCap.position.y = 5.0;
            group.add(ridgeCap);

            // Thatch bundle strips along roof (adds visual texture)
            const bundleMat = new THREE.MeshPhongMaterial({ color: 0x9B8B5A, shininess: 5 });
            for (let tb = 0; tb < 12; tb++) {
                const tbAngle = (tb / 12) * Math.PI * 2;
                const bundle = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.06, 0.08, 2.0, 8),
                    bundleMat
                );
                const bx = Math.cos(tbAngle) * 1.8;
                const bz = Math.sin(tbAngle) * 1.8;
                bundle.position.set(bx, 3.3, bz);
                bundle.rotation.z = Math.cos(tbAngle) * 0.65;
                bundle.rotation.x = -Math.sin(tbAngle) * 0.65;
                group.add(bundle);
            }

            // Roof overhang ring with fringe
            const overhang = new THREE.Mesh(
                new THREE.TorusGeometry(2.9, 0.1, 6, 24),
                thatchMat
            );
            overhang.position.y = 2.8;
            overhang.rotation.x = Math.PI / 2;
            overhang.castShadow = true;
            group.add(overhang);
            // Hanging thatch fringe around overhang
            for (let fr = 0; fr < 20; fr++) {
                const frAngle = (fr / 20) * Math.PI * 2;
                const fringe = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.02, 0.008, 0.2 + Math.random() * 0.15, 6),
                    bundleMat
                );
                fringe.position.set(Math.cos(frAngle) * 2.9, 2.65, Math.sin(frAngle) * 2.9);
                group.add(fringe);
            }

            // Bar counter — planked top with edge wear
            const barGeo = new THREE.BoxGeometry(2.2, 0.12, 0.6, 12, 1, 4);
            const bcp = barGeo.attributes.position;
            for (let i = 0; i < bcp.count; i++) {
                if (bcp.getY(i) > 0.05) {
                    bcp.setY(i, bcp.getY(i) + (Math.random() - 0.5) * 0.008);
                }
            }
            barGeo.computeVertexNormals();
            const bar = new THREE.Mesh(barGeo, woodMat);
            bar.position.set(0, 1.0, 1.3);
            bar.castShadow = true;
            group.add(bar);
            // Bar plank grooves (dark lines on top)
            for (let pg = 0; pg < 4; pg++) {
                const groove = new THREE.Mesh(
                    new THREE.BoxGeometry(2.18, 0.005, 0.008),
                    new THREE.MeshPhongMaterial({ color: 0x2A1A0A, shininess: 5 })
                );
                groove.position.set(0, 1.065, 1.1 + pg * 0.13);
                group.add(groove);
            }
            // Bar front panel with vertical slat lines
            const barFrontGeo = new THREE.BoxGeometry(2.2, 0.65, 0.08, 10, 4, 1);
            const bfp = barFrontGeo.attributes.position;
            for (let i = 0; i < bfp.count; i++) {
                if (Math.abs(bfp.getZ(i)) > 0.03) {
                    bfp.setZ(i, bfp.getZ(i) + (Math.random() - 0.5) * 0.005);
                }
            }
            barFrontGeo.computeVertexNormals();
            const barFront = new THREE.Mesh(barFrontGeo, darkWoodMat);
            barFront.position.set(0, 0.65, 1.55);
            barFront.castShadow = true;
            group.add(barFront);

            // Bar stools — 3 along the counter with braces and footrest ring
            for (let s = 0; s < 3; s++) {
                const sx = -0.7 + s * 0.7;
                // Central leg
                const stoolBase = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.05, 0.6, 8), darkWoodMat);
                stoolBase.position.set(sx, 0.6, 1.9);
                stoolBase.castShadow = true;
                group.add(stoolBase);
                // Seat (slightly concave)
                const seatGeo = new THREE.CylinderGeometry(0.18, 0.16, 0.05, 12);
                const seP = seatGeo.attributes.position;
                for (let v = 0; v < seP.count; v++) {
                    if (seP.getY(v) > 0.01) {
                        const r = Math.sqrt(seP.getX(v) ** 2 + seP.getZ(v) ** 2);
                        seP.setY(v, seP.getY(v) - r * r * 0.3);
                    }
                }
                seatGeo.computeVertexNormals();
                const stoolSeat = new THREE.Mesh(seatGeo, woodMat);
                stoolSeat.position.set(sx, 0.93, 1.9);
                stoolSeat.castShadow = true;
                group.add(stoolSeat);
                // Support braces (3 angled legs)
                for (let b = 0; b < 3; b++) {
                    const bAngle = (b / 3) * Math.PI * 2;
                    const brace = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.02, 0.35, 8), darkWoodMat);
                    brace.position.set(sx + Math.cos(bAngle) * 0.08, 0.45, 1.9 + Math.sin(bAngle) * 0.08);
                    brace.rotation.z = Math.cos(bAngle) * 0.3;
                    brace.rotation.x = -Math.sin(bAngle) * 0.3;
                    group.add(brace);
                }
                // Footrest ring
                const footRing = new THREE.Mesh(
                    new THREE.TorusGeometry(0.12, 0.012, 6, 12),
                    darkWoodMat
                );
                footRing.position.set(sx, 0.4, 1.9);
                footRing.rotation.x = Math.PI / 2;
                group.add(footRing);
            }

            // Hanging decorations — string of shells along beam (with ridges)
            const shellMat = new THREE.MeshPhongMaterial({ color: 0xFFF5E1, shininess: 40 });
            for (let d = 0; d < 7; d++) {
                const shGeo = new THREE.SphereGeometry(0.06, 10, 10);
                const shp = shGeo.attributes.position;
                for (let v = 0; v < shp.count; v++) {
                    const theta = Math.atan2(shp.getX(v), shp.getZ(v));
                    const ridge = 1 + Math.sin(theta * 6) * 0.12;
                    shp.setX(v, shp.getX(v) * ridge);
                    shp.setZ(v, shp.getZ(v) * ridge);
                }
                shGeo.computeVertexNormals();
                const shell = new THREE.Mesh(shGeo, shellMat);
                shell.scale.y = 0.6;
                shell.position.set(-1.2 + d * 0.4, 2.5 + Math.sin(d * 0.9) * 0.1, 0);
                shell.castShadow = true;
                group.add(shell);
            }
            // String connecting shells
            const stringMat = new THREE.MeshPhongMaterial({ color: 0x8B7355, shininess: 5 });
            const string = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 2.8, 6), stringMat);
            string.rotation.z = Math.PI / 2;
            string.position.set(0, 2.55, 0);
            group.add(string);

            // Tiki masks on poles — carved with eye sockets, brow, nose, mouth cavity, teeth
            for (let s of [-1.6, 1.6]) {
                const maskMat = new THREE.MeshPhongMaterial({ color: 0x6B4226, map: woodTex, shininess: 12 });
                // Oval mask face
                const maskGeo = new THREE.BoxGeometry(0.28, 0.38, 0.1, 3, 4, 2);
                const mkP = maskGeo.attributes.position;
                for (let v = 0; v < mkP.count; v++) {
                    const mx = mkP.getX(v), my = mkP.getY(v);
                    // Round the corners
                    const dist = Math.sqrt((mx / 0.14) ** 2 + (my / 0.19) ** 2);
                    if (dist > 0.9) {
                        const scale = 0.9 / dist;
                        mkP.setX(v, mx * scale);
                        mkP.setY(v, my * scale);
                    }
                    // Convex face bulge
                    if (mkP.getZ(v) > 0) {
                        mkP.setZ(v, mkP.getZ(v) + (1 - dist * 0.8) * 0.03);
                    }
                }
                maskGeo.computeVertexNormals();
                const mask = new THREE.Mesh(maskGeo, maskMat);
                mask.position.set(s, 1.8, 0);
                mask.castShadow = true;
                group.add(mask);
                // Brow ridge — curved for carved look
                const browGeo = new THREE.BoxGeometry(0.22, 0.03, 0.04, 6, 1, 1);
                const brp = browGeo.attributes.position;
                for (let v = 0; v < brp.count; v++) {
                    const bx = brp.getX(v);
                    brp.setZ(v, brp.getZ(v) + (0.11*0.11 - bx*bx) * 0.3);
                }
                browGeo.computeVertexNormals();
                const brow = new THREE.Mesh(browGeo, maskMat);
                brow.position.set(s, 1.88, 0.06);
                group.add(brow);
                // Eye sockets (recessed)
                const mEyeMat = new THREE.MeshPhongMaterial({ color: 0xFF6600, emissive: 0xFF4400, emissiveIntensity: 0.5 });
                for (let e of [-1, 1]) {
                    const socket = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8),
                        new THREE.MeshPhongMaterial({ color: 0x2A1206, shininess: 2 }));
                    socket.position.set(s + e * 0.06, 1.84, 0.04);
                    group.add(socket);
                    const mEye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), mEyeMat);
                    mEye.position.set(s + e * 0.06, 1.84, 0.06);
                    group.add(mEye);
                }
                // Nose ridge — tapered carved shape
                const noseGeo = new THREE.BoxGeometry(0.04, 0.08, 0.05, 2, 4, 2);
                const np = noseGeo.attributes.position;
                for (let v = 0; v < np.count; v++) {
                    // Taper toward bottom
                    const ty = (np.getY(v) + 0.04) / 0.08;
                    np.setX(v, np.getX(v) * (0.7 + ty * 0.3));
                    // Round the front
                    if (np.getZ(v) > 0.02) {
                        np.setZ(v, np.getZ(v) + 0.008);
                    }
                }
                noseGeo.computeVertexNormals();
                const mNose = new THREE.Mesh(noseGeo, maskMat);
                mNose.position.set(s, 1.79, 0.06);
                group.add(mNose);
                // Mouth cavity + teeth
                const mMouthCavity = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.05, 0.04),
                    new THREE.MeshPhongMaterial({ color: 0x1A0800, shininess: 2 }));
                mMouthCavity.position.set(s, 1.72, 0.04);
                group.add(mMouthCavity);
                // Small teeth
                for (let t = 0; t < 3; t++) {
                    const mt = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.02, 0.02),
                        new THREE.MeshPhongMaterial({ color: 0xDDDDBB, shininess: 15 }));
                    mt.position.set(s - 0.035 + t * 0.035, 1.735, 0.06);
                    group.add(mt);
                }
            }

            return group;
        }

        // Village cluster — south-central
        for (let i = 0; i < 6; i++) {
            const hut = createTikiHut();
            const angle = (Math.PI * 2 / 6) * i;
            hut.position.set(Math.cos(angle) * 35, 0, Math.sin(angle) * 35 + 40);
            scene.add(hut);
        }
        // Market area — west side
        for (let i = 0; i < 5; i++) {
            const hut = createTikiHut();
            hut.position.set(-100 + i * 15, 0, 20 + (i % 2) * 12);
            hut.rotation.y = Math.random() * 0.4;
            scene.add(hut);
        }
        // Jungle outpost — north
        for (let i = 0; i < 4; i++) {
            const hut = createTikiHut();
            const angle = (Math.PI * 2 / 4) * i;
            hut.position.set(Math.cos(angle) * 20 + 80, 0, Math.sin(angle) * 20 + 120);
            hut.scale.setScalar(0.9);
            scene.add(hut);
        }

        // ============ TIKI TORCHES ============
        function createTikiTorch() {
            const group = new THREE.Group();
            const poleMat = new THREE.MeshPhongMaterial({ color: 0x8B5A2B, map: woodTex, shininess: 20 });
            // Tapered pole with bamboo-like segment rings
            const poleGeo = new THREE.CylinderGeometry(0.08, 0.12, 1.8, 10, 8);
            const pp = poleGeo.attributes.position;
            for (let v = 0; v < pp.count; v++) {
                const y = pp.getY(v);
                // Bamboo segment bulges
                const segBulge = 1 + Math.pow(Math.sin(y * 8), 8) * 0.06;
                pp.setX(v, pp.getX(v) * segBulge);
                pp.setZ(v, pp.getZ(v) * segBulge);
            }
            poleGeo.computeVertexNormals();
            const poleMesh = new THREE.Mesh(poleGeo, poleMat);
            poleMesh.castShadow = true;
            poleMesh.position.y = 0.9;
            group.add(poleMesh);

            // Torch bowl/cup — open top with rim and interior
            const bowlMat = new THREE.MeshPhongMaterial({ color: 0x8B6F47, shininess: 30 });
            const bowlGeo = new THREE.CylinderGeometry(0.22, 0.18, 0.14, 12, 1, true); // open-ended
            const bowl = new THREE.Mesh(bowlGeo, bowlMat);
            bowl.castShadow = true;
            bowl.position.y = 1.87;
            group.add(bowl);
            // Bowl rim
            const rimGeo = new THREE.TorusGeometry(0.22, 0.02, 6, 14);
            const rim = new THREE.Mesh(rimGeo, bowlMat);
            rim.position.y = 1.94;
            rim.rotation.x = Math.PI / 2;
            group.add(rim);
            // Bowl bottom (dark fuel surface)
            const fuelDisc = new THREE.Mesh(
                new THREE.CircleGeometry(0.18, 12),
                new THREE.MeshPhongMaterial({ color: 0x1A0A00, shininess: 2 })
            );
            fuelDisc.position.y = 1.81;
            fuelDisc.rotation.x = -Math.PI / 2;
            group.add(fuelDisc);

            // Tapered flame cones instead of spheres (more realistic)
            const flameMat1 = new THREE.MeshPhongMaterial({ color: 0xFFDD00, emissive: 0xFFAA00, emissiveIntensity: 0.7, transparent: true, opacity: 0.9 });
            const flameGeo1 = new THREE.ConeGeometry(0.16, 0.35, 8);
            const flameMesh1 = new THREE.Mesh(flameGeo1, flameMat1);
            flameMesh1.scale.set(1.1, 1.0, 0.9);
            flameMesh1.position.y = 2.0;
            group.add(flameMesh1);

            const flameMat2 = new THREE.MeshPhongMaterial({ color: 0xFF8800, emissive: 0xFF6600, emissiveIntensity: 0.8, transparent: true, opacity: 0.85 });
            const flameGeo2 = new THREE.ConeGeometry(0.1, 0.3, 8);
            const flameMesh2 = new THREE.Mesh(flameGeo2, flameMat2);
            flameMesh2.scale.set(0.9, 1.1, 1.0);
            flameMesh2.position.y = 2.25;
            group.add(flameMesh2);

            const flameMat3 = new THREE.MeshPhongMaterial({ color: 0xFF4400, emissive: 0xFF2200, emissiveIntensity: 0.9, transparent: true, opacity: 0.75 });
            const flameGeo3 = new THREE.ConeGeometry(0.06, 0.22, 6);
            const flameMesh3 = new THREE.Mesh(flameGeo3, flameMat3);
            flameMesh3.scale.set(1.0, 0.9, 1.1);
            flameMesh3.position.y = 2.45;
            group.add(flameMesh3);

            // Heat shimmer wisp (tiny elongated cone at tip)
            const wispMat = new THREE.MeshPhongMaterial({ color: 0xFF2200, emissive: 0xFF0000, emissiveIntensity: 0.6, transparent: true, opacity: 0.4 });
            const wisp = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.15, 4), wispMat);
            wisp.position.y = 2.6;
            group.add(wisp);

            group.flameIndex = 0;
            group.flameMeshes = [flameMesh1, flameMesh2, flameMesh3, wisp];
            group.userData.baseScales = [
                [1.1, 1.0, 0.9],
                [0.9, 1.1, 1.0],
                [1.0, 0.9, 1.1],
                [1.0, 1.0, 1.0]
            ];
            return group;
        }

        let torchIndex = 0;
        function addTorch(x, y, z) {
            const torch = createTikiTorch();
            torch.position.set(x, y, z);
            // Only every 3rd torch gets a PointLight for mobile GPU perf
            if (torchIndex % 3 === 0) {
                const light = new THREE.PointLight(0xFF8844, 1.5, 18);
                light.position.set(0, 1.9, 0);
                torch.add(light);
            }
            torchIndex++;
            scene.add(torch);
            torches.push(torch);
        }
        // Ring around village
        for (let i = 0; i < 18; i++) {
            const angle = (Math.PI * 2 / 18) * i;
            addTorch(Math.cos(angle) * 40, 0, Math.sin(angle) * 40 + 40);
        }
        // Path torches along the sandy path
        for (let i = 0; i < 16; i++) {
            const side = (i % 2 === 0) ? 5 : -5;
            addTorch(side, 0, -80 + i * 15);
        }
        // Beach torches
        for (let i = 0; i < 10; i++) {
            addTorch(-140 + i * 30, 0, -130);
        }

        // ============ PROPS - Enhanced transformable objects ============
        // These are the objects that Menehune can hide behind to disguise themselves
        // Each prop is detailed and uses procedural textures for maximum visual quality
        const propMaterials = {
            surfboard: new THREE.MeshPhongMaterial({ color: 0xFF6B35, map: woodTex, bumpMap: woodBumpTex, bumpScale: 0.3, shininess: 25 }),
            umbrella: new THREE.MeshPhongMaterial({ color: 0xFF69B4, shininess: 30 }),
            chair: new THREE.MeshPhongMaterial({ color: 0xA0826D, map: woodTex, bumpMap: woodBumpTex, bumpScale: 0.3, shininess: 15 }),
            barrel: new THREE.MeshPhongMaterial({ color: 0x8B5A2B, map: woodTex, bumpMap: woodBumpTex, bumpScale: 0.3, shininess: 20 }),
            rock: new THREE.MeshPhongMaterial({ color: 0x808080, map: stoneTex, bumpMap: stoneBumpTex, bumpScale: 0.3, shininess: 10 }),
            cooler: new THREE.MeshPhongMaterial({ color: 0x1E90FF, shininess: 40 }),
            kayak: new THREE.MeshPhongMaterial({ color: 0xFFD700, shininess: 35 }),
            crate: new THREE.MeshPhongMaterial({ color: 0x7B5B3A, map: woodTex, bumpMap: woodBumpTex, bumpScale: 0.3, shininess: 12 }),
            hammock: new THREE.MeshPhongMaterial({ color: 0xE8D5B7, shininess: 8 }),
            lantern: new THREE.MeshPhongMaterial({ color: 0xCC4400, emissive: 0xFF6600, emissiveIntensity: 0.3, shininess: 30 }),
            drum: new THREE.MeshPhongMaterial({ color: 0x6B3A2A, map: barkTex, bumpMap: barkBumpTex, bumpScale: 0.3, shininess: 18 }),
            fishNet: new THREE.MeshPhongMaterial({ color: 0xBBAAAA, transparent: true, opacity: 0.7, shininess: 5 }),
        };

        let props = [];

        // Enhanced prop creation with more geometric detail
        function createRandomProp() {
            const types = ['surfboard', 'umbrella', 'chair', 'barrel', 'rock', 'cooler', 'kayak', 'crate', 'hammock', 'lantern', 'drum', 'fishNet'];
            const type = types[Math.floor(Math.random() * types.length)];
            let mesh;

            if (type === 'surfboard') {
                // Surfboard — shaped hull with rocker, rails, fin, stripe, leash plug
                mesh = new THREE.Group();
                const boardGeo = new THREE.BoxGeometry(0.5, 0.12, 2.2, 6, 2, 14);
                const bp = boardGeo.attributes.position;
                for (let v = 0; v < bp.count; v++) {
                    const z = bp.getZ(v);
                    const x = bp.getX(v);
                    const y = bp.getY(v);
                    // Planform taper (nose narrower than tail)
                    const noseT = z > 0 ? 1 - Math.pow(z / 1.1, 2) * 0.7 : 1 - Math.pow(z / 1.1, 2) * 0.45;
                    bp.setX(v, x * Math.max(0.15, noseT));
                    // Rocker curve (nose kicks up, slight tail lift)
                    let rocker = 0;
                    if (z > 0.6) rocker = Math.pow((z - 0.6) / 0.5, 2) * 0.18;

                        const yPos = -0.19 + s * 0.14;
                        if (side.axis === 'z') {
                            slat.position.set(0, yPos, side.pos);
                        } else {
                            slat.position.set(side.pos, yPos, 0);
                            slat.rotation.y = side.rot;
                        }
                        slat.castShadow = true;

                    }
                    // Corner post
                    for (let cx of [-0.3, 0.3]) {

                    }
                });
                // Top slats with gaps
                for (let s = 0; s < 4; s++) {

                        new THREE.BoxGeometry(0.72, 0.03, 0.14),

                sides.forEach(side => {

            } else if (type === 'hammock') {
                // Hammock with posts, rope supports, deeply sagging woven fabric, spreader bars

                        new THREE.CylinderGeometry(0.015, 0.015, 0.55, 6),

                    bar.position.set(s * 0.72, 1.0, 0);
                    bar.rotation.z = Math.PI / 2;
                    bar.rotation.y = Math.PI / 2;
                    mesh.add(bar);
                }
                // Support ropes (from post top to spreader bar ends)
                for (let s of [-1, 1]) {
                    for (let rz of [-0.25, 0.25]) {
                        const rope = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.006, 0.006, 0.25, 6),
                            ropeMat

                        rope.position.set(s * 0.8, 1.15, rz * 0.5);
                        rope.rotation.z = s * 0.3;
                        mesh.add(rope);
                    }

                // Fabric sling with deep catenary sag
                const slingGeo = new THREE.PlaneGeometry(1.3, 0.55, 14, 8);

                for (let v = 0; v < sPos.count; v++) {
                    const sx = sPos.getX(v), sy = sPos.getY(v);
                    // Catenary sag (deeper in center)
                    const sagX = Math.pow(sx / 0.65, 2);
                    const sagY = (1 - Math.abs(sy) / 0.275) * 0.15;
                    sPos.setZ(v, -(0.35 * (1 - sagX) + sagY) * (1 - sagX * 0.5));
                }
                slingGeo.computeVertexNormals();
                const sling = new THREE.Mesh(slingGeo, propMaterials.hammock);
                sling.position.y = 1.0;
                sling.rotation.x = -Math.PI / 2;
                sling.castShadow = true;
                mesh.add(sling);

                for (let fi = 0; fi < 8; fi++) {
                    const fringe = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.004, 0.004, 0.12, 3),
                        ropeMat
                    );
                    const fAngle = (fi / 8) * 0.5 - 0.25;
                    fringe.position.set(-0.65, 0.9, fAngle);
                    mesh.add(fringe);
                    const fringe2 = fringe.clone();
                    fringe2.position.set(0.65, 0.9, fAngle);

            } else if (type === 'lantern') {

                mesh = new THREE.Group();

                const globe = new THREE.Mesh(

                // Bottom cap

                    new THREE.CylinderGeometry(0.07, 0.05, 0.03, 8),

                mesh.add(botCap);
                // Hanging wire with hook
                const wire = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.008, 0.008, 0.3, 6),
                    wireMat
                );
                wire.position.y = 0.47;
                mesh.add(wire);
                const hook = new THREE.Mesh(
                    new THREE.TorusGeometry(0.025, 0.005, 4, 8, Math.PI),
                    wireMat
                );
                hook.position.y = 0.62;
                mesh.add(hook);
            } else if (type === 'drum') {
                // Hawaiian drum (pahu) — carved body, rope lacing, hide head, rim hoop, base ring
                mesh = new THREE.Group();
                // Body with carved taper and decorative grooves
                const drumGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.6, 18, 6);
                const dp = drumGeo.attributes.position;
                for (let v = 0; v < dp.count; v++) {
                    const y = dp.getY(v), x = dp.getX(v), z = dp.getZ(v);
                    // Decorative grooves (3 bands)
                    const groove = 1 - Math.pow(Math.sin(y * 12), 8) * 0.02;
                    dp.setX(v, x * groove);
                    dp.setZ(v, z * groove);
                }
                drumGeo.computeVertexNormals();
                const body = new THREE.Mesh(drumGeo, propMaterials.drum);
                body.castShadow = true;
                mesh.add(body);
                // Drum head (hide membrane with slight depression)
                const headGeo = new THREE.CylinderGeometry(0.26, 0.26, 0.025, 18);
                const head = new THREE.Mesh(headGeo, new THREE.MeshPhongMaterial({ color: 0xD2B48C, shininess: 15, bumpMap: sandTex, bumpScale: 0.01 }));
                head.position.y = 0.31;
                head.castShadow = true;
                mesh.add(head);
                // Rim hoop
                const rimHoop = new THREE.Mesh(
                    new THREE.TorusGeometry(0.265, 0.015, 6, 20),

                );
                rimHoop.position.y = 0.32;
                rimHoop.rotation.x = Math.PI / 2;
                mesh.add(rimHoop);
                // Base ring
                const baseRing = new THREE.Mesh(
                    new THREE.TorusGeometry(0.31, 0.012, 6, 20),
                    new THREE.MeshPhongMaterial({ color: 0x5A3A1A, shininess: 12 })
                );
                baseRing.position.y = -0.3;
                baseRing.rotation.x = Math.PI / 2;
                mesh.add(baseRing);
                // Lacing ropes (zigzag between rim and base)
                const laceMat = new THREE.MeshPhongMaterial({ color: 0xC8A860, shininess: 10 });
                for (let lc = 0; lc < 10; lc++) {
                    const lAngle = (lc / 10) * Math.PI * 2;
                    const lace = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.005, 0.005, 0.65, 3),
                        laceMat
                    );
                    const lx = Math.cos(lAngle) * 0.27;
                    const lz = Math.sin(lAngle) * 0.27;
                    lace.position.set(lx, 0.01, lz);
                    lace.rotation.z = Math.sin(lAngle) * 0.08;
                    lace.rotation.x = -Math.cos(lAngle) * 0.08;
                    mesh.add(lace);
                }
            } else {
                // Fish net on drying frame — grid lattice with knots, cross beam, weights
                mesh = new THREE.Group();
                const poleMat = new THREE.MeshPhongMaterial({ color: 0x6B4423, map: barkTex, shininess: 8 });
                // Tapered poles
                const pole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.05, 1.5, 8), poleMat);
                pole1.position.set(-0.45, 0.75, 0);
                pole1.castShadow = true;
                mesh.add(pole1);
                const pole2 = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.05, 1.5, 8), poleMat);
                pole2.position.set(0.45, 0.75, 0);
                pole2.castShadow = true;
                mesh.add(pole2);
                // Cross beam at top
                const crossBeam = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.025, 0.025, 1.0, 6),
                    poleMat
                );
                crossBeam.position.set(0, 1.45, 0);
                crossBeam.rotation.z = Math.PI / 2;
                mesh.add(crossBeam);
                // Net grid — horizontal and vertical lines with sag
                const netMat = new THREE.MeshPhongMaterial({ color: 0x8B7D5B, shininess: 5 });
                const knotMat = new THREE.MeshPhongMaterial({ color: 0x7A6B4A, shininess: 5 });
                const gridW = 0.8, gridH = 1.1;
                const cols = 8, rows = 10;
                // Vertical lines
                for (let c = 0; c <= cols; c++) {
                    const cx = -gridW / 2 + (c / cols) * gridW;
                    const vLine = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.004, 0.004, gridH, 3),
                        netMat
                    );
                    vLine.position.set(cx, 0.85, 0.05 + Math.sin(c * 1.5) * 0.02);
                    mesh.add(vLine);
                }
                // Horizontal lines with sag
                for (let r = 0; r <= rows; r++) {
                    const ry = 0.3 + (r / rows) * gridH;
                    const hGeo = new THREE.CylinderGeometry(0.004, 0.004, gridW, 3, 6);
                    const hPos = hGeo.attributes.position;
                    for (let v = 0; v < hPos.count; v++) {
                        const hy = hPos.getY(v);
                        // Sag in the middle
                        const sagFrac = 1 - Math.pow(hy / (gridW / 2), 2);
                        hPos.setZ(v, hPos.getZ(v) + sagFrac * 0.03 * (1 - r / rows));
                    }
                    hGeo.computeVertexNormals();
                    const hLine = new THREE.Mesh(hGeo, netMat);
                    hLine.position.set(0, ry, 0.05);
                    hLine.rotation.z = Math.PI / 2;
                    mesh.add(hLine);
                }
                // Knots at intersections (every other)
                for (let c = 0; c <= cols; c += 2) {
                    for (let r = 0; r <= rows; r += 2) {
                        const kx = -gridW / 2 + (c / cols) * gridW;
                        const ky = 0.3 + (r / rows) * gridH;
                        const knot = new THREE.Mesh(new THREE.SphereGeometry(0.008, 6, 6), knotMat);
                        knot.position.set(kx, ky, 0.05);
                        mesh.add(knot);
                    }
                }
                // Hanging weights at bottom
                for (let w = 0; w < 4; w++) {
                    const wx = -0.3 + w * 0.2;
                    const weight = new THREE.Mesh(
                        new THREE.SphereGeometry(0.02, 6, 6),
                        new THREE.MeshPhongMaterial({ color: 0x555555, shininess: 20 })
                    );
                    weight.position.set(wx, 0.25, 0.05);
                    weight.scale.y = 1.4;
                    mesh.add(weight);
                }
            }

            mesh.castShadow = true;
            if (mesh.children) {
                mesh.children.forEach(c => c.castShadow = true);
            }
            return mesh;
        }

        // Helper function to add vertex colors for weathering effect
        function addPropWeathering(propMesh) {
            propMesh.traverse(child => {
                if (child.isMesh && child.geometry) {
                    const geo = child.geometry;
                    const posAttr = geo.attributes.position;
                    if (!posAttr || posAttr.count === 0) return;
                    // Check for NaN
                    let hasNaN = false;
                    for (let i = 0; i < Math.min(posAttr.count, 10); i++) {
                        if (isNaN(posAttr.getX(i)) || isNaN(posAttr.getY(i)) || isNaN(posAttr.getZ(i))) { hasNaN = true; break; }
                    }
                    if (hasNaN) return;
                    if (!geo.attributes.color) {
                        const colors = new Float32Array(posAttr.count * 3);
                        for (let i = 0; i < colors.length; i++) colors[i] = 1.0;
                        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                    }
                    const colorAttr = geo.attributes.color;
                    geo.computeBoundingBox();
                    const box = geo.boundingBox;
                    if (!box || isNaN(box.min.y) || isNaN(box.max.y)) return;
                    const minY = box.min.y, maxY = box.max.y;
                    const yRange = maxY - minY;
                    for (let i = 0; i < posAttr.count; i++) {
                        const y = posAttr.getY(i);
                        if (isNaN(y)) continue;
                        const t = yRange > 0 ? (y - minY) / yRange : 0.5;
                        const factor = 0.7 + t * 0.35;
                        colorAttr.setXYZ(i, factor, factor, factor);
                    }
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(mat => mat.vertexColors = true);
                        } else {
                            child.material.vertexColors = true;
                        }
                    }
                }
            });
        }

        // Spawn 80 props across the expanded map — Menehune use these to hide
        for (let i = 0; i < 80; i++) {
            const mesh = createRandomProp();
            const x = (Math.random() - 0.5) * 340;
            const z = -140 + Math.random() * 280;
            mesh.position.set(x, 0.5, z);
            mesh.rotation.y = Math.random() * Math.PI * 2;
            // Add weathering vertex colors
            addPropWeathering(mesh);
            scene.add(mesh);
            // Add a glowing ring at the base of each hideable prop
            const ringGeo = new THREE.RingGeometry(0.6, 0.75, 24);
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0x00FF88,
                transparent: true,
                opacity: 0.0,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.copy(mesh.position);
            ring.position.y = 0.05;
            scene.add(ring);

            props.push({
                mesh: mesh,
                position: mesh.position.clone(),
                hidden: false,
                hiddenBy: null,
                highlightRing: ring
            });
        }

        // ============ DECORATIVE TERRAIN FEATURES ============
        // These non-transformable props add visual richness to the tropical environment

        function createCoralReef() {
            const group = new THREE.Group();
            const coralColors = [0xFF6B9D, 0xFF8855, 0xCC55AA, 0xFFAA77, 0xEE6688];

            for (let i = 0; i < 20; i++) {
                const x = (Math.random() - 0.5) * 300;
                const z = -180 + Math.random() * 40;
                const coralMat = new THREE.MeshPhongMaterial({
                    color: coralColors[Math.floor(Math.random() * coralColors.length)],
                    shininess: 25
                });
                // Main branch with forking and polyp bumps
                const bH = 0.8 + Math.random() * 1.2;
                const bGeo = new THREE.ConeGeometry(0.2 + Math.random() * 0.3, bH, 8, 4);
                const bp = bGeo.attributes.position;
                for (let v = 0; v < bp.count; v++) {
                    const bx = bp.getX(v), by = bp.getY(v), bz = bp.getZ(v);
                    // Polyp bumps (small random displacement)
                    const polyp = Math.sin(by * 12 + bx * 8) * 0.02 + Math.sin(bz * 10) * 0.015;
                    bp.setX(v, bx + polyp);
                    bp.setZ(v, bz + polyp * 0.8);
                }
                bGeo.computeVertexNormals();
                const branch = new THREE.Mesh(bGeo, coralMat);
                branch.position.set(x, 0.5, z);
                branch.rotation.x = Math.random() * 0.3;
                branch.castShadow = true;
                group.add(branch);

                // Sub-branches with forking tips
                for (let j = 0; j < 3 + Math.floor(Math.random() * 2); j++) {
                    const sbH = 0.4 + Math.random() * 0.6;
                    const sbGeo = new THREE.ConeGeometry(0.08 + Math.random() * 0.12, sbH, 6, 3);
                    const sbp = sbGeo.attributes.position;
                    for (let v = 0; v < sbp.count; v++) {
                        const polyp = Math.sin(sbp.getY(v) * 15) * 0.01;
                        sbp.setX(v, sbp.getX(v) + polyp);
                    }
                    sbGeo.computeVertexNormals();
                    const subBranch = new THREE.Mesh(sbGeo, coralMat);
                    const subAngle = (Math.PI * 2 / 4) * j + Math.random() * 0.5;
                    subBranch.position.set(
                        x + Math.cos(subAngle) * (0.3 + Math.random() * 0.3),
                        0.4 + j * 0.2,
                        z + Math.sin(subAngle) * (0.3 + Math.random() * 0.3)
                    );
                    subBranch.rotation.set(Math.random() * 0.4 - 0.2, 0, Math.random() * 0.4 - 0.2);
                    subBranch.castShadow = true;
                    group.add(subBranch);
                }
                // Base encrustation (flat disc)
                const base = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.35, 0.4, 0.08, 10),
                    new THREE.MeshPhongMaterial({ color: coralMat.color.clone().multiplyScalar(0.6), shininess: 8 })
                );
                base.position.set(x, 0.05, z);
                group.add(base);
            }
            return group;
        }
        scene.add(createCoralReef());

        // ============ WOODEN DOCK / PIER ============
        function createDock() {
            const group = new THREE.Group();
            const woodMat = new THREE.MeshPhongMaterial({ color: 0x7A5C2E, map: woodTex, shininess: 15 });
            const darkWood = new THREE.MeshPhongMaterial({ color: 0x5A4020, map: woodTex, shininess: 10 });

            for (let i = 0; i < 12; i++) {

                const plank = new THREE.Mesh(new THREE.BoxGeometry(plankW, 0.1, 0.42), i % 2 === 0 ? woodMat : darkWood);
                plank.position.set(0, 1.0, -i * 0.48);
                plank.castShadow = true;
                plank.receiveShadow = true;
                group.add(plank);
                // Nail heads on each plank
                for (let nx of [-1.1, 1.1]) {

                    nail.position.set(nx, 1.06, -i * 0.48);

                }

            // Support posts with caps
            for (let i = 0; i < 6; i++) {
                for (let s of [-1.2, 1.2]) {
                    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 1.5, 8), woodMat);
                    post.position.set(s, 0.4, -i);

                }

            // Rope railings with catenary sag
            const ropeMat = new THREE.MeshPhongMaterial({ color: 0xAA9966, shininess: 5 });
            for (let s of [-1.3, 1.3]) {
                // Sagging rope segments between posts
                for (let seg = 0; seg < 5; seg++) {
                    const ropeGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.05, 6, 6);
                    const rp = ropeGeo.attributes.position;
                    for (let v = 0; v < rp.count; v++) {

        const dock = createDock();
